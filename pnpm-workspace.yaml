packages:
  - "apps/*"
  - "packages/*"
  - "tooling/*"

# Build-script allowlist (replaces pnpm v10's onlyBuiltDependencies).
# Mirrors the prior allowlist; other packages' install scripts stay disabled.
allowBuilds:
  "@bundled-es-modules/glob": false
  "@journeyapps/wa-sqlite": false
  better-sqlite3-multiple-ciphers: true
  core-js: false
  esbuild: true
  msgpackr-extract: true
  protobufjs: false
  react-native-libsodium: false
  style-dictionary: false
  unrs-resolver: true

# Shared external dependency versions. Any package can reference these with
# `"dep": "catalog:"` — single source of truth, bump in one place.
# Renovate updates entries here like any other dependency.
catalog:
  "@electric-sql/pglite": ^0.4.5
  "@playwright/test": ^1.59.1
  "@tanstack/react-query": ^5.100.9
  "@testing-library/react": ^16.3.2
  "@trpc/client": 11.17.0
  "@trpc/react-query": 11.17.0
  "@trpc/server": 11.17.0
  "@types/better-sqlite3": ^7.6.13
  "@types/bun": ^1.3.13
  "@types/react": ^19.2.14
  better-sqlite3-multiple-ciphers: ^12.9.0
  drizzle-orm: ^0.45.2
  eslint: ^10.3.0
  happy-dom: ^20.9.0
  jszip: ^3.10.1
  lucide-react-native: ^1.14.0
  postgres: ^3.4.9
  react-dom: ^19.2.6
  react-native-svg: ^15.15.4
  typescript: ^6.0.3
  zod: ^4.4.3

# Transitive-dependency overrides. Moved here from package.json `pnpm.overrides`
# because pnpm v11 in a workspace silently ignores the package.json variant.
overrides:
  "@trpc/server": "11.17.0"
  better-sqlite3: "npm:better-sqlite3-multiple-ciphers@^12.6.2"
  ioredis: "5.10.1"
  esbuild: ">=0.25.0"
  fast-xml-parser: "^5.7.2"
  postcss: ">=8.5.10"
  flatted: ">=3.4.2"
  # brace-expansion override removed: pnpm overrides force a single version
  # tree-wide, but minimatch@9 imports the default export that v5 dropped.
  # Natural resolution already picks ReDoS-patched 1.1.14 / 2.1.0 / 5.0.6
  # per consumer, so an override is unneeded.
  picomatch: ">=4.0.4"
  "yaml": ">=2.8.3"
  node-forge: ">=1.4.0"
  handlebars: ">=4.7.9"
  vite: "8.0.13"
  "@tanstack/query-core": "5.100.9"
  follow-redirects: ">=1.16.0"
  dompurify: ">=3.4.0"
  protobufjs: ">=7.5.5"
  axios: "^1.16.0"
  "@xmldom/xmldom": ">=0.8.13"
  uuid: ">=14.0.0"

verifyDepsBeforeRun: true
