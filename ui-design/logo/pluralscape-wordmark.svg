<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="800" height="240" fill="none">
  <!-- Constellation Icon (scaled to ~60x60, positioned left-center) -->
  <g transform="translate(170, 5) scale(0.6)">
    <!-- Connecting Lines -->
    <path d="M50 20 L20 40 L35 75 L65 75 L80 40 Z" stroke="url(#wm_paint0)" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
    <path d="M50 20 L50 50 L35 75" stroke="url(#wm_paint1)" stroke-linecap="round" stroke-width="2"/>
    <path d="M50 50 L65 75" stroke="url(#wm_paint2)" stroke-linecap="round" stroke-width="2"/>
    <path d="M20 40 L50 50 L80 40" stroke="url(#wm_paint3)" stroke-linecap="round" stroke-width="2"/>
    <!-- Dots -->
    <circle cx="50" cy="20" r="5" fill="#e8e4f0"/>
    <circle cx="20" cy="40" r="4" fill="#b9aaca"/>
    <circle cx="80" cy="40" r="4" fill="#7ecbc0"/>
    <circle cx="35" cy="75" r="3" fill="#e8e4f0"/>
    <circle cx="65" cy="75" r="3" fill="#b9aaca"/>
    <circle cx="50" cy="50" r="2.5" fill="#7ecbc0"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="105" font-family="'DM Sans', 'Inter', -apple-system, sans-serif" font-size="36" font-weight="300" fill="#e8e4f0" letter-spacing="2" text-anchor="middle">Pluralscape</text>

  <defs>
    <linearGradient id="wm_paint0" gradientUnits="userSpaceOnUse" x1="20" y1="20" x2="80" y2="75">
      <stop stop-color="#b9aaca"/>
      <stop offset="1" stop-color="#7ecbc0"/>
    </linearGradient>
    <linearGradient id="wm_paint1" gradientUnits="userSpaceOnUse" x1="50" y1="20" x2="35" y2="75">
      <stop stop-color="#e8e4f0"/>
      <stop offset="1" stop-color="#b9aaca"/>
    </linearGradient>
    <linearGradient id="wm_paint2" gradientUnits="userSpaceOnUse" x1="50" y1="50" x2="65" y2="75">
      <stop stop-color="#b9aaca"/>
      <stop offset="1" stop-color="#7ecbc0"/>
    </linearGradient>
    <linearGradient id="wm_paint3" gradientUnits="userSpaceOnUse" x1="20" y1="40" x2="80" y2="40">
      <stop stop-color="#b9aaca"/>
      <stop offset="1" stop-color="#7ecbc0"/>
    </linearGradient>
  </defs>
</svg>
