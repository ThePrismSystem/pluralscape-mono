name: crowdin-automerge

# NOTE: `pull_request_target` is deliberately NOT used here. It would let any
# PR (including from forks) trigger this workflow with write-token access,
# even with a check-of-same-repo gate — pull_request_target is a
# supply-chain risk class we do not accept for this flow. Triggers are
# limited to `check_suite` (fires when CI finishes on a same-repo bot PR)
# and `workflow_dispatch` (manual re-run by a maintainer).
on:
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: crowdin-automerge-${{ github.event.pull_request.number || github.event.check_suite.id || inputs.pr_number }}
  cancel-in-progress: false

jobs:
  evaluate-and-merge:
    name: Evaluate and merge eligible Crowdin PR
    runs-on: ubuntu-latest
    # Defense-in-depth against fork PRs even though no trigger here accepts
    # fork code directly: the guard script only calls `gh api` so any exotic
    # check_suite event from a forked workflow gets rejected before install.
    if: >-
      github.event_name != 'check_suite'
      || github.event.pull_request == null
      || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GITHUB_EVENT: ${{ toJson(github.event) }}
        run: |
          set -eo pipefail
          PR_NUMBER=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER=$(jq -r '.check_suite.pull_requests[0].number // empty' <<< "$GITHUB_EVENT")
          fi
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR associated with event; exiting."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      # Always check out main, never the PR head SHA. The guard script reads
      # PR metadata via `gh api`; it does not execute any code from the PR.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.pr.outputs.skip != 'true'
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6
        if: steps.pr.outputs.skip != 'true'

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        if: steps.pr.outputs.skip != 'true'
        with:
          node-version: 24
          cache: pnpm

      - if: steps.pr.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Evaluate and merge
        if: steps.pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Flip to "false" by setting the CROWDIN_AUTOMERGE_DRY_RUN repo
          # variable; no code change required to take live.
          CROWDIN_AUTOMERGE_DRY_RUN: ${{ vars.CROWDIN_AUTOMERGE_DRY_RUN || 'true' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: pnpm crowdin:automerge-guard --pr "${{ steps.pr.outputs.number }}"
