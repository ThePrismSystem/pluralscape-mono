name: crowdin-config

on:
  push:
    branches: [main]
    paths:
      - scripts/crowdin-glossary.json
      - scripts/crowdin-glossary.schema.json
      - scripts/crowdin-setup-project.ts
      - scripts/crowdin/**
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no mutations)"
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  apply-config:
    name: Apply Crowdin project config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply project configuration
        shell: bash
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON }}
        run: |
          # pipefail is critical: without it, `crowdin:setup | tee` masks a
          # non-zero exit from the setup script because tee always exits 0,
          # making the whole job report success on a real failure.
          set -eo pipefail
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            pnpm crowdin:setup --dry-run --json
          else
            pnpm crowdin:setup --json | tee crowdin-setup-output.json
          fi

      - name: Report failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody = `Another \`crowdin-config\` run failed. Latest: ${runUrl} (sha ${context.sha.slice(0, 7)}).`;
            // Dedup: if an open "Crowdin config apply failed" issue already exists,
            // post a comment on it instead of opening another.
            const search = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open label:automation-failure "Crowdin config apply failed"`,
            });
            const existing = search.data.items.find((i) => i.title.startsWith("Crowdin config apply failed"));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: commentBody,
              });
              return;
            }
            const title = `Crowdin config apply failed on ${context.sha.slice(0, 7)}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The \`crowdin-config\` workflow failed. Run: ${runUrl}`,
              labels: ["i18n", "automation-failure"],
            });
