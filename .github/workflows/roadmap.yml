name: Roadmap

on:
  push:
    branches: [main]
    paths: [".beans/**"]

permissions:
  contents: write

jobs:
  update-roadmap:
    name: Update Roadmap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install beans CLI
        run: |
          curl -fsSL https://github.com/hmans/beans/releases/latest/download/beans_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin beans

      - name: Generate roadmap
        run: beans roadmap > docs/roadmap.md

      - name: Commit and push if changed
        run: |
          git diff --quiet docs/roadmap.md && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/roadmap.md
          git commit -m "docs: regenerate roadmap"
          git push
