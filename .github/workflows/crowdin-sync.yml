name: crowdin-sync

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/locales/en/**"
      - "crowdin.yml"
  schedule:
    # Daily at 06:00 UTC — pull the latest approved translations.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-sources:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: Upload sources to Crowdin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2.16.2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Upload source string context
        run: pnpm crowdin:upload-context
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON }}

      - name: Pre-translate new strings (TM + MT)
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON }}
        run: pnpm crowdin:pretranslate

  pull-translations:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Pull translations from Crowdin
    runs-on: ubuntu-latest
    permissions:
      # The GitHub App token minted below carries its own permissions. These
      # workflow-level permissions apply only to the default GITHUB_TOKEN,
      # which we no longer use for git operations or PR creation.
      contents: read
    steps:
      # The `chore/crowdin-translations` branch is protected by a repo
      # ruleset that only the Pluralscape Crowdin Bot GitHub App may bypass.
      # Mint a fresh installation token per run and use it for checkout,
      # crowdin-action, and the auto-merge enable step.
      - name: Mint Crowdin App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.CROWDIN_APP_ID }}
          private-key: ${{ secrets.CROWDIN_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Check Crowdin translation progress
        id: progress
        shell: bash
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          set -eo pipefail
          # crowdin/github-action exits non-zero when nothing is translated.
          # Skip the download step if all target languages sit at 0% so a
          # freshly-bootstrapped project doesn't red-line CI until the first
          # string is translated.
          response=$(curl -sS --fail-with-body \
            -H "Authorization: Bearer ${CROWDIN_PERSONAL_TOKEN}" \
            "https://api.crowdin.com/api/v2/projects/${CROWDIN_PROJECT_ID}/languages/progress?limit=500")
          # Fallback to 0 when the language list is empty (freshly-created
          # project with no target languages) so jq does not divide by zero.
          translated=$(echo "${response}" | jq '[.data[]?.data.translationProgress] | if length == 0 then 0 else (add / length | floor) end')
          echo "Average translation progress across languages: ${translated}"
          if ! [[ "${translated}" =~ ^-?[0-9]+$ ]]; then
            {
              echo "## crowdin-sync: unexpected progress response"
              echo ""
              echo '```json'
              echo "${response}"
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
            echo "::error::Crowdin returned a non-numeric translation progress value; see step summary for the raw response."
            exit 1
          fi
          if [[ "${translated}" -gt 0 ]]; then
            echo "has_translations=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_translations=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::No translations available yet; skipping download step."
          fi

      - name: Pull translations from Crowdin
        if: steps.progress.outputs.has_translations == 'true'
        uses: crowdin/github-action@8868a33591d21088edfc398968173a3b98d51706 # v2.16.2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          localization_branch_name: chore/crowdin-translations
          pull_request_title: "chore(i18n): daily Crowdin translation sync"
          pull_request_body: |
            Auto-generated by the daily Crowdin sync.

            GitHub native auto-merge is enabled on this PR; it will merge
            automatically once required status checks pass. To block, disable
            auto-merge on the PR.
          pull_request_labels: "i18n"
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Enable native auto-merge on translation PR
        if: steps.progress.outputs.has_translations == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Branch protection on `main` (required checks) holds the PR until
          # CI passes. The ruleset on `chore/crowdin-translations` restricts
          # pushes to this App, so only Crowdin-originated commits land there.
          set -eo pipefail
          PR=$(gh pr list \
            --head chore/crowdin-translations \
            --state open \
            --json number \
            --jq '.[0].number')
          if [[ -n "$PR" && "$PR" != "null" ]]; then
            gh pr merge "$PR" --auto --squash --delete-branch
            echo "::notice::Auto-merge enabled on PR #$PR"
          else
            echo "::notice::No open translation PR found; crowdin-action may not have created one."
          fi
