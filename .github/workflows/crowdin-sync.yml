name: crowdin-sync

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/locales/en/**"
      - "crowdin.yml"
  schedule:
    # Daily at 06:00 UTC — pull the latest approved translations.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-sources:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    name: Upload sources to Crowdin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@7ca9c452bfe9197d3bb7fa83a4d7e2b0c9ae835d # v2.16.0
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Pre-translate new strings (TM + MT)
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_TRANSLATE_SERVICE_ACCOUNT_JSON }}
        run: pnpm crowdin:pretranslate

  pull-translations:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Pull translations from Crowdin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check Crowdin translation progress
        id: progress
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          # crowdin/github-action exits non-zero when nothing is translated.
          # Skip the download step if all target languages sit at 0% so a
          # freshly-bootstrapped project doesn't red-line CI until the first
          # string is translated.
          response=$(curl -sS \
            -H "Authorization: Bearer ${CROWDIN_PERSONAL_TOKEN}" \
            "https://api.crowdin.com/api/v2/projects/${CROWDIN_PROJECT_ID}/languages/progress?limit=500")
          translated=$(echo "${response}" | jq '[.data[].data.translationProgress] | add // 0')
          echo "Total translation progress across languages: ${translated}"
          if [[ "${translated}" -gt 0 ]]; then
            echo "has_translations=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_translations=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::No translations available yet; skipping download step."
          fi

      - name: Pull translations from Crowdin
        if: steps.progress.outputs.has_translations == 'true'
        uses: crowdin/github-action@7ca9c452bfe9197d3bb7fa83a4d7e2b0c9ae835d # v2.16.0
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          localization_branch_name: chore/crowdin-translations
          pull_request_title: "chore(i18n): daily Crowdin translation sync"
          pull_request_body: |
            Auto-generated by the daily Crowdin sync.

            Auto-merge is enabled by the `crowdin-automerge` workflow
            once CI passes and only translation files are touched.
            Add the `do-not-automerge` label to block.
          pull_request_labels: "automerge,i18n"
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
