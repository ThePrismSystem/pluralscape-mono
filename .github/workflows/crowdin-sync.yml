name: crowdin-sync

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/locales/en/**"
      - "crowdin.yml"
  schedule:
    # Mondays at 06:00 UTC — pull translations for the week.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push-sources:
    if: github.event_name == 'push'
    name: Upload sources to Crowdin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@7ca9c452bfe9197d3bb7fa83a4d7e2b0c9ae835d # v2.16.0
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

  pull-translations:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Pull translations from Crowdin
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Pull translations from Crowdin
        uses: crowdin/github-action@7ca9c452bfe9197d3bb7fa83a4d7e2b0c9ae835d # v2.16.0
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          localization_branch_name: chore/crowdin-translations
          pull_request_title: "chore(i18n): weekly Crowdin translation sync"
          pull_request_body: |
            Auto-generated by the weekly Crowdin sync. Review translation diffs before merging.
          config: crowdin.yml
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
