RelationshipType:
  type: string
  enum:
    - split-from
    - fused-from
    - sibling
    - partner
    - parent-child
    - protector-of
    - caretaker-of
    - gatekeeper-of
    - source
    - custom
  example: sibling

CreateRelationshipRequest:
  type: object
  required: [sourceMemberId, targetMemberId, type, bidirectional, encryptedData]
  properties:
    sourceMemberId:
      type: string
      description: ID of the source member in the relationship
      example: "mem_abc123"
    targetMemberId:
      type: string
      description: ID of the target member in the relationship
      example: "mem_def456"
    type:
      $ref: "#/RelationshipType"
    bidirectional:
      type: boolean
      description: Whether the relationship applies in both directions
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextRelationship (see ./plaintext.yaml#/PlaintextRelationship)"

UpdateRelationshipRequest:
  type: object
  required: [type, bidirectional, encryptedData, version]
  properties:
    type:
      $ref: "#/RelationshipType"
    bidirectional:
      type: boolean
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextRelationship (see ./plaintext.yaml#/PlaintextRelationship)"
    version:
      type: integer
      minimum: 1

RelationshipResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [sourceMemberId, targetMemberId, type, bidirectional]
      properties:
        sourceMemberId:
          type: string
          description: ID of the source member
          example: "mem_abc123"
        targetMemberId:
          type: string
          description: ID of the target member
          example: "mem_def456"
        type:
          $ref: "#/RelationshipType"
        bidirectional:
          type: boolean
          description: Whether the relationship applies in both directions
