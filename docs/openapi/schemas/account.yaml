        - import-job.updated
        - import-job.completed
        - import-job.failed
    createdAt:
      type: integer
      format: int64
      description: Unix milliseconds when the event occurred
    actor:
      description: The actor who performed the action.
      oneOf:
        - type: object
          required: [kind, id]
          properties:
            kind:
              type: string
              const: account
            id:
              type: string
              description: Account ID
        - type: object
          required: [kind, id]
          properties:
            kind:
              type: string
              const: api-key
            id:
              type: string
              description: API key ID
        - type: object
          required: [kind, id]
          properties:
            kind:
              type: string
              const: system
            id:
              type: string
              description: System ID
    detail:
      type: string
      nullable: true
      description: Free-form plaintext payload with event-specific metadata.
    ipAddress:
      type: string
      nullable: true
      description: IP address of the request
    userAgent:
      type: string
      nullable: true
      description: User-Agent header from the request

AuditLogResponse:
  type: object
  required: [data, hasMore]
  properties:
    data:
      type: array
      items:
        $ref: "#/AuditLogEntry"
    nextCursor:
      type: string
      nullable: true
    hasMore:
      type: boolean

UpdateAccountSettingsRequest:
  type: object
  required: [auditLogIpTracking, version]
  properties:
    auditLogIpTracking:
      type: boolean
    version:
      type: integer
      description: Optimistic concurrency version counter (must match current version)

DeleteAccountRequest:
  type: object
  required: [password]
  properties:
    password:
      type: string
      minLength: 1
      description: Current account password for confirmation

PinRequest:
  type: object
  required: [pin]
  properties:
    pin:
      type: string
      pattern: "^\\d{4,6}$"
      description: "4-6 digit PIN"

VerifyPinResponse:
  type: object
  required: [verified]
  properties:
    verified:
      type: boolean
      enum: [true]

ActionResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          enum: [true]

InitiateTransferRequest:
  type: object
  required: [codeSaltHex, encryptedKeyMaterialHex]
  properties:
    codeSaltHex:
      type: string
      pattern: "^[0-9a-fA-F]+$"
      description: Hex-encoded Argon2id salt for transfer code key derivation
    encryptedKeyMaterialHex:
      type: string
      pattern: "^[0-9a-fA-F]+$"
      description: Hex-encoded master key encrypted under the transfer key

InitiateTransferResponse:
  type: object
  required: [transferId, expiresAt]
  properties:
    transferId:
      type: string
      pattern: "^dtr_"
      description: Device transfer request ID
    expiresAt:
      type: integer
      format: int64
      description: Unix milliseconds when the transfer expires

CompleteTransferRequest:
  type: object
  required: [code]
  properties:
    code:
      type: string
      pattern: "^\\d{10}$"
      description: 10-digit transfer code

CompleteTransferResponse:
  type: object
  required: [encryptedKeyMaterialHex]
  properties:
    encryptedKeyMaterialHex:
      type: string
      description: Hex-encoded master key encrypted under the transfer key

UpdateAccountSettingsResponse:
  type: object
  required: [ok, auditLogIpTracking, version]
  properties:
    ok:
      type: boolean
    auditLogIpTracking:
      type: boolean
    version:
      type: integer
