ApiKeyType:
  type: string
  enum: [metadata, crypto]
  description: |
    Key type. `metadata` keys carry no encrypted key material.
    `crypto` keys include `encryptedKeyMaterial` for payload encryption.

ApiKeyScope:
  type: string
  enum:
    # Per-domain read scopes
    - "read:members"
    - "read:fronting"
    - "read:groups"
    - "read:system"
    - "read:structure"
    - "read:reports"
    - "read:webhooks"
    - "read:blobs"
    - "read:notifications"
    - "read:acknowledgements"
    - "read:channels"
    - "read:messages"
    - "read:notes"
    - "read:polls"
    - "read:relationships"
    - "read:innerworld"
    - "read:fields"
    - "read:check-ins"
    - "read:lifecycle-events"
    - "read:timers"
    - "read:buckets"
    # Per-domain write scopes
    - "write:members"
    - "write:fronting"
    - "write:groups"
    - "write:system"
    - "write:structure"
    - "write:reports"
    - "write:webhooks"
    - "write:blobs"
    - "write:notifications"
    - "write:acknowledgements"
    - "write:channels"
    - "write:messages"
    - "write:notes"
    - "write:polls"
    - "write:relationships"
    - "write:innerworld"
    - "write:fields"
    - "write:check-ins"
    - "write:lifecycle-events"
    - "write:timers"
    - "write:buckets"
    # Per-domain delete scopes
    - "delete:members"
    - "delete:fronting"
    - "delete:groups"
    - "delete:system"
    - "delete:structure"
    - "delete:reports"
    - "delete:webhooks"
    - "delete:blobs"
    - "delete:notifications"
    - "delete:acknowledgements"
    - "delete:channels"
    - "delete:messages"
    - "delete:notes"
    - "delete:polls"
    - "delete:relationships"
    - "delete:innerworld"
    - "delete:fields"
    - "delete:check-ins"
    - "delete:lifecycle-events"
    - "delete:timers"
    - "delete:buckets"
    # Special scopes
    - "read:audit-log"
    - "read-all"
    - "write-all"
    - "delete-all"
    - "full"
  description: |
    Permission scope granted to an API key. Scopes follow the
    `<tier>:<domain>` pattern plus a small set of special values.

    - Tiers: `read` (list/get), `write` (create/update), `delete` (destroy).
    - Aggregates: `read-all`, `write-all`, `delete-all` grant the tier across every domain.
    - `read:audit-log` is the only audit-log scope (read-only by design).
    - `full` grants unrestricted access including audit-log and api-key management endpoints.

ApiKeyResponse:
  description: |
    An API key. The plaintext `token` is only returned on creation and
    cannot be retrieved again.
  type: object
  required:
    [
      id,
      systemId,
      keyType,
      scopes,
      createdAt,
      lastUsedAt,
      revokedAt,
      expiresAt,
      scopedBucketIds,
      encryptedData,
    ]
  properties:
    id:
      type: string
      pattern: ^ak_
      description: "API key ID (ak_ prefix)"
      example: "ak_abc123def456"
    systemId:
      type: string
      pattern: ^sys_
      description: "System ID that owns this key"
      example: "sys_abc123def456"
    keyType:
      $ref: "#/ApiKeyType"
    scopes:
      type: array
      items:
        $ref: "#/ApiKeyScope"
      description: "Permission scopes granted to this key"
    createdAt:
      type: integer
      format: int64
      description: "Unix milliseconds when the key was created"
      example: 1710000000000
    lastUsedAt:
      type: integer
      format: int64
      nullable: true
      description: "Unix milliseconds when the key was last used"
    revokedAt:
      type: integer
      format: int64
      nullable: true
      description: "Unix milliseconds when the key was revoked, null if active"
    expiresAt:
      type: integer
      format: int64
      nullable: true
      description: "Unix milliseconds when the key expires, null if no expiry"
    scopedBucketIds:
      type: array
      items:
        type: string
      nullable: true
      description: "Privacy bucket IDs this key is scoped to, null if unrestricted"
    encryptedData:
      type: string
      description: |
        Base64-encoded T1 ciphertext blob carrying the `ApiKeyEncryptedPayload`
        (name plus, for crypto variants, the X25519 publicKey). Decrypted
        client-side via `decryptApiKeyPayload` from `@pluralscape/data`.

ApiKeyCreateResponse:
  description: |
    Response from creating an API key. Includes the plaintext `token`
    which is only exposed once. The client must store it securely.
  allOf:
    - $ref: "#/ApiKeyResponse"
    - type: object
      required: [token]
      properties:
        token:
          type: string
          description: "Plaintext API key token (hex-encoded, 64 characters). Only returned on creation."
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"

CreateApiKeyRequest:
  type: object
  required: [keyType, scopes, encryptedData]
  properties:
    keyType:
      $ref: "#/ApiKeyType"
    scopes:
      type: array
      items:
        $ref: "#/ApiKeyScope"
      minItems: 1
      description: "Permission scopes to grant. At least one required."
    encryptedData:
      type: string
      minLength: 1
      maxLength: 87382
      description: |
        Base64-encoded ciphertext blob containing the key's metadata,
        encrypted client-side with the master key.
    encryptedKeyMaterial:
      type: string
      minLength: 1
      description: |
        Base64-encoded encrypted key material. Required for `crypto` keys,
        forbidden for `metadata` keys.
    expiresAt:
      type: integer
      format: int64
      description: "Optional Unix timestamp (seconds) when the key should expire"
    scopedBucketIds:
      type: array
      items:
        type: string
        minLength: 1
      description: "Optional list of privacy bucket IDs to restrict this key to"
