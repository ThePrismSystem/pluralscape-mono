CreateStructureEntityTypeRequest:
  type: object
  required: [encryptedData, sortOrder]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextStructureEntityType (see ./plaintext.yaml#/PlaintextStructureEntityType)"
    sortOrder:
      type: integer
      minimum: 0
      description: Display order among entity types

UpdateStructureEntityTypeRequest:
  type: object
  required: [encryptedData, sortOrder, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextStructureEntityType (see ./plaintext.yaml#/PlaintextStructureEntityType)"
    sortOrder:
      type: integer
      minimum: 0
    version:
      type: integer
      minimum: 1

StructureEntityTypeResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [sortOrder]
      properties:
        sortOrder:
          type: integer
          description: Display order among entity types

CreateStructureEntityRequest:
  type: object
  required: [encryptedData, entityTypeId, sortOrder]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextStructureEntity (see ./plaintext.yaml#/PlaintextStructureEntity)"
    entityTypeId:
      type: string
      description: ID of the entity type this entity belongs to
    sortOrder:
      type: integer
      minimum: 0
      description: Display order among entities of the same type

UpdateStructureEntityRequest:
  type: object
  required: [encryptedData, sortOrder, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextStructureEntity (see ./plaintext.yaml#/PlaintextStructureEntity)"
    sortOrder:
      type: integer
      minimum: 0
    version:
      type: integer
      minimum: 1

StructureEntityResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [entityTypeId, sortOrder]
      properties:
        entityTypeId:
          type: string
          description: ID of the entity type this entity belongs to
        sortOrder:
          type: integer
          description: Display order among entities of the same type

CreateStructureEntityLinkRequest:
  type: object
  required: [entityId, sortOrder]
  properties:
    entityId:
      type: string
      description: ID of the entity to link
    parentEntityId:
      type: string
      nullable: true
      description: ID of the parent entity, or null for a top-level link
    sortOrder:
      type: integer
      minimum: 0
      description: Display order among sibling links

StructureEntityLinkResponse:
  type: object
  required: [id, systemId, entityId, sortOrder, createdAt]
  properties:
    id:
      type: string
      description: Link identifier
    systemId:
      type: string
      description: System that owns this link
    entityId:
      type: string
      description: ID of the linked entity
    parentEntityId:
      type: string
      nullable: true
      description: ID of the parent entity, or null for a top-level link
    sortOrder:
      type: integer
      description: Display order among sibling links
    createdAt:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds

CreateStructureEntityMemberLinkRequest:
  type: object
  required: [memberId, sortOrder]
  properties:
    memberId:
      type: string
      description: ID of the member to link
    parentEntityId:
      type: string
      nullable: true
      description: ID of the parent entity this member is linked under, or null for a top-level link
    sortOrder:
      type: integer
      minimum: 0
      description: Display order among sibling member links

StructureEntityMemberLinkResponse:
  type: object
  required: [id, systemId, memberId, sortOrder, createdAt]
  properties:
    id:
      type: string
      description: Link identifier
    systemId:
      type: string
      description: System that owns this link
    parentEntityId:
      type: string
      nullable: true
      description: ID of the parent entity this member is linked under, or null for a top-level link
    memberId:
      type: string
      description: ID of the linked member
    sortOrder:
      type: integer
      description: Display order among sibling member links
    createdAt:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds

CreateStructureEntityAssociationRequest:
  type: object
  required: [sourceEntityId, targetEntityId]
  properties:
    sourceEntityId:
      type: string
      description: ID of the source entity in the association
    targetEntityId:
      type: string
      description: ID of the target entity in the association

StructureEntityAssociationResponse:
  type: object
  required: [id, systemId, sourceEntityId, targetEntityId, createdAt]
  properties:
    id:
      type: string
      description: Association identifier
    systemId:
      type: string
      description: System that owns this association
    sourceEntityId:
      type: string
      description: ID of the source entity
    targetEntityId:
      type: string
      description: ID of the target entity
    createdAt:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds
