CreateRegionRequest:
  type: object
  required: [encryptedData]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextInnerworldRegion (see ./plaintext.yaml#/PlaintextInnerworldRegion)"
    parentRegionId:
      type: string
      nullable: true
      description: ID of the parent region for nesting

UpdateRegionRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextInnerworldRegion (see ./plaintext.yaml#/PlaintextInnerworldRegion)"
    version:
      type: integer
      minimum: 1

RegionResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [parentRegionId]
      properties:
        parentRegionId:
          type: string
          nullable: true
          description: ID of the parent region, null for top-level regions

CreateEntityRequest:
  type: object
  required: [encryptedData]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextInnerworldEntity (see ./plaintext.yaml#/PlaintextInnerworldEntity)"
    regionId:
      type: string
      nullable: true
      description: ID of the region this entity belongs to

UpdateEntityRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextInnerworldEntity (see ./plaintext.yaml#/PlaintextInnerworldEntity)"
    version:
      type: integer
      minimum: 1

EntityResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [regionId]
      properties:
        regionId:
          type: string
          nullable: true
          description: ID of the region this entity belongs to

UpdateCanvasRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextInnerworldCanvas (see ./plaintext.yaml#/PlaintextInnerworldCanvas)"
    version:
      type: integer
      minimum: 1

CanvasResponse:
  type: object
  description: |
    Singleton per-system innerworld canvas. Keyed by `systemId` (not a
    standalone `id`) and without archive state — the client only ever
    has one canvas per system and restores fresh state on delete rather
    than archiving.
  required: [systemId, encryptedData, version, createdAt, updatedAt]
  properties:
    systemId:
      type: string
      description: System identifier (sys_ prefix)
      example: "sys_abc123def456"
    encryptedData:
      type: string
      contentEncoding: base64
      description: |
        Base64-encoded XChaCha20-Poly1305 ciphertext of
        `PlaintextInnerworldCanvas`. Opaque to the server.
    version:
      type: integer
      minimum: 1
      description: Optimistic concurrency version
    createdAt:
      type: integer
      format: int64
      description: Creation timestamp (UnixMillis)
    updatedAt:
      type: integer
      format: int64
      description: Last update timestamp (UnixMillis)
