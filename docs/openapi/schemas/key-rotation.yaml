RotationState:
  type: string
  enum: [initiated, migrating, sealing, completed, failed]
  example: migrating

InitiateRotationRequest:
  type: object
  required: [wrappedNewKey, newKeyVersion, friendKeyGrants]
  properties:
    wrappedNewKey:
      type: string
      minLength: 1
      description: New bucket key encrypted with the master key
    newKeyVersion:
      type: integer
      minimum: 2
      description: Version number for the new key (must be greater than current)
    friendKeyGrants:
      type: array
      items:
        type: object
        required: [friendAccountId, encryptedKey]
        properties:
          friendAccountId:
            type: string
            minLength: 1
            description: Account ID of the friend receiving the key grant
          encryptedKey:
            type: string
            minLength: 1
            description: New bucket key encrypted with the friend's X25519 public key

RotationResponse:
  type: object
  required:
    [
      id,
      bucketId,
      fromKeyVersion,
      toKeyVersion,
      state,
      initiatedAt,
      totalItems,
      completedItems,
      failedItems,
    ]
  properties:
    id:
      type: string
      description: Rotation identifier
    bucketId:
      type: string
      description: Privacy bucket being rotated
    fromKeyVersion:
      type: integer
      description: Previous key version
    toKeyVersion:
      type: integer
      description: New key version
    state:
      $ref: "#/RotationState"
    initiatedAt:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds when rotation started
    completedAt:
      type: integer
      format: int64
      nullable: true
      description: Unix timestamp in milliseconds when rotation completed
    totalItems:
      type: integer
      description: Total number of items to re-encrypt
    completedItems:
      type: integer
      description: Number of items successfully re-encrypted
    failedItems:
      type: integer
      description: Number of items that failed re-encryption

ClaimChunkRequest:
  type: object
  properties:
    chunkSize:
      type: integer
      minimum: 1
      maximum: 200
      default: 50
      description: Number of items to claim for re-encryption

ClaimChunkResponse:
  type: object
  required: [items, rotationState]
  properties:
    items:
      type: array
      items:
        type: object
        required: [id, rotationId, entityType, entityId, status]
        properties:
          id:
            type: string
            description: Rotation item identifier
          rotationId:
            type: string
          entityType:
            type: string
            description: Type of entity to re-encrypt
          entityId:
            type: string
            description: ID of the entity to re-encrypt
          status:
            type: string
          claimedBy:
            type: string
            nullable: true
          claimedAt:
            type: integer
            format: int64
            nullable: true
          completedAt:
            type: integer
            format: int64
            nullable: true
          attempts:
            type: integer
    rotationState:
      $ref: "#/RotationState"

CompleteChunkRequest:
  type: object
  required: [items]
  properties:
    items:
      type: array
      minItems: 1
      items:
        type: object
        required: [itemId, status]
        properties:
          itemId:
            type: string
            minLength: 1
            description: ID of the rotation item
          status:
            type: string
            enum: [completed, failed]
            description: Whether re-encryption succeeded or failed

CompleteChunkResponse:
  type: object
  required: [rotation, transitioned]
  properties:
    rotation:
      $ref: "#/RotationResponse"
    transitioned:
      type: boolean
      description: Whether the rotation state transitioned (e.g., to sealing or completed)
