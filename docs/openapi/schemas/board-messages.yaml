BoardMessageResponse:
  description: |
    A persistent board message (noticeboard entry). Extends EncryptedEntity
    with board-specific server-visible fields for pinning and ordering.
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [pinned, sortOrder]
      properties:
        pinned:
          type: boolean
          description: Whether this board message is pinned to the top
        sortOrder:
          type: integer
          minimum: 0
          description: Display order (ascending)

CreateBoardMessageRequest:
  type: object
  required: [encryptedData, sortOrder]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted board message content (text, author proxy identity, etc.)"
    sortOrder:
      type: integer
      minimum: 0
    pinned:
      type: boolean
      default: false

UpdateBoardMessageRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted board message content"
    version:
      type: integer
      minimum: 1
    sortOrder:
      type: integer
      minimum: 0
    pinned:
      type: boolean

ReorderBoardMessagesRequest:
  type: object
  required: [operations]
  properties:
    operations:
      type: array
      minItems: 1
      maxItems: 100
      items:
        type: object
        required: [boardMessageId, sortOrder]
        properties:
          boardMessageId:
            type: string
            pattern: ^bm_
            description: Board message ID to reorder
          sortOrder:
            type: integer
            minimum: 0
