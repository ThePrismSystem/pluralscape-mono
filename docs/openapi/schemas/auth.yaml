LoginRequest:
  type: object
  required: [email, authKey]
  properties:
    email:
      type: string
      format: email
      example: "user@example.com"
    authKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
      description: 32-byte hex-encoded auth key derived from password via Argon2id

LoginResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [sessionToken, accountId, accountType]
      properties:
        sessionToken:
          type: string
          description: 32-byte hex-encoded session token (64 characters)
          example: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
        accountId:
          type: string
          example: "acct_abc123"
        systemId:
          type: string
          nullable: true
          example: "sys_abc123"
        accountType:
          type: string
          enum: [system, viewer]
        encryptedMasterKey:
          type: string
          pattern: "^[0-9a-f]+$"
          description: E2E-encrypted master key blob (hex-encoded)
        kdfSalt:
          type: string
          pattern: "^[0-9a-f]{32}$"
          description: Hex-encoded 16-byte Argon2id salt

SaltRequest:
  type: object
  required: [email]
  properties:
    email:
      type: string
      format: email

SaltResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [kdfSalt]
      properties:
        kdfSalt:
          type: string
          pattern: "^[0-9a-f]{32}$"
          description: Hex-encoded 16-byte Argon2id salt

RegistrationInitiateRequest:
  type: object
  required: [email]
  properties:
    email:
      type: string
      format: email
    accountType:
      type: string
      enum: [system, viewer]
      default: system

RegistrationInitiateResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [accountId, kdfSalt, challengeNonce]
      properties:
        accountId:
          type: string
          pattern: "^acct_"
        kdfSalt:
          type: string
          pattern: "^[0-9a-f]{32}$"
        challengeNonce:
          type: string
          pattern: "^[0-9a-f]{64}$"

RegistrationCommitRequest:
  type: object
  required:
    [
      accountId,
      authKey,
      encryptedMasterKey,
      encryptedSigningPrivateKey,
      encryptedEncryptionPrivateKey,
      publicSigningKey,
      publicEncryptionKey,
      recoveryEncryptedMasterKey,
      challengeSignature,
      recoveryKeyBackupConfirmed,
      recoveryKeyHash,
    ]
  properties:
    accountId:
      type: string
      pattern: "^acct_"
    authKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
    encryptedMasterKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    encryptedSigningPrivateKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    encryptedEncryptionPrivateKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    publicSigningKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
    publicEncryptionKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
    recoveryEncryptedMasterKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    challengeSignature:
      type: string
      pattern: "^[0-9a-f]{128}$"
    recoveryKeyBackupConfirmed:
      type: boolean
      const: true
    recoveryKeyHash:
      type: string
      pattern: "^[0-9a-f]{64}$"

RegistrationCommitResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [sessionToken, accountId, accountType]
      properties:
        sessionToken:
          type: string
        accountId:
          type: string
        accountType:
          type: string
          enum: [system, viewer]

PasswordResetViaRecoveryKeyRequest:
  type: object
  required:
    [
      email,
      recoveryKey,
      newAuthKey,
      newKdfSalt,
      newEncryptedMasterKey,
      newRecoveryEncryptedMasterKey,
      recoveryKeyHash,
      newRecoveryKeyHash,
    ]
  properties:
    email:
      type: string
      format: email
    recoveryKey:
      type: string
      minLength: 1
      maxLength: 200
    newAuthKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
    newKdfSalt:
      type: string
      pattern: "^[0-9a-f]{32}$"
    newEncryptedMasterKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    newRecoveryEncryptedMasterKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    recoveryKeyHash:
      type: string
      pattern: "^[0-9a-f]{64}$"
    newRecoveryKeyHash:
      type: string
      pattern: "^[0-9a-f]{64}$"

PasswordResetResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [sessionToken, accountId]
      properties:
        sessionToken:
          type: string
        accountId:
          type: string

BiometricTokenRequest:
  type: object
  required: [token]
  properties:
    token:
      type: string
      minLength: 1
      maxLength: 4096
      description: Platform-specific biometric token

BiometricEnrollResponse:
  type: object
  required: [enrolled]
  properties:
    enrolled:
      type: boolean
      description: Whether biometric enrollment succeeded

BiometricVerifyResponse:
  type: object
  required: [valid, sessionToken]
  properties:
    valid:
      type: boolean
      description: Whether the biometric verification succeeded
    sessionToken:
      type: string
      nullable: true
      description: New session token if verification succeeded, null otherwise

SessionInfo:
  type: object
  required: [id, createdAt]
  properties:
    id:
      type: string
      description: Session identifier
      example: "sess_abc123"
    createdAt:
      type: integer
      format: int64
      description: Unix timestamp in milliseconds
    lastActive:
      type: integer
      format: int64
      nullable: true
      description: Unix timestamp in milliseconds of last activity
    expiresAt:
      type: integer
      format: int64
      nullable: true
      description: Unix timestamp in milliseconds when the session expires

SessionListResponse:
  type: object
  required: [sessions, hasMore]
  properties:
    sessions:
      type: array
      items:
        $ref: "#/SessionInfo"
    nextCursor:
      type: string
      nullable: true
    hasMore:
      type: boolean

RegenerateRecoveryKeyRequest:
  type: object
  required: [authKey, newRecoveryEncryptedMasterKey, recoveryKeyHash, confirmed]
  properties:
    authKey:
      type: string
      pattern: "^[0-9a-f]{64}$"
    newRecoveryEncryptedMasterKey:
      type: string
      pattern: "^[0-9a-f]+$"
      minLength: 80
    recoveryKeyHash:
      type: string
      pattern: "^[0-9a-f]{64}$"
    confirmed:
      type: boolean
      const: true

RegenerateRecoveryKeyResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

RecoveryKeyStatusResponse:
  type: object
  properties:
    hasRecoveryKey:
      type: boolean
    createdAt:
      type: integer
      format: int64
      nullable: true
      description: Unix timestamp in milliseconds when the recovery key was created

RevokeAllResponse:
  type: object
  required: [data]
  properties:
    data:
      type: object
      required: [revokedCount]
      properties:
        revokedCount:
          type: integer
          description: Number of sessions revoked
