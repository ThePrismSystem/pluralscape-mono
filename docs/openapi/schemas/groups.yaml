GroupResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [parentGroupId, sortOrder]
      properties:
        parentGroupId:
          type: string
          nullable: true
        sortOrder:
          type: integer

CreateGroupRequest:
  type: object
  required: [encryptedData, parentGroupId, sortOrder]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)"
    parentGroupId:
      type: string
      nullable: true
    sortOrder:
      type: integer
      minimum: 0

UpdateGroupRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)"
    version:
      type: integer
      minimum: 1

MoveGroupRequest:
  type: object
  required: [targetParentGroupId, version]
  properties:
    targetParentGroupId:
      type: string
      nullable: true
    version:
      type: integer
      minimum: 1

CopyGroupRequest:
  type: object
  properties:
    targetParentGroupId:
      type: string
      nullable: true
    copyMemberships:
      type: boolean
      default: false

ReorderGroupsRequest:
  type: object
  required: [operations]
  properties:
    operations:
      type: array
      minItems: 1
      maxItems: 100
      items:
        type: object
        required: [groupId, sortOrder]
        properties:
          groupId:
            type: string
          sortOrder:
            type: integer
            minimum: 0

AddGroupMemberRequest:
  type: object
  required: [memberId]
  properties:
    memberId:
      type: string

GroupMembership:
  type: object
  required: [groupId, memberId]
  properties:
    groupId:
      type: string
    memberId:
      type: string
