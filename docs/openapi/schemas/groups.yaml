GroupResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [parentGroupId, sortOrder]
      properties:
        parentGroupId:
          type: string
          nullable: true
          description: ID of the parent group, null for top-level groups
          example: "grp_parent123"
        sortOrder:
          type: integer
          description: Display order among sibling groups
          example: 0

GroupTreeNode:
  type: object
  description: A node in the hierarchical group tree, with nested children
  required: [id, systemId, encryptedData, sortOrder, children]
  properties:
    id:
      type: string
      example: "grp_abc123"
    systemId:
      type: string
      example: "sys_abc123"
    encryptedData:
      type: string
      contentEncoding: base64
      description: "T1-encrypted PlaintextGroup"
    parentGroupId:
      type: string
      nullable: true
    sortOrder:
      type: integer
    version:
      type: integer
    archived:
      type: boolean
    children:
      type: array
      items:
        $ref: "#/GroupTreeNode"
      description: Nested child groups

CreateGroupRequest:
  type: object
  required: [encryptedData, parentGroupId, sortOrder]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)"
    parentGroupId:
      type: string
      nullable: true
      description: ID of the parent group, null for top-level groups
    sortOrder:
      type: integer
      minimum: 0
      description: Display order among sibling groups

UpdateGroupRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)"
    version:
      type: integer
      minimum: 1

MoveGroupRequest:
  type: object
  required: [targetParentGroupId, version]
  properties:
    targetParentGroupId:
      type: string
      nullable: true
      description: ID of the new parent group, null to make top-level
    version:
      type: integer
      minimum: 1

CopyGroupRequest:
  type: object
  properties:
    targetParentGroupId:
      type: string
      nullable: true
      description: ID of the parent group for the copy, null for top-level
    copyMemberships:
      type: boolean
      default: false
      description: Whether to copy member assignments to the new group

ReorderGroupsRequest:
  type: object
  required: [operations]
  properties:
    operations:
      type: array
      minItems: 1
      maxItems: 100
      items:
        type: object
        required: [groupId, sortOrder]
        properties:
          groupId:
            type: string
          sortOrder:
            type: integer
            minimum: 0

AddGroupMemberRequest:
  type: object
  required: [memberId]
  properties:
    memberId:
      type: string
      description: ID of the member to add to the group

GroupMembership:
  type: object
  required: [groupId, memberId]
  properties:
    groupId:
      type: string
      description: ID of the group
      example: "grp_abc123"
    memberId:
      type: string
      description: ID of the member
      example: "mem_def456"
