LifecycleEventType:
  type: string
  enum:
    - split
    - fusion
    - merge
    - unmerge
    - dormancy-start
    - dormancy-end
    - discovery
    - archival
    - subsystem-formation
    - form-change
    - name-change
    - structure-move
    - innerworld-move
  example: split

CreateLifecycleEventRequest:
  type: object
  required: [eventType, occurredAt, encryptedData]
  properties:
    eventType:
      $ref: "#/LifecycleEventType"
    occurredAt:
      type: integer
      format: int64
      minimum: 0
      description: Unix timestamp in milliseconds when the event occurred
    encryptedData:
      type: string
      contentEncoding: base64
      minLength: 1
      maxLength: 87382
      description: "T1-encrypted PlaintextLifecycleEvent (see ./plaintext.yaml#/PlaintextLifecycleEvent)"
    plaintextMetadata:
      type: object
      description: Server-visible metadata for querying and relationship tracking
      properties:
        memberIds:
          type: array
          items:
            type: string
          description: IDs of members involved in this event
        structureIds:
          type: array
          items:
            type: string
          description: IDs of structures involved
        entityIds:
          type: array
          items:
            type: string
          description: IDs of innerworld entities involved
        regionIds:
          type: array
          items:
            type: string
          description: IDs of innerworld regions involved

LifecycleEventResponse:
  allOf:
    - $ref: "./common.yaml#/EncryptedEntity"
    - type: object
      required: [eventType, occurredAt]
      properties:
        eventType:
          $ref: "#/LifecycleEventType"
        occurredAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the event occurred
        plaintextMetadata:
          type: object
          nullable: true
          description: Server-visible metadata (member/structure/entity/region IDs)
