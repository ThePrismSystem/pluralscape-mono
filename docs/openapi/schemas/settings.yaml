UpdateSystemSettingsRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 131072
      description: "T1-encrypted PlaintextSystemSettings (see ./plaintext.yaml#/PlaintextSystemSettings)"
    locale:
      type: string
      minLength: 1
      maxLength: 255
    biometricEnabled:
      type: boolean
    version:
      type: integer
      minimum: 1

UpdateNomenclatureRequest:
  type: object
  required: [encryptedData, version]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 131072
      description: "T1-encrypted PlaintextNomenclature (see ./plaintext.yaml#/PlaintextNomenclature)"
    version:
      type: integer
      minimum: 1

PinRequest:
  type: object
  required: [pin]
  properties:
    pin:
      type: string
      pattern: ^\d{4,6}$

PinVerifyResponse:
  type: object
  required: [valid]
  properties:
    valid:
      type: boolean

SetupStepRequest:
  type: object
  required: [encryptedData]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 131072
      description: |
        T1-encrypted data. For the nomenclature step: PlaintextNomenclature.
        For the profile step: PlaintextSystem.

SetupCompleteRequest:
  type: object
  required: [encryptedData, recoveryKeyBackupConfirmed]
  properties:
    encryptedData:
      type: string
      minLength: 1
      maxLength: 131072
      description: "T1-encrypted PlaintextSystemSettings (see ./plaintext.yaml#/PlaintextSystemSettings)"
    locale:
      type: string
      minLength: 1
      maxLength: 255
    biometricEnabled:
      type: boolean
    recoveryKeyBackupConfirmed:
      type: boolean
      const: true
