# ══════════════════════════════════════════════════════════════════
# CLIENT-SIDE PLAINTEXT SCHEMAS
#
# These schemas describe the JSON structures that clients should
# serialize and encrypt BEFORE sending as `encryptedData`. The server
# never sees these — they are client-enforced contracts only.
#
# Source of truth: packages/types/src/ in the monorepo.
# ══════════════════════════════════════════════════════════════════

# ── Shared sub-types ───────────────────────────────────────────────
PlaintextImageSource:
  description: |
    How an image is referenced. Either a blob stored via the Blobs API
    or an external URL.
  oneOf:
    - type: object
      required: [kind, blobRef]
      properties:
        kind:
          type: string
          const: blob
        blobRef:
          type: string
          description: BlobId from the Blobs API
    - type: object
      required: [kind, url]
      properties:
        kind:
          type: string
          const: external
        url:
          type: string
          format: uri

PlaintextSaturationLevel:
  description: How elaborated a member is within the system.
  oneOf:
    - type: object
      required: [kind, level]
      properties:
        kind:
          type: string
          const: known
        level:
          type: string
          enum: [fragment, functional-fragment, partially-elaborated, highly-elaborated]
    - type: object
      required: [kind, value]
      properties:
        kind:
          type: string
          const: custom
        value:
          type: string

PlaintextTag:
  description: |
    A tag for a member. Known tags have special semantics (e.g., "little"
    triggers Littles Safe Mode). Custom tags are user-defined.
  oneOf:
    - type: object
      required: [kind, tag]
      properties:
        kind:
          type: string
          const: known
        tag:
          type: string
          enum:
            - protector
            - gatekeeper
            - caretaker
            - little
            - age-slider
            - trauma-holder
            - host
            - persecutor
            - mediator
            - anp
            - memory-holder
            - symptom-holder
            - middle
            - introject
            - fictive
            - factive
            - non-human
    - type: object
      required: [kind, value]
      properties:
        kind:
          type: string
          const: custom
        value:
          type: string

PlaintextVisualProperties:
  description: Visual styling for innerworld entities.
  type: object
  required: [color, icon, size, opacity, imageSource, externalUrl]
  properties:
    color:
      type: string
      nullable: true
      description: "Hex color string (e.g., #FF00AA)"
    icon:
      type: string
      nullable: true
    size:
      type: number
      nullable: true
    opacity:
      type: number
      nullable: true
      minimum: 0
      maximum: 1
    imageSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"
    externalUrl:
      type: string
      format: uri
      nullable: true

# ── Resource plaintext schemas ─────────────────────────────────────

PlaintextSystem:
  description: |
    **Encrypted into**: `encryptedData` on `POST /systems`, `PUT /systems/:id`

    The system profile visible after client-side decryption.
    Encryption tier: **T1** (master-key encrypted).
  type: object
  required: [name, displayName, description, avatarSource]
  properties:
    name:
      type: string
      description: Display name of the plural system
    displayName:
      type: string
      nullable: true
      description: Optional alternate display name
    description:
      type: string
      nullable: true
    avatarSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"

PlaintextMember:
  description: |
    **Encrypted into**: `encryptedData` on member create/update endpoints.

    A member (headmate) profile. Encryption tier: **T1** (master-key encrypted).
  type: object
  required:
    - name
    - pronouns
    - description
    - avatarSource
    - colors
    - saturationLevel
    - tags
    - suppressFriendFrontNotification
    - boardMessageNotificationOnFront
  properties:
    name:
      type: string
    pronouns:
      type: array
      items:
        type: string
      description: "List of pronoun sets (e.g., ['she/her', 'they/them'])"
    description:
      type: string
      nullable: true
    avatarSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"
    colors:
      type: array
      items:
        type: string
        description: "Hex color (e.g., #FF00AA)"
      description: Member's associated colors (for UI theming)
    saturationLevel:
      $ref: "#/PlaintextSaturationLevel"
    tags:
      type: array
      items:
        $ref: "#/PlaintextTag"
    suppressFriendFrontNotification:
      type: boolean
      description: When true, friends are not notified when this member starts fronting
    boardMessageNotificationOnFront:
      type: boolean
      description: When true, a board message is posted when this member starts fronting

PlaintextMemberPhoto:
  description: |
    **Encrypted into**: `encryptedData` on member photo create endpoints.

    A photo entry in a member's gallery. Encryption tier: **T1**.
  type: object
  required: [imageSource, caption]
  properties:
    imageSource:
      $ref: "#/PlaintextImageSource"
    caption:
      type: string
      nullable: true

PlaintextGroup:
  description: |
    **Encrypted into**: `encryptedData` on group create/update endpoints.

    A user-defined group for organizing members. Encryption tier: **T1**.
  type: object
  required: [name, description, imageSource, color, emoji]
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    imageSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"
    color:
      type: string
      nullable: true
      description: "Hex color (e.g., #FF00AA)"
    emoji:
      type: string
      nullable: true

PlaintextCustomFront:
  description: |
    **Encrypted into**: `encryptedData` on custom front create/update endpoints.

    An abstract cognitive state logged like a member (e.g., "Dissociated", "Blurry").
    Encryption tier: **T1**.
  type: object
  required: [name, description, color, emoji]
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    color:
      type: string
      nullable: true
      description: "Hex color"
    emoji:
      type: string
      nullable: true

PlaintextFieldDefinition:
  description: |
    **Encrypted into**: `encryptedData` on field definition create/update endpoints.

    A user-defined custom field definition (name, description, options for
    select/multi-select types). Encryption tier: **T1**.
  type: object
  required: [name, description, options]
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    options:
      type: array
      items:
        type: string
      nullable: true
      description: Valid options for select/multi-select field types. Null for other types.

PlaintextFieldValue:
  description: |
    **Encrypted into**: `encryptedData` on field value set/update endpoints.

    A typed value for a custom field on a member. Wraps the
    discriminated `value` (keyed by `fieldType`) so the encrypted
    payload parity matches the domain projection
    `Pick<FieldValue, "value">`. Encryption tier: **T1**.
  type: object
  required: [value]
  properties:
    value:
      oneOf:
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: text
            value:
              type: string
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: number
            value:
              type: number
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: boolean
            value:
              type: boolean
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: date
            value:
              type: string
              description: ISO 8601 date string
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: color
            value:
              type: string
              description: "Hex color (e.g., #FF00AA)"
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: select
            value:
              type: string
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: multi-select
            value:
              type: array
              items:
                type: string
        - type: object
          required: [fieldType, value]
          properties:
            fieldType:
              type: string
              const: url
            value:
              type: string
              format: uri

PlaintextRelationship:
  description: |
    **Encrypted into**: `encryptedData` on relationship create/update endpoints.

    Encrypted metadata for a relationship between two members.
    Note: `sourceMemberId`, `targetMemberId`, `type`, and `bidirectional`
    are sent as **separate plaintext fields** in the request body (not inside
    `encryptedData`) because the server needs them for querying.
    The `encryptedData` is a discriminated blob: custom-type relationships
    carry `{ label: string }`, standard-type relationships carry `{}`.
    Encryption tier: **T1**.
  oneOf:
    - description: Custom-type relationship — carries a user-defined label.
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: User-defined label for a custom relationship type.
    - description: Standard-type relationship — no label field.
      type: object
      properties: {}

PlaintextStructureEntityType:
  description: |
    **Encrypted into**: `encryptedData` on structure entity type create/update endpoints.

    A user-defined structure entity type within the system (e.g., "Subsystem",
    "Side System", "Layer"). Encryption tier: **T1**.
  type: object
  required: [name, description, color, imageSource, emoji]
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    color:
      type: string
      nullable: true
    imageSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"
    emoji:
      type: string
      nullable: true

PlaintextStructureEntity:
  description: |
    **Encrypted into**: `encryptedData` on structure entity create/update endpoints.

    An instance of a user-defined structure entity type. Encryption tier: **T1**.
  type: object
  required: [name, description, color, imageSource, emoji]
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    color:
      type: string
      nullable: true
    imageSource:
      oneOf:
        - $ref: "#/PlaintextImageSource"
        - type: "null"
    emoji:
      type: string
      nullable: true

PlaintextFrontingSession:
  description: |
    **Encrypted into**: `encryptedData` on fronting session create/update endpoints.

    Encrypted metadata for a fronting session. Note: `memberId`, `customFrontId`,
    `structureEntityId`, `startTime`, and `endTime` are sent as separate plaintext
    fields. Encryption tier: **T1**.
  type: object
  required: [comment, positionality, outtrigger, outtriggerSentiment]
  properties:
    comment:
      type: string
      nullable: true
      description: Free-text status comment on the session (max 50 characters, runtime enforced)
    positionality:
      type: string
      nullable: true
      description: Free-text description of fronting positionality (e.g. close vs far, height)
    outtrigger:
      type: string
      nullable: true
      description: Free-text reason describing what caused the fronting change
    outtriggerSentiment:
      type: string
      enum: [negative, neutral, positive]
      nullable: true
      description: Sentiment classification for the outtrigger reason

PlaintextLifecycleEvent:
  description: |
    **Encrypted into**: `encryptedData` on lifecycle event create endpoint.

    Per-variant encrypted details of a lifecycle event. `eventType`,
    `occurredAt`, and `plaintextMetadata` (member/structure/entity/region
    IDs) are sent as separate plaintext fields. Encryption tier: **T1**.

    Each variant carries `notes` plus its own variant-specific keys.
  oneOf:
    - description: Split, Fusion, Merge, Unmerge, Discovery, StructureEntityFormation, StructureMove — notes only
      type: object
      required: [notes]
      properties:
        notes:
          type: string
          nullable: true
    - description: DormancyStart, DormancyEnd — notes + relatedLifecycleEventId
      type: object
      required: [notes, relatedLifecycleEventId]
      properties:
        notes:
          type: string
          nullable: true
        relatedLifecycleEventId:
          type: string
          nullable: true
    - description: Archival — notes + entity reference
      type: object
      required: [notes, entity]
      properties:
        notes:
          type: string
          nullable: true
        entity:
          type: object
          required: [entityType, entityId]
          properties:
            entityType:
              type: string
            entityId:
              type: string
    - description: FormChange — notes + previousForm + newForm
      type: object
      required: [notes, previousForm, newForm]
      properties:
        notes:
          type: string
          nullable: true
        previousForm:
          type: string
          nullable: true
        newForm:
          type: string
          nullable: true
    - description: NameChange — notes + previousName + newName
      type: object
      required: [notes, previousName, newName]
      properties:
        notes:
          type: string
          nullable: true
        previousName:
          type: string
          nullable: true
        newName:
          type: string
    - description: InnerworldMove — notes + entityType
      type: object
      required: [notes, entityType]
      properties:
        notes:
          type: string
          nullable: true
        entityType:
          type: string
          enum: [member, landmark, structure-entity]

PlaintextInnerworldRegion:
  description: |
    **Encrypted into**: `encryptedData` on innerworld region create/update endpoints.

    A region within the system's innerworld. Encryption tier: **T1**.
  type: object
  required:
    - name
    - description
    - visual
    - boundaryData
    - accessType
    - gatekeeperMemberIds
  properties:
    name:
      type: string
    description:
      type: string
      nullable: true
    visual:
      $ref: "#/PlaintextVisualProperties"
    boundaryData:
      type: array
      items:
        type: object
        required: [x, y]
        properties:
          x:
            type: number
          y:
            type: number
      description: Polygon boundary points for the region on the canvas
    accessType:
      type: string
      enum: [open, gatekept]
    gatekeeperMemberIds:
      type: array
      items:
        type: string

PlaintextInnerworldEntity:
  description: |
    **Encrypted into**: `encryptedData` on innerworld entity create/update endpoints.

    An entity placed on the innerworld canvas. Discriminated on `entityType`.
    `regionId` is a plaintext sibling (server needs it for queries) and is
    therefore not present here. Encryption tier: **T1**.
  oneOf:
    - $ref: "#/PlaintextInnerworldMemberEntity"
    - $ref: "#/PlaintextInnerworldLandmarkEntity"
    - $ref: "#/PlaintextInnerworldStructureEntity"
  discriminator:
    propertyName: entityType
    mapping:
      member: "#/PlaintextInnerworldMemberEntity"
      landmark: "#/PlaintextInnerworldLandmarkEntity"
      structure-entity: "#/PlaintextInnerworldStructureEntity"

PlaintextInnerworldMemberEntity:
  description: Member-linked innerworld entity variant.
  type: object
  required: [entityType, positionX, positionY, visual, linkedMemberId]
  properties:
    entityType:
      type: string
      enum: [member]
    positionX:
      type: number
    positionY:
      type: number
    visual:
      $ref: "#/PlaintextVisualProperties"
    linkedMemberId:
      type: string
      description: Member ID (mem_ prefix)

PlaintextInnerworldLandmarkEntity:
  description: Landmark innerworld entity variant.
  type: object
  required: [entityType, positionX, positionY, visual, name, description]
  properties:
    entityType:
      type: string
      enum: [landmark]
    positionX:
      type: number
    positionY:
      type: number
    visual:
      $ref: "#/PlaintextVisualProperties"
    name:
      type: string
      description: Display name for the landmark
    description:
      type: string
      nullable: true

PlaintextInnerworldStructureEntity:
  description: Structure-entity-linked innerworld entity variant.
  type: object
  required: [entityType, positionX, positionY, visual, linkedStructureEntityId]
  properties:
    entityType:
      type: string
      enum: [structure-entity]
    positionX:
      type: number
    positionY:
      type: number
    visual:
      $ref: "#/PlaintextVisualProperties"
    linkedStructureEntityId:
      type: string
      description: Structure entity ID (ste_ prefix)

PlaintextInnerworldCanvas:
  description: |
    **Encrypted into**: `encryptedData` on `PUT /systems/:systemId/innerworld/canvas`.

    The viewport state for the innerworld canvas. Encryption tier: **T1**.
  type: object
  required: [viewportX, viewportY, zoom, dimensions]
  properties:
    viewportX:
      type: number
    viewportY:
      type: number
    zoom:
      type: number
    dimensions:
      type: object
      required: [width, height]
      properties:
        width:
          type: number
        height:
          type: number

PlaintextSystemSettings:
  description: |
    **Encrypted into**: `encryptedData` on `PUT /systems/:systemId/settings`.

    System-wide settings. Note: `locale` and `biometricEnabled` are sent as
    **separate plaintext fields** in the request body because the server needs
    them for locale-aware operations and biometric state tracking.
    Encryption tier: **T1**.
  type: object
  required:
    - theme
    - fontScale
    - appLock
    - notifications
    - syncPreferences
    - privacyDefaults
    - littlesSafeMode
    - saturationLevelsEnabled
    - autoCaptureFrontingOnJournal
    - snapshotSchedule
    - onboardingComplete
  properties:
    theme:
      type: string
      enum: [light, dark, high-contrast, system]
    fontScale:
      type: number
    appLock:
      type: object
      required: [pinEnabled, biometricEnabled, lockTimeout, backgroundGraceSeconds]
      properties:
        pinEnabled:
          type: boolean
        biometricEnabled:
          type: boolean
        lockTimeout:
          type: integer
          description: Lock timeout in minutes (1-30)
        backgroundGraceSeconds:
          type: integer
          description: Seconds to keep keys in memory after app backgrounds (0-300)
    notifications:
      type: object
      required: [pushEnabled, emailEnabled, switchReminders, checkInReminders]
      properties:
        pushEnabled:
          type: boolean
        emailEnabled:
          type: boolean
        switchReminders:
          type: boolean
        checkInReminders:
          type: boolean
    syncPreferences:
      type: object
      required: [syncEnabled, syncOnCellular]
      properties:
        syncEnabled:
          type: boolean
        syncOnCellular:
          type: boolean
    privacyDefaults:
      type: object
      required: [defaultBucketForNewContent, friendRequestPolicy]
      properties:
        defaultBucketForNewContent:
          type: string
          nullable: true
          description: BucketId
        friendRequestPolicy:
          type: string
          enum: [open, code-only]
    littlesSafeMode:
      type: object
      description: Simplified UI configuration for littles
      required: [enabled, allowedContentIds, simplifiedUIFlags]
      properties:
        enabled:
          type: boolean
        allowedContentIds:
          type: array
          items:
            type: string
        simplifiedUIFlags:
          type: object
          required: [largeButtons, iconDriven, noDeletion, noSettings, noAnalytics]
          properties:
            largeButtons:
              type: boolean
            iconDriven:
              type: boolean
            noDeletion:
              type: boolean
            noSettings:
              type: boolean
            noAnalytics:
              type: boolean
    saturationLevelsEnabled:
      type: boolean
    autoCaptureFrontingOnJournal:
      type: boolean
      description: Auto-capture fronting snapshot when creating a journal entry
    snapshotSchedule:
      type: string
      enum: [daily, weekly, disabled]
      description: |
        Automatic snapshot schedule. Client-triggered — the client reads
        this value and fires snapshots locally, preserving zero-knowledge.
    onboardingComplete:
      type: boolean

PlaintextNomenclature:
  description: |
    **Encrypted into**: `encryptedData` on nomenclature update and setup endpoints.

    Per-system terminology preferences — map of `TermCategory` to selected
    display term. Keys mirror the `TermCategory` union in
    `@pluralscape/types` (kebab-case) so the parity gate can project
    `Pick<NomenclatureSettings, NomenclatureEncryptedFields>` onto this
    schema directly.
    Encryption tier: **T1**.
  type: object
  required:
    - collective
    - individual
    - fronting
    - switching
    - co-presence
    - internal-space
    - primary-fronter
    - structure
    - dormancy
    - body
    - amnesia
    - saturation
  properties:
    collective:
      type: string
      description: "Term for the collective (default: 'System'). Presets: System, Collective, Household, Crew, Group"
    individual:
      type: string
      description: "Term for individuals (default: 'Member'). Presets: Member, Alter, Headmate, Part, Insider, Facet, Aspect"
    fronting:
      type: string
      description: "Term for fronting (default: 'Fronting'). Presets: Fronting, In front, Driving, Piloting"
    switching:
      type: string
      description: "Term for switching (default: 'Switch'). Presets: Switch, Shift"
    co-presence:
      type: string
      description: "Term for co-fronting (default: 'Co-fronting'). Presets: Co-fronting, Co-conscious, Co-driving"
    internal-space:
      type: string
      description: "Term for the internal space (default: 'Headspace'). Presets: Headspace, Innerworld"
    primary-fronter:
      type: string
      description: "Term for the host (default: 'Host'). Presets: Host, Primary fronter, Main fronter"
    structure:
      type: string
      description: "Term for system structure (default: 'System Structure'). Presets: System Structure, Topology, Map"
    dormancy:
      type: string
      description: "Term for dormancy (default: 'Dormancy'). Presets: Dormancy, Resting, Inactive"
    body:
      type: string
      description: "Term for the body (default: 'Body'). Presets: Body, Physical form, Vessel"
    amnesia:
      type: string
      description: "Term for amnesia (default: 'Amnesia'). Presets: Amnesia, Memory gap, Blackout"
    saturation:
      type: string
      description: "Term for saturation level (default: 'Saturation'). Presets: Saturation, Elaboration, Completeness"

PlaintextStructureEntityMemberLink:
  description: |
    Structure entity member links carry no encrypted payload today — every
    field (`memberId`, `parentEntityId`, `sortOrder`) is plaintext at the
    API layer. The schema is retained as an empty object so future encrypted
    additions plug in without a breaking rename; the current parity gate
    asserts the empty projection via the distributive-pick helper.
  type: object
  additionalProperties: false
  properties: {}

PlaintextStructureEntityAssociation:
  description: |
    Structure entity associations carry no encrypted payload today — every
    field (`sourceEntityId`, `targetEntityId`) is plaintext at the API
    layer. The schema is retained as an empty object so future encrypted
    additions plug in without a breaking rename; the current parity gate
    asserts the empty projection.
  type: object
  additionalProperties: false
  properties: {}
