/systems/{systemId}/fronting-reports:
  get:
    operationId: listFrontingReports
    tags: [Fronting Reports]
    summary: List fronting reports
    description: List stored fronting report snapshots with cursor pagination.
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated list of fronting reports
        content:
          application/json:
            schema:
              type: object
              required: [items, nextCursor, hasMore, totalCount]
              properties:
                items:
                  type: array
                  items:
                    $ref: "../schemas/analytics.yaml#/FrontingReportResponse"
                nextCursor:
                  type: string
                  nullable: true
                hasMore:
                  type: boolean
                totalCount:
                  type: integer
                  nullable: true
      "404":
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
  post:
    operationId: createFrontingReport
    tags: [Fronting Reports]
    summary: Create fronting report
    description: |
      Store an immutable encrypted report snapshot. The report is generated
      client-side and encrypted before submission. The server stores it
      opaquely and never decrypts the contents.
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/analytics.yaml#/CreateFrontingReportRequest"
    responses:
      "201":
        description: Report created
        content:
          application/json:
            schema:
              $ref: "../schemas/analytics.yaml#/FrontingReportResponse"
      "400":
        description: Invalid payload
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"
      "404":
        description: System not found
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/ErrorResponse"

/systems/{systemId}/fronting-reports/{reportId}:
  get:
    operationId: getFrontingReport
    tags: [Fronting Reports]
    summary: Get fronting report
    description: Retrieve a single fronting report by ID.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          pattern: ^fr_
        description: Fronting report ID (prefixed with `fr_`)
    responses:
      "200":
        description: Fronting report
        content:
          application/json:
            schema:
              $ref: "../schemas/analytics.yaml#/FrontingReportResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateFrontingReport
    tags: [Fronting Reports]
    summary: Update fronting report
    description: Update an existing fronting report's encrypted payload.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          pattern: ^fr_
        description: Fronting report ID (prefixed with `fr_`)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/analytics.yaml#/CreateFrontingReportRequest"
    responses:
      "200":
        description: Report updated
        content:
          application/json:
            schema:
              $ref: "../schemas/analytics.yaml#/FrontingReportResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteFrontingReport
    tags: [Fronting Reports]
    summary: Delete fronting report
    description: Permanently delete a fronting report.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          pattern: ^fr_
        description: Fronting report ID (prefixed with `fr_`)
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-reports/{reportId}/archive:
  post:
    operationId: archiveFrontingReport
    tags: [Fronting Reports]
    summary: Archive fronting report
    description: Marks a fronting report as archived.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          pattern: ^fr_
        description: Fronting report ID (prefixed with `fr_`)
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-reports/{reportId}/restore:
  post:
    operationId: restoreFrontingReport
    tags: [Fronting Reports]
    summary: Restore fronting report
    description: Removes the archived flag from a fronting report.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: reportId
        in: path
        required: true
        schema:
          type: string
          pattern: ^fr_
        description: Fronting report ID (prefixed with `fr_`)
    responses:
      "200":
        description: Report restored
        content:
          application/json:
            schema:
              $ref: "../schemas/analytics.yaml#/FrontingReportResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
