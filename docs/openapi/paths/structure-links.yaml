/systems/{systemId}/structure-links/subsystem-layer:
  get:
    operationId: listSubsystemLayerLinks
    tags: [Structure Links]
    summary: List subsystem-layer links
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: query
        schema:
          type: string
      - name: layerId
        in: query
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Link list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [links]
                  properties:
                    links:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/StructureLinkResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createSubsystemLayerLink
    tags: [Structure Links]
    summary: Link a subsystem to a layer
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateSubsystemLayerLinkRequest"
    responses:
      "201":
        description: Link created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureLinkResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure-links/subsystem-layer/{linkId}:
  delete:
    operationId: deleteSubsystemLayerLink
    tags: [Structure Links]
    summary: Delete a subsystem-layer link
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: linkId
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

