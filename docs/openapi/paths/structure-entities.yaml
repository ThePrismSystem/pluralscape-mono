/systems/{systemId}/structure/entities:
  get:
    operationId: listStructureEntities
    tags: [Structure Entities]
    summary: List structure entities
    description: Returns a paginated list of structure entities for the given system. Optionally filter by entity type. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityTypeId
        in: query
        description: Filter by structure entity type ID
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated structure entity list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [entities]
                  properties:
                    entities:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/StructureEntityResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createStructureEntity
    tags: [Structure Entities]
    summary: Create a structure entity
    description: Creates a new structure entity within the given system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateStructureEntityRequest"
    responses:
      "201":
        description: Structure entity created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure/entities/{entityId}:
  get:
    operationId: getStructureEntity
    tags: [Structure Entities]
    summary: Get a structure entity
    description: Returns details for a single structure entity by ID. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    responses:
      "200":
        description: Structure entity details
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateStructureEntity
    tags: [Structure Entities]
    summary: Update a structure entity
    description: Updates the encrypted payload or metadata for a structure entity. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/UpdateStructureEntityRequest"
    responses:
      "200":
        description: Structure entity updated
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteStructureEntity
    tags: [Structure Entities]
    summary: Delete a structure entity
    description: Permanently deletes a structure entity. Returns 409 if the entity has dependents. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure/entities/{entityId}/hierarchy:
  get:
    operationId: getStructureEntityHierarchy
    tags: [Structure Entities]
    summary: Get entity hierarchy
    description: |
      Returns the recursive parent-child hierarchy for a structure entity,
      including all ancestors and descendants with depth information.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    responses:
      "200":
        description: Entity hierarchy
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    $ref: "../schemas/structures.yaml#/HierarchyNode"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure/entities/{entityId}/archive:
  post:
    operationId: archiveStructureEntity
    tags: [Structure Entities]
    summary: Archive a structure entity
    description: Marks a structure entity as archived. Archived entities are hidden from default list views but not deleted. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    responses:
      "200":
        description: Structure entity archived
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure/entities/{entityId}/restore:
  post:
    operationId: restoreStructureEntity
    tags: [Structure Entities]
    summary: Restore an archived structure entity
    description: Removes the archived flag from a structure entity, making it visible in default list views again. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: path
        required: true
        description: Structure entity ID
        schema:
          type: string
    responses:
      "200":
        description: Structure entity restored
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/structure/entity-links:
  get:
    operationId: listStructureEntityLinks
    tags: [Structure Entity Links]
    summary: List structure entity links
    description: Returns a paginated list of parent-child links between structure entities. Optionally filter by entity or parent entity ID. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: entityId
        in: query
        description: Filter by child entity ID
        schema:
          type: string
      - name: parentEntityId
        in: query
        description: Filter by parent entity ID
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated entity link list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [links]
                  properties:
                    links:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/StructureEntityLinkResponse"
