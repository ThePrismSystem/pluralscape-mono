        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createStructureEntityLink
    tags: [Structure Entity Links]
    summary: Create a structure entity link
    description: Creates a parent-child link between two structure entities. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateStructureEntityLinkRequest"
    responses:
      "201":
        description: Entity link created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureEntityLinkResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

