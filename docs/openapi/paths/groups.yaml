/systems/{systemId}/groups:
  get:
    operationId: listGroups
    tags: [Groups]
    summary: List groups
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated group list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [groups]
                  properties:
                    groups:
                      type: array
                      items:
                        $ref: "../schemas/groups.yaml#/GroupResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createGroup
    tags: [Groups]
    summary: Create a group
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/groups.yaml#/CreateGroupRequest"
    responses:
      "201":
        description: Group created
        content:
          application/json:
            schema:
              $ref: "../schemas/groups.yaml#/GroupResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

