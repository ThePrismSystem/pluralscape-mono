      - name: customFrontId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Custom front archived
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/custom-fronts/{customFrontId}/restore:
  post:
    operationId: restoreCustomFront
    tags: [Custom Fronts]
    summary: Restore an archived custom front
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: customFrontId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Custom front restored
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/custom-fronts/{customFrontId}/delete:
  delete:
    operationId: deleteCustomFront
    tags: [Custom Fronts]
    summary: Delete a custom front
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: customFrontId
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
