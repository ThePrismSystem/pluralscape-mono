/account/friends/{connectionId}/dashboard:
  get:
    operationId: getFriendDashboard
    tags: [Friends]
    summary: Get friend dashboard
    description: |
      Returns a read-only summary view of a friend's system, filtered by
      privacy bucket access. The response includes all bucket-visible data.

      **Client responsibility:** The client MUST apply FriendVisibilitySettings
      (showMembers, showGroups, showStructure) after decrypting the
      connection's encrypted_data. The server is zero-knowledge and cannot
      enforce these toggles.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - name: connectionId
        in: path
        required: true
        schema:
          type: string
          pattern: "^fc_"
        description: The friend connection ID (owned by the authenticated account)
    responses:
      "200":
        description: Dashboard data filtered by bucket access
        content:
          application/json:
            schema:
              $ref: "../schemas/friend-dashboard.yaml#/FriendDashboardResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
