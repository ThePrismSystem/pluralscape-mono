/systems/{systemId}/layers/{layerId}/memberships:
  get:
    operationId: listLayerMemberships
    tags: [Structure Memberships]
    summary: List layer memberships
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: layerId
        in: path
        required: true
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Membership list
        content:
          application/json:
            schema:
              type: object
              required: [memberships]
              properties:
                memberships:
                  type: array
                  items:
                    type: object
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: addLayerMembership
    tags: [Structure Memberships]
    summary: Add a member to a layer
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: layerId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/AddStructureMembershipRequest"
    responses:
      "201":
        description: Membership created
        content:
          application/json:
            schema:
              type: object
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/layers/{layerId}/memberships/{membershipId}:
  delete:
    operationId: removeLayerMembership
    tags: [Structure Memberships]
    summary: Remove a membership from a layer
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: layerId
        in: path
        required: true
        schema:
          type: string
      - name: membershipId
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
