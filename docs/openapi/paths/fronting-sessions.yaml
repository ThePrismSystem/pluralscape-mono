/systems/{systemId}/fronting-sessions:
  get:
    operationId: listFrontingSessions
    tags: [Fronting Sessions]
    summary: List fronting sessions
    description: |
      Returns a paginated list of fronting sessions for the specified system.
      Supports filtering by member, custom front, structure entity, date range,
      and active-only status.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
      - name: memberId
        in: query
        schema:
          type: string
        description: Filter by member ID
      - name: customFrontId
        in: query
        schema:
          type: string
        description: Filter by custom front ID
      - name: structureEntityId
        in: query
        schema:
          type: string
        description: Filter by structure entity ID
      - name: startFrom
        in: query
        schema:
          type: integer
          format: int64
        description: Filter sessions starting at or after this Unix timestamp (ms)
      - name: startUntil
        in: query
        schema:
          type: integer
          format: int64
        description: Filter sessions starting at or before this Unix timestamp (ms)
      - name: activeOnly
        in: query
        schema:
          type: string
          enum: ["true", "false"]
        description: If true, only return sessions with no end time
      - name: includeArchived
        in: query
        schema:
          type: string
          enum: ["true", "false"]
        description: If true, include archived sessions in the response
    responses:
      "200":
        description: Paginated fronting session list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [items]
                  properties:
                    items:
                      type: array
                      items:
                        $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createFrontingSession
    tags: [Fronting Sessions]
    summary: Create a fronting session
    description: |
      Starts a new fronting session. At least one subject (memberId, customFrontId,
      or structureEntityId) is required. Retroactive startTime values are allowed.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/fronting.yaml#/CreateFrontingSessionRequest"
    responses:
      "201":
        description: Fronting session created
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-sessions/{sessionId}:
  get:
    operationId: getFrontingSession
    tags: [Fronting Sessions]
    summary: Get a fronting session
    description: |
      Returns a single fronting session by ID.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    responses:
      "200":
        description: Fronting session
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateFrontingSession
    tags: [Fronting Sessions]
    summary: Update a fronting session
    description: |
      Updates the encrypted data of a fronting session. Subject fields are
      immutable after creation. Requires version for OCC.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/fronting.yaml#/UpdateFrontingSessionRequest"
    responses:
      "200":
        description: Updated fronting session
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteFrontingSession
    tags: [Fronting Sessions]
    summary: Delete a fronting session
    description: |
      Permanently deletes a fronting session. Returns 409 if the session has
      dependent comments. Use archive instead for reversible removal.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-sessions/{sessionId}/end:
  post:
    operationId: endFrontingSession
    tags: [Fronting Sessions]
    summary: End a fronting session
    description: |
      Sets the endTime on an active session. endTime must be after startTime.
      Requires version for OCC.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/fronting.yaml#/EndFrontingSessionRequest"
    responses:
      "200":
        description: Session ended
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-sessions/{sessionId}/archive:
  post:
    operationId: archiveFrontingSession
    tags: [Fronting Sessions]
    summary: Archive a fronting session
    description: |
      Marks a fronting session as archived. Archived sessions are hidden from
      default list responses but remain accessible. Archival is always permitted
      regardless of dependents.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-sessions/{sessionId}/restore:
  post:
    operationId: restoreFrontingSession
    tags: [Fronting Sessions]
    summary: Restore an archived fronting session
    description: |
      Removes the archived flag from a fronting session, making it visible in
      default list responses again.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    responses:
      "200":
        description: Restored fronting session
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingSessionResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting/active:
  get:
    operationId: getActiveFronting
    tags: [Fronting Sessions]
    summary: Get active fronting state
    description: |
      Returns all currently active (no end time) fronting sessions for the system,
      along with a convenience flag indicating whether multiple members are
      co-fronting and a map of entity IDs to their member/custom front data.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    responses:
      "200":
        description: Active fronting state
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/ActiveFrontingResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/fronting-sessions/{sessionId}/comments:
  get:
    operationId: listFrontingComments
    tags: [Fronting Comments]
    summary: List comments on a fronting session
    description: |
      Returns a paginated list of comments attached to the specified fronting session,
      ordered by ID descending (newest first).

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
      - name: includeArchived
        in: query
        schema:
          type: string
          enum: ["true", "false"]
        description: If true, include archived comments in the response
    responses:
      "200":
        description: Paginated fronting comment list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [items]
                  properties:
                    items:
                      type: array
                      items:
                        $ref: "../schemas/fronting.yaml#/FrontingCommentResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createFrontingComment
    tags: [Fronting Comments]
    summary: Create a comment on a fronting session
    description: |
      Adds a new comment to the specified fronting session. At least one subject
      (memberId, customFrontId, or structureEntityId) is required to identify
      the authoring headmate. Returns 400 if the session is archived.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sessionId
        in: path
        required: true
        description: Fronting session ID (fs_ prefix)
        schema:
          type: string
          pattern: ^fs_
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/fronting.yaml#/CreateFrontingCommentRequest"
    responses:
      "201":
        description: Comment created
        content:
          application/json:
            schema:
              $ref: "../schemas/fronting.yaml#/FrontingCommentResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

