/systems/{systemId}/side-systems:
  get:
    operationId: listSideSystems
    tags: [Side Systems]
    summary: List side systems
    description: Returns a paginated list of side systems for the given system. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated side system list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [sideSystems]
                  properties:
                    sideSystems:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/SideSystemResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createSideSystem
    tags: [Side Systems]
    summary: Create a side system
    description: Creates a new side system within the given system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateSideSystemRequest"
    responses:
      "201":
        description: Side system created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SideSystemResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}:
  get:
    operationId: getSideSystem
    tags: [Side Systems]
    summary: Get a side system
    description: Returns details for a single side system by ID. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    responses:
      "200":
        description: Side system details
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SideSystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateSideSystem
    tags: [Side Systems]
    summary: Update a side system
    description: Updates the encrypted payload or metadata for a side system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/UpdateSideSystemRequest"
    responses:
      "200":
        description: Side system updated
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SideSystemResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteSideSystem
    tags: [Side Systems]
    summary: Delete a side system
    description: Permanently deletes a side system. Returns 409 if the side system has dependents. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}/archive:
  post:
    operationId: archiveSideSystem
    tags: [Side Systems]
    summary: Archive a side system
    description: Marks a side system as archived. Archived side systems are hidden from default list views but not deleted. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    responses:
      "200":
        description: Side system archived
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SideSystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}/restore:
  post:
    operationId: restoreSideSystem
    tags: [Side Systems]
    summary: Restore an archived side system
    description: Removes the archived flag from a side system, making it visible in default list views again. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    responses:
      "200":
        description: Side system restored
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SideSystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}/memberships:
  get:
    operationId: listSideSystemMemberships
    tags: [Structure Memberships]
    summary: List side system memberships
    description: Returns a paginated list of member memberships for the given side system. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Membership list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [memberships]
                  properties:
                    memberships:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/StructureMembershipResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: addSideSystemMembership
    tags: [Structure Memberships]
    summary: Add a member to a side system
    description: Creates a membership record associating a member with this side system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/AddStructureMembershipRequest"
    responses:
      "201":
        description: Membership created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureMembershipResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}/memberships/{membershipId}:
  delete:
    operationId: removeSideSystemMembership
    tags: [Structure Memberships]
    summary: Remove a membership from a side system
    description: Removes a member's membership from the given side system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        description: Side System ID
        schema:
          type: string
      - name: membershipId
        in: path
        required: true
        description: Membership ID
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
