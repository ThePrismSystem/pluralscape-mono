/systems/{systemId}/side-systems:
  get:
    operationId: listSideSystems
    tags: [Side Systems]
    summary: List side systems
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated side system list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [sideSystems]
                  properties:
                    sideSystems:
                      type: array
                      items:
                        $ref: "../schemas/common.yaml#/EncryptedEntity"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createSideSystem
    tags: [Side Systems]
    summary: Create a side system
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateSideSystemRequest"
    responses:
      "201":
        description: Side system created
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/side-systems/{sideSystemId}:
  get:
    operationId: getSideSystem
    tags: [Side Systems]
    summary: Get a side system
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Side system details
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateSideSystem
    tags: [Side Systems]
    summary: Update a side system
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/UpdateSideSystemRequest"
    responses:
      "200":
        description: Side system updated
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteSideSystem
    tags: [Side Systems]
    summary: Delete a side system
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: sideSystemId
        in: path
        required: true
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

