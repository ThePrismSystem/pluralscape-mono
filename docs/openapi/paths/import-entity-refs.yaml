/systems/{systemId}/import-entity-refs:
  get:
    operationId: listImportEntityRefs
    tags: [Import]
    summary: List import entity refs
    description: |
      Returns a paginated list of source-to-Pluralscape entity ID mappings recorded during imports.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
      - name: source
        in: query
        required: false
        schema:
          $ref: "../schemas/import-export.yaml#/ImportSource"
      - name: entityType
        in: query
        required: false
        schema:
          $ref: "../schemas/import-export.yaml#/ImportEntityType"
      - name: sourceEntityId
        in: query
        required: false
        schema:
          type: string
          maxLength: 128
    responses:
      "200":
        description: Paginated entity ref list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [data]
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "../schemas/import-export.yaml#/ImportEntityRefResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "403":
        description: Insufficient permissions to list import entity refs for this system
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/import-entity-refs/lookup-batch:
  post:
    operationId: lookupImportEntityRefBatch
    tags: [Import]
    summary: Batch look up entity refs by source IDs
    description: |
      Looks up many import entity refs in a single round-trip. Returns a map of
      `sourceEntityId -> pluralscapeEntityId` for matching rows. Missing source IDs
      are absent from the map.

      POST is used (not GET) because the payload array may exceed query-string limits.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [source, sourceEntityType, sourceEntityIds]
            properties:
              source:
                $ref: "../schemas/import-export.yaml#/ImportSource"
              sourceEntityType:
                $ref: "../schemas/import-export.yaml#/ImportEntityType"
              sourceEntityIds:
                type: array
                items:
                  type: string
                  minLength: 1
                  maxLength: 128
                minItems: 1
                maxItems: 200
    responses:
      "200":
        description: Map of sourceEntityId to pluralscapeEntityId
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  additionalProperties:
                    type: string
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "403":
        description: Insufficient permissions
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/import-entity-refs/upsert-batch:
  post:
    operationId: upsertImportEntityRefBatch
    tags: [Import]
    summary: Batch upsert entity refs
    description: |
      Insert or update many import entity refs in a single round-trip. Idempotent:
      re-running with the same payload updates `pluralscapeEntityId` on conflict.

      Returns counts of upserted vs unchanged rows.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [source, entries]
            properties:
              source:
                $ref: "../schemas/import-export.yaml#/ImportSource"
              entries:
                type: array
                items:
                  type: object
                  required: [sourceEntityType, sourceEntityId, pluralscapeEntityId]
                  properties:
                    sourceEntityType:
                      $ref: "../schemas/import-export.yaml#/ImportEntityType"
                    sourceEntityId:
                      type: string
                      minLength: 1
                      maxLength: 128
                    pluralscapeEntityId:
                      type: string
                      minLength: 1
                      maxLength: 50
                minItems: 1
                maxItems: 200
    responses:
      "200":
        description: Upsert result counts
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: object
                  required: [upserted, unchanged]
                  properties:
                    upserted:
                      type: integer
                    unchanged:
                      type: integer
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "403":
        description: Insufficient permissions
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/import-entity-refs/lookup:
  get:
    operationId: lookupImportEntityRef
    tags: [Import]
    summary: Look up a single entity ref by source identity
    description: |
      Looks up a single import entity ref by its (source, sourceEntityType, sourceEntityId) triple.

      Returns `404 NOT_FOUND` if no mapping exists.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: source
        in: query
        required: true
        schema:
          $ref: "../schemas/import-export.yaml#/ImportSource"
      - name: sourceEntityType
        in: query
        required: true
        schema:
          $ref: "../schemas/import-export.yaml#/ImportEntityType"
      - name: sourceEntityId
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          maxLength: 128
    responses:
      "200":
        description: Entity ref
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  $ref: "../schemas/import-export.yaml#/ImportEntityRefResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "403":
        description: Insufficient permissions to look up import entity refs for this system
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
