/systems/{systemId}/subsystems:
  get:
    operationId: listSubsystems
    tags: [Subsystems]
    summary: List subsystems
    description: Returns a paginated list of subsystems for the given system. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated subsystem list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [subsystems]
                  properties:
                    subsystems:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/SubsystemResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createSubsystem
    tags: [Subsystems]
    summary: Create a subsystem
    description: Creates a new subsystem within the given system. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/CreateSubsystemRequest"
    responses:
      "201":
        description: Subsystem created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SubsystemResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/subsystems/{subsystemId}:
  get:
    operationId: getSubsystem
    tags: [Subsystems]
    summary: Get a subsystem
    description: Returns details for a single subsystem by ID. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    responses:
      "200":
        description: Subsystem details
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SubsystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateSubsystem
    tags: [Subsystems]
    summary: Update a subsystem
    description: Updates the encrypted payload or metadata for a subsystem. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/UpdateSubsystemRequest"
    responses:
      "200":
        description: Subsystem updated
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SubsystemResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteSubsystem
    tags: [Subsystems]
    summary: Delete a subsystem
    description: Permanently deletes a subsystem. Returns 409 if the subsystem has dependents. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/subsystems/{subsystemId}/archive:
  post:
    operationId: archiveSubsystem
    tags: [Subsystems]
    summary: Archive a subsystem
    description: Marks a subsystem as archived. Archived subsystems are hidden from default list views but not deleted. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    responses:
      "200":
        description: Subsystem archived
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SubsystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/subsystems/{subsystemId}/restore:
  post:
    operationId: restoreSubsystem
    tags: [Subsystems]
    summary: Restore an archived subsystem
    description: Removes the archived flag from a subsystem, making it visible in default list views again. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    responses:
      "200":
        description: Subsystem restored
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/SubsystemResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/subsystems/{subsystemId}/memberships:
  get:
    operationId: listSubsystemMemberships
    tags: [Structure Memberships]
    summary: List subsystem memberships
    description: Returns a paginated list of member memberships for the given subsystem. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Membership list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [memberships]
                  properties:
                    memberships:
                      type: array
                      items:
                        $ref: "../schemas/structures.yaml#/StructureMembershipResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: addSubsystemMembership
    tags: [Structure Memberships]
    summary: Add a member to a subsystem
    description: Creates a membership record associating a member with this subsystem. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/structures.yaml#/AddStructureMembershipRequest"
    responses:
      "201":
        description: Membership created
        content:
          application/json:
            schema:
              $ref: "../schemas/structures.yaml#/StructureMembershipResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/subsystems/{subsystemId}/memberships/{membershipId}:
  delete:
    operationId: removeSubsystemMembership
    tags: [Structure Memberships]
    summary: Remove a membership from a subsystem
    description: Removes a member's membership from the given subsystem. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: subsystemId
        in: path
        required: true
        description: Subsystem ID
        schema:
          type: string
      - name: membershipId
        in: path
        required: true
        description: Membership ID
        schema:
          type: string
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
