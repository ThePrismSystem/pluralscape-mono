/systems/{systemId}/channels/{channelId}/messages:
  get:
    operationId: listMessages
    tags: [Messages]
    summary: List messages in a channel
    description: |
      Returns a paginated list of messages in the specified channel, ordered
      by timestamp descending. Supports time-range filtering via `before`
      and `after` query parameters.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
      - name: before
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
        description: Return messages with timestamp before this value (Unix milliseconds)
      - name: after
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
        description: Return messages with timestamp after this value (Unix milliseconds)
      - name: includeArchived
        in: query
        required: false
        schema:
          type: string
          enum: ["true", "false"]
        description: Include archived messages (default false)
    responses:
      "200":
        description: Paginated message list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [data]
                  properties:
                    data:
                      type: array
                      items:
                        $ref: "../schemas/messages.yaml#/MessageResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createMessage
    tags: [Messages]
    summary: Create a message
    description: |
      Creates a new message in the specified channel. The sender identity is
      encrypted within `encryptedData` (proxy-based messaging).

      Rate limit: 60 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/messages.yaml#/CreateMessageRequest"
    responses:
      "201":
        description: Message created
        content:
          application/json:
            schema:
              $ref: "../schemas/messages.yaml#/MessageResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/channels/{channelId}/messages/{messageId}:
  get:
    operationId: getMessage
    tags: [Messages]
    summary: Get a message
    description: |
      Returns a single message by ID. An optional `timestamp` query parameter
      can be provided as a partition hint for more efficient lookups.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - name: messageId
        in: path
        required: true
        description: Message ID
        schema:
          type: string
          pattern: ^msg_
      - name: timestamp
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
        description: Partition hint (Unix milliseconds) for efficient lookup
    responses:
      "200":
        description: Message details
        content:
          application/json:
            schema:
              $ref: "../schemas/messages.yaml#/MessageResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateMessage
    tags: [Messages]
    summary: Update a message
    description: |
      Updates the encrypted content of a message. Sets `editedAt` on first edit.
      Returns 409 if the provided version conflicts with the server's current version.

      Rate limit: 60 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - name: messageId
        in: path
        required: true
        description: Message ID
        schema:
          type: string
          pattern: ^msg_
      - name: timestamp
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
        description: Partition hint (Unix milliseconds) for efficient lookup
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/messages.yaml#/UpdateMessageRequest"
    responses:
      "200":
        description: Message updated
        content:
          application/json:
            schema:
              $ref: "../schemas/messages.yaml#/MessageResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteMessage
    tags: [Messages]
    summary: Delete a message
    description: |
      Permanently deletes a message. This action is irreversible.

      Rate limit: 60 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - name: messageId
        in: path
        required: true
        description: Message ID
        schema:
          type: string
          pattern: ^msg_
      - name: timestamp
        in: query
        required: false
        schema:
          type: integer
          format: int64
          minimum: 0
        description: Partition hint (Unix milliseconds) for efficient lookup
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/channels/{channelId}/messages/{messageId}/archive:
  post:
    operationId: archiveMessage
    tags: [Messages]
    summary: Archive a message
    description: |
      Marks a message as archived. Archived messages are hidden from default
      list responses but remain accessible.

      Rate limit: 60 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - name: messageId
        in: path
        required: true
        description: Message ID
        schema:
          type: string
          pattern: ^msg_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/channels/{channelId}/messages/{messageId}/restore:
  post:
    operationId: restoreMessage
    tags: [Messages]
    summary: Restore an archived message
    description: |
      Removes the archived flag from a message, making it visible in default
      list responses again.

      Rate limit: 60 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: channelId
        in: path
        required: true
        description: Channel ID
        schema:
          type: string
          pattern: ^ch_
      - name: messageId
        in: path
        required: true
        description: Message ID
        schema:
          type: string
          pattern: ^msg_
    responses:
      "200":
        description: Message restored
        content:
          application/json:
            schema:
              $ref: "../schemas/messages.yaml#/MessageResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
