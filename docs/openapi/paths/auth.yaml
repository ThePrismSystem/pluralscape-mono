/auth/register/initiate:
  post:
    operationId: registerInitiate
    tags: [Auth]
    summary: Initiate account registration (phase 1)
    description: |
      Two-phase registration. Returns accountId, KDF salt, and challenge nonce.
      Always returns 201 regardless of whether the email is already registered
      (anti-enumeration).

      Rate limit: 5 req/min (authHeavy)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/RegistrationInitiateRequest"
    responses:
      "201":
        description: Registration initiated
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/RegistrationInitiateResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/register/commit:
  post:
    operationId: registerCommit
    tags: [Auth]
    summary: Complete account registration (phase 2)
    description: |
      Zero-knowledge — the server never sees the password. The client sends
      pre-encrypted key blobs and a challenge signature proving possession of
      the signing key.

      Rate limit: 5 req/min (authHeavy)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/RegistrationCommitRequest"
    responses:
      "201":
        description: Account created
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/RegistrationCommitResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/salt:
  post:
    operationId: getSalt
    tags: [Auth]
    summary: Fetch KDF salt for an email address
    description: |
      Always returns 200 with a salt — either the real KDF salt for the account
      or a deterministic fake salt derived from the email (anti-enumeration).

      Rate limit: 5 req/min (authHeavy)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/SaltRequest"
    responses:
      "200":
        description: KDF salt
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/SaltResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/login:
  post:
    operationId: login
    tags: [Auth]
    summary: Log in with email and auth key
    description: |
      Zero-knowledge login. The client derives an auth key from the password
      via Argon2id and sends only the auth key — the server never sees the
      plaintext password. Timing is equalized across success and failure paths
      to prevent user-enumeration attacks.

      Rate limit: 5 req/min (authHeavy)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/LoginRequest"
    responses:
      "200":
        description: Login successful
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/LoginResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/password-reset/recovery-key:
  post:
    operationId: passwordResetViaRecoveryKey
    tags: [Auth]
    summary: Reset password using recovery key
    description: |
      Zero-knowledge password reset via recovery key. The client provides
      hex-encoded blobs: a new auth key, new KDF salt, re-encrypted master
      key, and a new recovery-encrypted master key. The server never sees
      the plaintext password or master key. All existing encrypted data
      remains accessible because the underlying master key is unchanged —
      only its wrapping changes.

      Rate limit: 5 req/min (authHeavy)
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/PasswordResetViaRecoveryKeyRequest"
    responses:
      "200":
        description: Password reset successful
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/PasswordResetResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/biometric/enroll:
  post:
    operationId: biometricEnroll
    tags: [Auth]
    summary: Enroll biometric authentication
    description: |
      Enrolls a biometric token for the authenticated account.

      Rate limit: 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/BiometricTokenRequest"
    responses:
      "201":
        description: Biometric enrolled
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/BiometricEnrollResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/biometric/verify:
  post:
    operationId: biometricVerify
    tags: [Auth]
    summary: Verify biometric authentication
    description: |
      Verifies a biometric token against the enrolled credential.

      Rate limit: 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/BiometricTokenRequest"
    responses:
      "200":
        description: Verification result
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/BiometricVerifyResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/sessions:
  get:
    operationId: listSessions
    tags: [Auth]
    summary: List active sessions
    description: |
      Returns all active sessions for the authenticated account.

      Rate limit: 20 req/min (authLight)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Session list
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/SessionListResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/sessions/{id}:
  delete:
    operationId: revokeSession
    tags: [Auth]
    summary: Revoke a specific session
    description: |
      Revokes a session by ID. Cannot revoke the current session (use logout instead).

      Rate limit: 20 req/min (authLight)
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: ^sess_
        description: Session ID to revoke
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/logout:
  post:
    operationId: logout
    tags: [Auth]
    summary: Log out (revoke current session)
    description: |
      Revokes the current session token.

      Rate limit: 20 req/min (authLight)
    security:
      - bearerAuth: []
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/sessions/revoke-all:
  post:
    operationId: revokeAllSessions
    tags: [Auth]
    summary: Revoke all other sessions
    description: |
      Revokes all sessions except the current one.

      Rate limit: 20 req/min (authLight)
    security:
      - bearerAuth: []
    responses:
      "200":
        description: All other sessions revoked
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/RevokeAllResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/recovery-key/status:
  get:
    operationId: getRecoveryKeyStatus
    tags: [Auth]
    summary: Get recovery key status
    description: |
      Returns whether a recovery key exists and when it was created.

      Rate limit: 20 req/min (authLight)
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Recovery key status
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/RecoveryKeyStatusResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/auth/recovery-key/regenerate:
  post:
    operationId: regenerateRecoveryKey
    tags: [Auth]
    summary: Regenerate recovery key
    description: |
      Regenerates the recovery key backup. The client provides its auth key
      to prove identity, plus a new recovery-encrypted master key blob and
      recovery key hash. The server never sees the plaintext recovery key or
      master key.

      Rate limit: 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/RegenerateRecoveryKeyRequest"
    responses:
      "201":
        description: Recovery key backup regenerated
        content:
          application/json:
            schema:
              $ref: "../schemas/auth.yaml#/RegenerateRecoveryKeyResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
