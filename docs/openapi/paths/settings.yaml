/systems/{systemId}/setup/status:
  get:
    operationId: getSetupStatus
    tags: [System Settings]
    summary: Get setup wizard status
    description: Returns the current completion status of the system setup wizard, indicating which steps have been completed. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    responses:
      "200":
        description: Setup status
        content:
          application/json:
            schema:
              $ref: "../schemas/settings.yaml#/SetupStatusResponse"
      "401":
