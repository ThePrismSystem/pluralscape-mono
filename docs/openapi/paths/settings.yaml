      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/setup/nomenclature:
  post:
    operationId: setupNomenclatureStep
    tags: [System Settings]
    summary: Submit nomenclature setup step
    description: Completes the nomenclature step of the system setup wizard by saving the system's preferred terminology. Rate limit 30 req/min (writeDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/settings.yaml#/SetupStepRequest"
    responses:
      "201":
        description: Step completed
        content:
          application/json:
            schema:
              type: object
              properties:
                ok:
                  type: boolean
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

