/systems/{systemId}/settings:
  get:
    operationId: getSystemSettings
    tags: [System Settings]
    summary: Get system settings
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    responses:
      "200":
        description: System settings
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateSystemSettings
    tags: [System Settings]
    summary: Update system settings
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/settings.yaml#/UpdateSystemSettingsRequest"
    responses:
      "200":
        description: Settings updated
        content:
          application/json:
            schema:
              $ref: "../schemas/common.yaml#/EncryptedEntity"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/settings/pin:
  post:
    operationId: setPin
    tags: [System Settings]
    summary: Set system PIN
    description: Rate limit 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/settings.yaml#/PinRequest"
    responses:
      "201":
        description: PIN set
        content:
          application/json:
            schema:
              type: object
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: removePin
    tags: [System Settings]
    summary: Remove system PIN
    description: Requires the current PIN in the request body. Rate limit 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/settings.yaml#/PinRequest"
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/settings/pin/verify:
  post:
    operationId: verifyPin
    tags: [System Settings]
    summary: Verify system PIN
    description: Rate limit 5 req/min (authHeavy)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/settings.yaml#/PinRequest"
    responses:
      "200":
        description: PIN verification result
        content:
          application/json:
            schema:
              $ref: "../schemas/settings.yaml#/PinVerifyResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

