/systems/{systemId}/lifecycle-events:
  get:
    operationId: listLifecycleEvents
    tags: [Lifecycle Events]
    summary: List lifecycle events
    description: Returns a paginated list of lifecycle events recorded for the given system. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
      - name: includeArchived
        in: query
        schema:
          type: string
          enum: ["true", "false"]
        description: If true, include archived lifecycle events in the response
    responses:
      "200":
        description: Paginated lifecycle event list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [events]
                  properties:
                    events:
                      type: array
                      items:
                        $ref: "../schemas/lifecycle-events.yaml#/LifecycleEventResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createLifecycleEvent
    tags: [Lifecycle Events]
    summary: Record a lifecycle event
    description: |
      Records a system lifecycle event such as a split, fusion, merge,
      dormancy change, discovery, or structural change.
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/lifecycle-events.yaml#/CreateLifecycleEventRequest"
    responses:
      "201":
        description: Lifecycle event created
        content:
          application/json:
            schema:
              $ref: "../schemas/lifecycle-events.yaml#/LifecycleEventResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/lifecycle-events/{eventId}:
  get:
    operationId: getLifecycleEvent
    tags: [Lifecycle Events]
    summary: Get a lifecycle event
    description: Returns details for a single lifecycle event by ID. Rate limit 60 req/min (readDefault).
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: eventId
        in: path
        required: true
        description: Lifecycle Event ID
        schema:
          type: string
    responses:
      "200":
        description: Lifecycle event details
        content:
          application/json:
            schema:
              $ref: "../schemas/lifecycle-events.yaml#/LifecycleEventResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteLifecycleEvent
    tags: [Lifecycle Events]
    summary: Delete a lifecycle event
    description: |
      Permanently deletes a lifecycle event. Lifecycle events have no dependents,
      so deletion is always permitted. Use archive instead for reversible removal.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: eventId
        in: path
        required: true
        description: Lifecycle Event ID (evt_ prefix)
        schema:
          type: string
          pattern: ^evt_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/lifecycle-events/{eventId}/archive:
  post:
    operationId: archiveLifecycleEvent
    tags: [Lifecycle Events]
    summary: Archive a lifecycle event
    description: |
      Marks a lifecycle event as archived. Archived events are hidden from
      default list responses but remain accessible. Archival is always permitted.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: eventId
        in: path
        required: true
        description: Lifecycle Event ID (evt_ prefix)
        schema:
          type: string
          pattern: ^evt_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/lifecycle-events/{eventId}/restore:
  post:
    operationId: restoreLifecycleEvent
    tags: [Lifecycle Events]
    summary: Restore an archived lifecycle event
    description: |
      Removes the archived flag from a lifecycle event, making it visible in
      default list responses again.

      Rate limit: 30 req/min (write)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: eventId
        in: path
        required: true
        description: Lifecycle Event ID (evt_ prefix)
        schema:
          type: string
          pattern: ^evt_
    responses:
      "200":
        description: Restored lifecycle event
        content:
          application/json:
            schema:
              $ref: "../schemas/lifecycle-events.yaml#/LifecycleEventResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
