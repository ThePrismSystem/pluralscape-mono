/systems/{systemId}/relationships:
  get:
    operationId: listRelationships
    tags: [Relationships]
    summary: List relationships
    description: |
      Returns a paginated list of all inter-member relationships for the
      specified system (e.g., "friends", "rivals", "protector of").

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated relationship list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [relationships]
                  properties:
                    relationships:
                      type: array
                      items:
                        $ref: "../schemas/relationships.yaml#/RelationshipResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createRelationship
    tags: [Relationships]
    summary: Create a relationship
    description: |
      Creates a new directed relationship between two members within the
      same system. The relationship type and label are user-defined.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/relationships.yaml#/CreateRelationshipRequest"
    responses:
      "201":
        description: Relationship created
        content:
          application/json:
            schema:
              $ref: "../schemas/relationships.yaml#/RelationshipResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/relationships/{relationshipId}:
  get:
    operationId: getRelationship
    tags: [Relationships]
    summary: Get a relationship
    description: |
      Returns details for a single relationship by ID.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: relationshipId
        in: path
        required: true
        description: Relationship ID
        schema:
          type: string
          pattern: ^rel_
    responses:
      "200":
        description: Relationship details
        content:
          application/json:
            schema:
              $ref: "../schemas/relationships.yaml#/RelationshipResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateRelationship
    tags: [Relationships]
    summary: Update a relationship
    description: |
      Updates the type, label, or notes for an existing relationship. Returns
      409 if the provided version conflicts with the server's current version.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: relationshipId
        in: path
        required: true
        description: Relationship ID
        schema:
          type: string
          pattern: ^rel_
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/relationships.yaml#/UpdateRelationshipRequest"
    responses:
      "200":
        description: Relationship updated
        content:
          application/json:
            schema:
              $ref: "../schemas/relationships.yaml#/RelationshipResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteRelationship
    tags: [Relationships]
    summary: Delete a relationship
    description: |
      Permanently deletes a relationship record. The members themselves are
      not affected. This action is irreversible.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: relationshipId
        in: path
        required: true
        description: Relationship ID
        schema:
          type: string
          pattern: ^rel_
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/relationships/{relationshipId}/archive:
  post:
    operationId: archiveRelationship
    tags: [Relationships]
    summary: Archive a relationship
    description: |
      Marks a relationship as archived. Archived relationships are hidden from
      default list responses but remain accessible. Archival is always permitted.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: relationshipId
        in: path
        required: true
        description: Relationship ID
        schema:
          type: string
          pattern: ^rel_
    responses:
      "200":
        description: Relationship archived
        content:
          application/json:
            schema:
              $ref: "../schemas/relationships.yaml#/RelationshipResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/relationships/{relationshipId}/restore:
  post:
    operationId: restoreRelationship
    tags: [Relationships]
    summary: Restore an archived relationship
    description: |
      Removes the archived flag from a relationship, making it visible in
      default list responses again.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - name: relationshipId
        in: path
        required: true
        description: Relationship ID
        schema:
          type: string
          pattern: ^rel_
    responses:
      "200":
        description: Relationship restored
        content:
          application/json:
            schema:
              $ref: "../schemas/relationships.yaml#/RelationshipResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
