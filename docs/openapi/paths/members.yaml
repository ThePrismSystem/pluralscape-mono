/systems/{systemId}/members:
  get:
    operationId: listMembers
    tags: [Members]
    summary: List members
    description: |
      Returns a paginated list of all members belonging to the specified system.
      Members are returned as encrypted entities — all user-visible fields are
      encrypted client-side and opaque to the server.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Paginated member list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [members]
                  properties:
                    members:
                      type: array
                      items:
                        $ref: "../schemas/members.yaml#/MemberResponse"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  post:
    operationId: createMember
    tags: [Members]
    summary: Create a member
    description: |
      Creates a new member within the specified system. The member's display data
      (name, pronouns, description, avatar, etc.) is encrypted before being sent
      to the server.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/members.yaml#/CreateMemberRequest"
    responses:
      "201":
        description: Member created
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/members/{memberId}:
  get:
    operationId: getMember
    tags: [Members]
    summary: Get a member
    description: |
      Returns the encrypted entity for a single member by ID.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    responses:
      "200":
        description: Member details
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  put:
    operationId: updateMember
    tags: [Members]
    summary: Update a member
    description: |
      Updates the encrypted payload for an existing member. The server stores
      an opaque ciphertext blob; all field-level validation is client-side.
      Returns 409 if the provided version conflicts with the server's current version.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/members.yaml#/UpdateMemberRequest"
    responses:
      "200":
        description: Member updated
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
  delete:
    operationId: deleteMember
    tags: [Members]
    summary: Delete a member
    description: |
      Permanently deletes a member and all directly dependent data. Returns 409
      if the member has dependents that must be removed or force-deleted first.
      This action is irreversible.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    responses:
      "204":
        $ref: "../openapi.yaml#/components/responses/NoContent"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "409":
        $ref: "../openapi.yaml#/components/responses/Conflict"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/members/{memberId}/duplicate:
  post:
    operationId: duplicateMember
    tags: [Members]
    summary: Duplicate a member
    description: |
      Creates a new member by copying the encrypted payload of an existing member.
      The caller may override specific encrypted fields in the request body.
      The new member receives a fresh ID and is not archived.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/members.yaml#/DuplicateMemberRequest"
    responses:
      "201":
        description: Member duplicated
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "400":
        $ref: "../openapi.yaml#/components/responses/ValidationError"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/members/{memberId}/archive:
  post:
    operationId: archiveMember
    tags: [Members]
    summary: Archive a member
    description: |
      Marks a member as archived. Archived members are hidden from default list
      responses but remain fully accessible. Archival is always permitted
      regardless of dependents.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    responses:
      "200":
        description: Member archived
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/members/{memberId}/restore:
  post:
    operationId: restoreMember
    tags: [Members]
    summary: Restore an archived member
    description: |
      Removes the archived flag from a member, making it visible in default
      list responses again.

      Rate limit: 30 req/min (writeDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
    responses:
      "200":
        description: Member restored
        content:
          application/json:
            schema:
              $ref: "../schemas/members.yaml#/MemberResponse"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "404":
        $ref: "../openapi.yaml#/components/responses/NotFound"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"

/systems/{systemId}/members/{memberId}/memberships:
  get:
    operationId: getMemberMemberships
    tags: [Members]
    summary: List all group memberships for a member
    description: |
      Returns a paginated list of all groups the specified member belongs to,
      including the membership metadata (role, sort order) for each group.

      Rate limit: 60 req/min (readDefault)
    security:
      - bearerAuth: []
    parameters:
      - $ref: "../openapi.yaml#/components/parameters/SystemId"
      - $ref: "../openapi.yaml#/components/parameters/MemberId"
      - $ref: "../openapi.yaml#/components/parameters/Cursor"
      - $ref: "../openapi.yaml#/components/parameters/Limit"
    responses:
      "200":
        description: Membership list
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required: [memberships]
                  properties:
                    memberships:
                      type: array
                      items:
                        $ref: "../schemas/groups.yaml#/GroupMembership"
                - $ref: "../schemas/common.yaml#/PaginationMeta"
      "401":
        $ref: "../openapi.yaml#/components/responses/Unauthenticated"
      "429":
        $ref: "../openapi.yaml#/components/responses/RateLimited"
