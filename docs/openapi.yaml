          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextMember (see ./plaintext.yaml#/PlaintextMember)
    UpdateMemberRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
