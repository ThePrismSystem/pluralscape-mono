openapi: 3.1.0
info:
  title: Pluralscape API
  version: 0.1.0
  description: |
    REST API for Pluralscape, a cross-platform plurality management application.

    All sensitive data is end-to-end encrypted. The server is zero-knowledge —
    it cannot read user content.

    ## Encryption Model
    Pluralscape uses **libsodium** with the following algorithms:
    - **Symmetric encryption**: XChaCha20-Poly1305
    - **Key exchange**: X25519
    - **Key derivation**: Argon2id (for password-to-key derivation)

    ### Encryption Tiers
    Data is encrypted at one of three tiers:

    | Tier | Name | Key Source | Use Case |
    |------|------|-----------|----------|
    | **T1** | Master-key encrypted | User's master key (derived from password via Argon2id) | Private data: member profiles, system settings, notes, journals |
    | **T2** | Per-bucket encrypted | Symmetric key scoped to a Privacy Bucket | Shared data: content visible to specific friends via key grants |
    | **T3** | Plaintext | None | Non-sensitive metadata: IDs, timestamps, structural relationships |

    ### How `encryptedData` Fields Work
    Most resource endpoints accept and return an `encryptedData` field. This is a
    **base64-encoded ciphertext blob** produced client-side:

    1. The client serializes the resource's sensitive fields (name, description, etc.)
       into a JSON payload
    2. The client encrypts that JSON with either the master key (T1) or a bucket key (T2)
       using XChaCha20-Poly1305, producing `{ciphertext, nonce}`
    3. The client base64-encodes the result and sends it as `encryptedData`
    4. The server stores the blob **opaquely** — it never decrypts or inspects the contents
    5. On read, the client decrypts the blob using the same key

    The server enforces size limits on `encryptedData` but cannot validate its internal
    structure. All validation of the decrypted content happens client-side.

    ### Master Key and Recovery
    - The user's **master key** is derived from their password using Argon2id
    - The master key is stored encrypted on the server (encrypted with itself)
    - A **recovery key** (generated at registration) can decrypt the master key if
      the password is forgotten — this is the only recovery mechanism
    - Changing a password re-wraps the master key; the underlying encryption keys remain stable

    ### Privacy Buckets and Friend Sharing
    - Each Privacy Bucket has its own symmetric key (T2 encryption)
    - When a friend is granted access to a bucket, the bucket key is encrypted with the
      friend's public key (X25519) and stored as a **key grant**
    - Key rotation re-encrypts all items in a bucket with a new key (see Key Rotation endpoints)

    ### Device Transfer
    When adding a new device, the master key is securely transferred using an
    ephemeral X25519 key exchange session (5-minute TTL).

    ## Authentication
    Most endpoints require a Bearer token obtained from `/auth/login` or `/auth/register`.
    Pass it in the `Authorization` header: `Authorization: Bearer <sessionToken>`.
    Session tokens are 32-byte hex-encoded values (64 characters).

    ## Pagination
    List endpoints use cursor-based pagination. Pass `cursor` (opaque string from a
    previous response) and `limit` (default 25, max 100) as query parameters.
    Responses include `nextCursor` (null when no more pages) and `hasMore`.

    ## Rate Limiting
    All endpoints are subject to per-IP rate limits. When exceeded, the API returns
    `429 Too Many Requests` with a `Retry-After` header.

    ## Error Envelope
    All errors follow a consistent JSON structure (see `ErrorResponse` schema).

    ## Client-Side Plaintext Schemas
    Since the server is zero-knowledge, it cannot validate the contents of `encryptedData`
    fields. The **Plaintext*** schemas in the components section document what the client
    should serialize into JSON, then encrypt, before sending as `encryptedData`. These are
    **client-enforced contracts** — the server stores the blob opaquely. See each resource
    endpoint's description for which plaintext schema applies.
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Pluralscape
servers:
  - url: http://localhost:3000/v1
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Authentication, sessions, and account recovery
  - name: Account
    description: Account management and audit log
  - name: Systems
    description: Plural system profiles
  - name: System Settings
    description: System settings, nomenclature, PIN, and setup
  - name: Members
    description: System members (headmates)
  - name: Member Photos
    description: Photos attached to members
  - name: Member Fields
    description: Custom field values on members
  - name: Groups
    description: Member groups and group memberships
  - name: Custom Fronts
    description: Abstract cognitive states logged like members
  - name: Fields
    description: Custom field definitions for a system
  - name: Relationships
    description: Relationships between members
  - name: Structure Entity Types
    description: User-defined structure entity types within a system
  - name: Structure Entities
    description: Structure entities (instances of user-defined entity types)
  - name: Structure Entity Links
    description: Hierarchical parent-child links between structure entities
  - name: Structure Entity Member Links
    description: Member assignments to structure entities
  - name: Structure Entity Associations
    description: Directed cross-references between structure entities
  - name: Lifecycle Events
    description: System lifecycle events (splits, fusions, etc.)
  - name: Innerworld
    description: Innerworld regions, entities, and canvas
  - name: Blobs
    description: Encrypted file upload and download
  - name: Key Rotation
    description: Privacy bucket key rotation
  - name: Fronting Sessions
    description: Fronting session tracking (who is fronting and when)
  - name: Fronting Comments
    description: Comments attached to fronting sessions
  - name: Analytics
    description: Fronting analytics (duration breakdowns, co-fronting statistics)
  - name: Fronting Reports
    description: Immutable encrypted report snapshots
paths:
  /:
    get:
      operationId: getRoot
      tags:
        - Health
      summary: Service info
      description: Returns basic service information. No authentication required.
      security: []
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: pluralscape-api
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Health check
      description: Returns service health status. No authentication required.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: healthy
  /auth/register:
    post:
      operationId: register
      tags:
        - Auth
      summary: Register a new account
      description: |
        Creates a new account with email/password authentication.

        **Crypto flow**: The server hashes the password with Argon2id to create
        the account credential. The client derives the master encryption key from
        the same password using Argon2id (with a different salt/context) and wraps
        it for server-side storage. A recovery key is generated that can decrypt
        the master key independently of the password.

        The recovery key must be stored securely by the client — it is the **only**
        way to recover the master encryption key if the password is forgotten.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with email and password
      description: |
        Authenticates with email/password and returns a session token.

        **Security**: Timing is equalized across success and failure paths to
        prevent user-enumeration attacks. The password is verified against an
        Argon2id hash. Password length is capped at 1024 bytes to prevent
        Argon2 DoS on this unauthenticated endpoint.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/password-reset/recovery-key:
    post:
      operationId: passwordResetViaRecoveryKey
      tags:
        - Auth
      summary: Reset password using recovery key
      description: |
        Resets the account password using the recovery key.

        **Crypto flow**: The recovery key decrypts the master encryption key,
        which is then re-wrapped with the new password-derived key. A new
        recovery key is generated (the old one is invalidated). All existing
        encrypted data remains accessible because the underlying master key is
        unchanged — only its wrapping changes.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetViaRecoveryKeyRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/biometric/enroll:
    post:
      operationId: biometricEnroll
      tags:
        - Auth
      summary: Enroll biometric authentication
      description: |
        Enrolls a biometric token for the authenticated account.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BiometricTokenRequest"
      responses:
        "201":
          description: Biometric enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricEnrollResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/biometric/verify:
    post:
      operationId: biometricVerify
      tags:
        - Auth
      summary: Verify biometric authentication
      description: |
        Verifies a biometric token against the enrolled credential.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BiometricTokenRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions:
    get:
      operationId: listSessions
      tags:
        - Auth
      summary: List active sessions
      description: |
        Returns all active sessions for the authenticated account.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags:
        - Auth
      summary: Revoke a specific session
      description: |
        Revokes a session by ID. Cannot revoke the current session (use logout instead).

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^sess_
          description: Session ID to revoke
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out (revoke current session)
      description: |
        Revokes the current session token.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      tags:
        - Auth
      summary: Revoke all other sessions
      description: |
        Revokes all sessions except the current one.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All other sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/recovery-key/status:
    get:
      operationId: getRecoveryKeyStatus
      tags:
        - Auth
      summary: Get recovery key status
      description: |
        Returns whether a recovery key exists and when it was created.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recovery key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryKeyStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/recovery-key/regenerate:
    post:
      operationId: regenerateRecoveryKey
      tags:
        - Auth
      summary: Regenerate recovery key
      description: |
        Regenerates the recovery key. Requires current password and explicit confirmation.

        **Crypto flow**: The current password verifies identity and decrypts the
        master key. A new recovery key is generated and used to create a fresh
        encrypted copy of the master key. The old recovery key and its encrypted
        master key copy are permanently invalidated.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRecoveryKeyRequest"
      responses:
        "201":
          description: New recovery key generated
          content:
            application/json:
              schema:
                type: object
                required:
                  - recoveryKey
                properties:
                  recoveryKey:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account:
    get:
      operationId: getAccount
      tags:
        - Account
      summary: Get account info
      description: |
        Returns the authenticated account's details.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/email:
    put:
      operationId: changeEmail
      tags:
        - Account
      summary: Change account email
      description: |
        Changes the account email. Requires current password for verification.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailRequest"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - email
                properties:
                  email:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/password:
    put:
      operationId: changePassword
      tags:
        - Account
      summary: Change account password
      description: |
        Changes the account password. Requires current password for verification.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/audit-log:
    get:
      operationId: getAuditLog
      tags:
        - Account
      summary: Query account audit log
      description: |
        Returns audit log entries for the authenticated account.
        Supports filtering by event type, resource type, and time range.

        Rate limit: 30 req/min (auditQuery)
      security:
        - bearerAuth: []
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
          description: Filter by event type (e.g., "member.created", "session.revoked")
        - name: resourceType
          in: query
          schema:
            type: string
            pattern: ^[a-z][a-z0-9-]*$
          description: Filter by resource type (e.g., "member", "group", "session")
        - name: from
          in: query
          schema:
            type: integer
            minimum: 0
          description: Start of time range as Unix timestamp in milliseconds (inclusive)
        - name: to
          in: query
          schema:
            type: integer
            minimum: 0
          description: End of time range as Unix timestamp in milliseconds (inclusive)
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems:
    get:
      operationId: listSystems
      tags:
        - Systems
      summary: List systems
      description: |
        Returns paginated list of systems for the authenticated account.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated system list
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - systems
                    properties:
                      systems:
                        type: array
                        items:
                          $ref: "#/components/schemas/SystemProfile"
                  - $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      operationId: createSystem
      tags:
        - Systems
      summary: Create a new system
      description: |
        Creates a new plural system for the authenticated account.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      responses:
        "201":
          description: System created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemProfile"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}:
    get:
      operationId: getSystem
      tags:
        - Systems
      summary: Get a system
      description: |
        Returns a system profile by ID.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      responses:
        "200":
          description: System profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemProfile"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    put:
      operationId: updateSystem
      tags:
        - Systems
      summary: Update a system
      description: |
        Updates the system's encrypted profile data.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSystemRequest"
      responses:
        "200":
          description: System updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemProfile"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: deleteSystem
      tags:
        - Systems
      summary: Delete a system
      description: |
        Permanently deletes a system and all its data.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/settings:
    get:
      operationId: getSystemSettings
      tags:
        - System Settings
      summary: Get system settings
      description: Returns the encrypted settings payload for the given system. Rate limit 60 req/min (readDefault).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      responses:
        "200":
          description: System settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptedEntity"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
    put:
      operationId: updateSystemSettings
      tags:
        - System Settings
      summary: Update system settings
      description: Replaces the encrypted settings payload for the given system. Rate limit 30 req/min (writeDefault).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSystemSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EncryptedEntity"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/settings/pin:
    post:
      operationId: setPin
      tags:
        - System Settings
      summary: Set system PIN
      description: Sets or replaces the system's PIN lock. Rate limit 5 req/min (authHeavy).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinRequest"
      responses:
        "200":
          description: PIN set
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - success
                    properties:
                      success:
                        type: boolean
                        const: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
