        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/claim:
    post:
      operationId: claimRotationChunk
