          type: integer
          minimum: 0
    UpdateLayerRequest:
      type: object
      required:
        - encryptedData
        - sortOrder
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextLayer (see ./plaintext.yaml#/PlaintextLayer)
        sortOrder:
          type: integer
          minimum: 0
        version:
          type: integer
          minimum: 1
    LayerResponse:
