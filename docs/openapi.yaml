        - memberB
        - totalDuration
        - sessionCount
        - percentageOfTotal
      properties:
        memberA:
          type: string
          pattern: ^mem_
          description: First member ID (lexicographically ordered)
        memberB:
          type: string
          pattern: ^mem_
          description: Second member ID (lexicographically ordered)
        totalDuration:
          type: integer
          description: Total overlap duration in milliseconds
        sessionCount:
          type: integer
          description: Number of overlapping session pairs
        percentageOfTotal:
          type: number
          description: Percentage of total fronting time
    CoFrontingBreakdownResponse:
      type: object
      required:
        - systemId
        - dateRange
        - coFrontingPercentage
        - pairs
      properties:
        systemId:
          type: string
          pattern: ^sys_
        dateRange:
          type: object
          required:
            - preset
            - start
            - end
          properties:
            preset:
              type: string
              nullable: true
            start:
              type: integer
            end:
              type: integer
        coFrontingPercentage:
          type: number
          description: Percentage of total fronting time involving co-fronting
        pairs:
          type: array
          items:
            $ref: "#/components/schemas/CoFrontingPair"
    FrontingReportResponse:
      type: object
      required:
        - id
        - systemId
        - encryptedData
        - format
        - generatedAt
      properties:
        id:
          type: string
          pattern: ^fr_
        systemId:
          type: string
          pattern: ^sys_
        encryptedData:
          type: string
          format: base64
          description: Encrypted report snapshot (client-generated)
        format:
          type: string
          enum:
            - html
            - pdf
        generatedAt:
          type: integer
          description: Timestamp when the report was generated (Unix milliseconds)
    CreateFrontingReportRequest:
      type: object
      required:
        - encryptedData
        - format
        - generatedAt
      properties:
        encryptedData:
          type: string
          format: base64
          description: Encrypted report snapshot
        format:
          type: string
          enum:
            - html
            - pdf
        generatedAt:
          type: integer
          description: Timestamp when the report was generated (Unix milliseconds)
    UpdateSystemSettingsRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextSystemSettings (see ./plaintext.yaml#/PlaintextSystemSettings)
        locale:
          type: string
          minLength: 1
          maxLength: 255
          description: Locale code sent as plaintext (server needs it for locale-aware operations)
        biometricEnabled:
          type: boolean
          description: Biometric state sent as plaintext (server needs it for biometric tracking)
        version:
          type: integer
          minimum: 1
    UpdateNomenclatureRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextNomenclature (see ./plaintext.yaml#/PlaintextNomenclature)
        version:
          type: integer
          minimum: 1
    PinRequest:
      type: object
      required:
        - pin
      properties:
        pin:
          type: string
          pattern: ^\d{4,6}$
          description: 4-6 digit numeric PIN
    PinVerifyResponse:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
          description: Whether the provided PIN matches the stored PIN
    SetupStatusResponse:
      type: object
      required:
        - nomenclatureComplete
        - profileComplete
        - setupComplete
      properties:
        nomenclatureComplete:
          type: boolean
          description: Whether the nomenclature step has been completed
        profileComplete:
          type: boolean
          description: Whether the profile step has been completed
        setupComplete:
          type: boolean
          description: Whether the full setup wizard has been completed
    SetupStepRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 131072
          description: |
            T1-encrypted data. For the nomenclature step: PlaintextNomenclature.
            For the profile step: PlaintextSystem.
    SetupCompleteRequest:
      type: object
      required:
        - encryptedData
        - recoveryKeyBackupConfirmed
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextSystemSettings (see ./plaintext.yaml#/PlaintextSystemSettings)
        locale:
          type: string
          minLength: 1
          maxLength: 255
        biometricEnabled:
          type: boolean
        recoveryKeyBackupConfirmed:
          type: boolean
          const: true
          description: Must be true to confirm the user has backed up their recovery key
    FriendDashboardResponse:
      type: object
      required:
        - systemId
        - memberCount
        - activeFronting
        - visibleMembers
        - visibleCustomFronts
        - visibleStructureEntities
        - keyGrants
      properties:
        systemId:
          type: string
          pattern: ^sys_
        memberCount:
          type: integer
          minimum: 0
          description: |
            Total non-archived member count (unfiltered). This reveals system
            size even with zero bucket access. The system owner accepted this
            friend connection, so revealing system size is an intentional
            privacy decision.
        activeFronting:
          type: object
          required:
            - sessions
            - isCofronting
          properties:
            sessions:
              type: array
              items:
                $ref: "#/components/schemas/FriendDashboardFrontingSession"
            isCofronting:
              type: boolean
        visibleMembers:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardMember"
        visibleCustomFronts:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardCustomFront"
        visibleStructureEntities:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardStructureEntity"
        keyGrants:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardKeyGrant"
          description: |
            Active (non-revoked) key grants for this friend. During key
            rotation, old grants may be revoked before content migration
            completes. The client should handle decryption failures
            gracefully during rotation windows.
    FriendDashboardFrontingSession:
      type: object
      required:
        - id
        - memberId
        - customFrontId
        - structureEntityId
        - startTime
        - encryptedData
      properties:
        id:
          type: string
          pattern: ^fs_
        memberId:
          type: string
          nullable: true
          pattern: ^mem_
        customFrontId:
          type: string
          nullable: true
          pattern: ^cf_
        structureEntityId:
          type: string
          nullable: true
          pattern: ^ste_
        startTime:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        encryptedData:
          type: string
          description: Base64-encoded encrypted blob (T2 per-bucket encryption)
    FriendDashboardMember:
      type: object
      required:
        - id
        - encryptedData
      properties:
        id:
          type: string
          pattern: ^mem_
        encryptedData:
          type: string
          description: Base64-encoded encrypted blob (T2 per-bucket encryption)
    FriendDashboardCustomFront:
      type: object
      required:
        - id
        - encryptedData
      properties:
        id:
          type: string
          pattern: ^cf_
        encryptedData:
          type: string
          description: Base64-encoded encrypted blob (T2 per-bucket encryption)
    FriendDashboardStructureEntity:
      type: object
      required:
        - id
        - encryptedData
      properties:
        id:
          type: string
          pattern: ^ste_
        encryptedData:
          type: string
          description: Base64-encoded encrypted blob (T2 per-bucket encryption)
    FriendDashboardKeyGrant:
      type: object
      required:
        - id
        - bucketId
        - encryptedKey
        - keyVersion
      properties:
        id:
          type: string
          pattern: ^kg_
        bucketId:
          type: string
          pattern: ^bkt_
        encryptedKey:
          type: string
          description: Base64-encoded encrypted bucket symmetric key
        keyVersion:
          type: integer
          minimum: 1
    FriendDashboardSyncEntry:
      type: object
      required:
        - entityType
        - count
        - latestUpdatedAt
      properties:
        entityType:
          type: string
          enum:
            - member
            - custom-front
            - structure-entity
            - fronting-session
          description: Entity type this entry covers
        count:
          type: integer
          minimum: 0
          description: Number of visible entities of this type
        latestUpdatedAt:
          type: integer
          format: int64
          description: Unix milliseconds of the most recently updated entity (0 if none)
    FriendDashboardSyncResponse:
      type: object
      required:
        - systemId
        - entries
      properties:
        systemId:
          type: string
          pattern: ^sys_
          description: The friend's system ID
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardSyncEntry"
          description: Per-entity-type sync state entries
    FriendConnectionResponse:
      type: object
      required:
        - id
        - accountId
        - friendAccountId
        - status
        - encryptedData
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          pattern: ^fc_
          description: Friend connection ID
          example: fc_abc123def456
        accountId:
          type: string
          pattern: ^acc_
          description: Owning account ID
          example: acc_abc123def456
        friendAccountId:
          type: string
          pattern: ^acc_
          description: Friend's account ID
          example: acc_def456ghi789
        status:
          $ref: "#/components/schemas/FriendConnectionStatus"
        encryptedData:
          type: string
          nullable: true
          contentEncoding: base64
          description: |
            Base64-encoded encrypted visibility settings (T1 master-key encrypted).
            Contains FriendVisibilitySettings (showMembers, showGroups, showStructure).
            Null until the user configures visibility for this friend.
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency version for updates
          example: 1
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1710000000000
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1710000000000
    FriendConnectionWithRotations:
      allOf:
        - $ref: "#/components/schemas/FriendConnectionResponse"
        - type: object
          required:
            - pendingRotations
          properties:
            pendingRotations:
              type: array
              items:
                $ref: "#/components/schemas/PendingRotation"
              description: |
                Bucket assignments that were cleaned up during the block/remove
                operation. The client should initiate key rotation for these buckets.
    FriendConnectionStatus:
      type: string
      enum:
        - pending
        - accepted
        - blocked
        - removed
      description: Current status of the friend connection
    FriendConnectionListResponse:
      type: object
      required:
        - data
        - nextCursor
        - hasMore
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FriendConnectionResponse"
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page, null if no more results
        hasMore:
          type: boolean
          description: Whether more results exist beyond this page
    UpdateFriendVisibilityRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          contentEncoding: base64
          description: |
            Base64-encoded encrypted visibility settings blob.
            The client encrypts FriendVisibilitySettings with the master key.
        version:
          type: integer
          minimum: 1
          description: Current version for optimistic concurrency control
    FriendCodeResponse:
      type: object
      required:
        - id
        - accountId
        - code
        - createdAt
        - expiresAt
        - archived
      properties:
        id:
          type: string
          pattern: ^fcd_
          description: Friend code ID
          example: fcd_abc123def456
        accountId:
          type: string
          pattern: ^acc_
          description: Owning account ID
          example: acc_abc123def456
        code:
          type: string
          pattern: ^[A-Z0-9]{4}-[A-Z0-9]{4}$
          description: Human-readable XXXX-XXXX formatted code
          example: AB12-CD34
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1710000000000
        expiresAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp in milliseconds when the code expires, null if no expiry
          example: null
        archived:
          type: boolean
          description: Whether the code has been archived (redeemed or manually archived)
          example: false
    FriendCodeListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FriendCodeResponse"
    RedeemFriendCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          pattern: ^[A-Z0-9]{4}-[A-Z0-9]{4}$
          description: XXXX-XXXX alphanumeric friend code to redeem
          example: AB12-CD34
    RedeemFriendCodeResponse:
      type: object
      required:
        - connectionIds
      properties:
        connectionIds:
          type: array
          items:
            type: string
            pattern: ^fc_
          minItems: 2
          maxItems: 2
          description: |
            The two bidirectional connection IDs created by the redemption.
            First is the code owner's connection, second is the redeemer's.
          example:
            - fc_abc123def456
            - fc_ghi789jkl012
    FriendNotificationPreferenceResponse:
      type: object
      required:
        - id
        - accountId
        - friendConnectionId
        - enabledEventTypes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          pattern: ^fnp_
          description: Friend notification preference ID
          example: fnp_abc123def456
        accountId:
          type: string
          pattern: ^acc_
          description: Owning account ID
          example: acc_abc123def456
        friendConnectionId:
          type: string
          pattern: ^fc_
          description: Associated friend connection ID
          example: fc_abc123def456
        enabledEventTypes:
          type: array
          items:
            $ref: "#/components/schemas/FriendNotificationEventType"
          description: List of event types for which notifications are enabled
        createdAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1710000000000
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1710000000000
    FriendNotificationEventType:
      type: string
      enum:
        - friend-switch-alert
      description: Types of friend notification events
    UpdateFriendNotificationPreferenceRequest:
      type: object
      required:
        - enabledEventTypes
      properties:
        enabledEventTypes:
          type: array
          items:
            $ref: "#/components/schemas/FriendNotificationEventType"
          description: List of event types for which notifications should be enabled
    ReceivedKeyGrant:
      type: object
      required:
        - id
        - bucketId
        - encryptedKey
        - keyVersion
        - grantorSystemId
        - senderBoxPublicKey
      properties:
        id:
          type: string
          pattern: ^kg_
        bucketId:
          type: string
          pattern: ^bkt_
        encryptedKey:
          type: string
          description: Base64-encoded encrypted bucket symmetric key
        keyVersion:
          type: integer
          minimum: 1
        grantorSystemId:
          type: string
          pattern: ^sys_
          description: System ID of the account that granted this key
        senderBoxPublicKey:
          type: string
          description: Base64url-encoded box public key of the grantor account
    FriendExportEntityType:
      type: string
      enum:
        - member
        - group
        - channel
        - message
        - note
        - poll
        - relationship
        - structure-entity-type
        - structure-entity
        - journal-entry
        - wiki-page
        - custom-front
        - fronting-session
        - board-message
        - acknowledgement
        - innerworld-entity
        - innerworld-region
        - field-definition
        - field-value
        - member-photo
        - fronting-comment
      description: Entity types available for friend-side data export
    FriendExportManifestResponse:
      type: object
      required:
        - systemId
        - entries
        - keyGrants
        - etag
      properties:
        systemId:
          type: string
          pattern: ^sys_
          description: The friend's system ID
          example: sys_abc123def456
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FriendExportManifestEntry"
          description: Per-entity-type counts and freshness timestamps
        keyGrants:
          type: array
          items:
            $ref: "#/components/schemas/FriendDashboardKeyGrant"
          description: Active key grants for decrypting bucket-encrypted data
        etag:
          type: string
          description: ETag for conditional requests (If-None-Match)
    FriendExportManifestEntry:
      type: object
      required:
        - entityType
        - count
        - lastUpdatedAt
      properties:
        entityType:
          $ref: "#/components/schemas/FriendExportEntityType"
        count:
          type: integer
          minimum: 0
          description: Number of bucket-visible entities of this type
        lastUpdatedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp in milliseconds of the most recently updated entity, null if count is 0
    FriendExportEntity:
      type: object
      required:
        - id
        - entityType
        - encryptedData
        - updatedAt
      properties:
        id:
          type: string
          description: Entity ID with type-specific prefix
        entityType:
          $ref: "#/components/schemas/FriendExportEntityType"
        encryptedData:
          type: string
          contentEncoding: base64
          description: Base64-encoded encrypted entity data (T2 per-bucket encryption)
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
    FriendExportPageResponse:
      type: object
      required:
        - data
        - nextCursor
        - hasMore
        - etag
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/FriendExportEntity"
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page, null if no more results
        hasMore:
          type: boolean
          description: Whether more results exist beyond this page
        etag:
          type: string
          description: ETag for conditional requests (If-None-Match)
    PlaintextImageSource:
      description: |
        How an image is referenced. Either a blob stored via the Blobs API
        or an external URL.
      oneOf:
        - type: object
          required:
            - kind
            - blobRef
          properties:
            kind:
              type: string
              const: blob
            blobRef:
              type: string
              description: BlobId from the Blobs API
        - type: object
          required:
            - kind
            - url
          properties:
            kind:
              type: string
              const: external
            url:
              type: string
              format: uri
    PlaintextSaturationLevel:
      description: How elaborated a member is within the system.
      oneOf:
        - type: object
          required:
            - kind
            - level
          properties:
            kind:
              type: string
              const: known
            level:
              type: string
              enum:
                - fragment
                - functional-fragment
                - partially-elaborated
                - highly-elaborated
        - type: object
          required:
            - kind
            - value
          properties:
            kind:
              type: string
              const: custom
            value:
              type: string
    PlaintextTag:
      description: |
        A tag for a member. Known tags have special semantics (e.g., "little"
        triggers Littles Safe Mode). Custom tags are user-defined.
      oneOf:
        - type: object
          required:
            - kind
            - tag
          properties:
            kind:
              type: string
              const: known
            tag:
              type: string
              enum:
                - protector
                - gatekeeper
                - caretaker
                - little
                - age-slider
                - trauma-holder
                - host
                - persecutor
                - mediator
                - anp
                - memory-holder
                - symptom-holder
                - middle
                - introject
                - fictive
                - factive
                - non-human
        - type: object
          required:
            - kind
            - value
          properties:
            kind:
              type: string
              const: custom
            value:
              type: string
    PlaintextVisualProperties:
      description: Visual styling for innerworld entities.
      type: object
      properties:
        color:
          type: string
          nullable: true
          description: "Hex color string (e.g., #FF00AA)"
        icon:
          type: string
          nullable: true
        size:
          type: number
          nullable: true
        opacity:
          type: number
          nullable: true
          minimum: 0
          maximum: 1
        imageSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
        externalUrl:
          type: string
          format: uri
          nullable: true
    PlaintextSystem:
      description: |
        **Encrypted into**: `encryptedData` on `POST /systems`, `PUT /systems/:id`

        The system profile visible after client-side decryption.
        Encryption tier: **T1** (master-key encrypted).
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Display name of the plural system
        displayName:
          type: string
          nullable: true
          description: Optional alternate display name
        description:
          type: string
          nullable: true
        avatarSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
    PlaintextMember:
      description: |
        **Encrypted into**: `encryptedData` on member create/update endpoints.

        A member (headmate) profile. Encryption tier: **T1** (master-key encrypted).
      type: object
      required:
        - name
        - pronouns
        - colors
        - tags
      properties:
        name:
          type: string
        pronouns:
          type: array
          items:
            type: string
          description: List of pronoun sets (e.g., ['she/her', 'they/them'])
        description:
          type: string
          nullable: true
        avatarSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
        colors:
          type: array
          items:
            type: string
            description: "Hex color (e.g., #FF00AA)"
          description: Member's associated colors (for UI theming)
        saturationLevel:
          $ref: "#/components/schemas/PlaintextSaturationLevel"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/PlaintextTag"
        suppressFriendFrontNotification:
          type: boolean
          description: When true, friends are not notified when this member starts fronting
        boardMessageNotificationOnFront:
          type: boolean
          description: When true, a board message is posted when this member starts fronting
    PlaintextMemberPhoto:
      description: |
        **Encrypted into**: `encryptedData` on member photo create endpoints.

        A photo entry in a member's gallery. Encryption tier: **T1**.
      type: object
      required:
        - imageSource
      properties:
        imageSource:
          $ref: "#/components/schemas/PlaintextImageSource"
        sortOrder:
          type: integer
        caption:
          type: string
          nullable: true
    PlaintextGroup:
      description: |
        **Encrypted into**: `encryptedData` on group create/update endpoints.

        A user-defined group for organizing members. Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        imageSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
        color:
          type: string
          nullable: true
          description: "Hex color (e.g., #FF00AA)"
        emoji:
          type: string
          nullable: true
    PlaintextCustomFront:
      description: |
        **Encrypted into**: `encryptedData` on custom front create/update endpoints.

        An abstract cognitive state logged like a member (e.g., "Dissociated", "Blurry").
        Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
          description: Hex color
        emoji:
          type: string
          nullable: true
    PlaintextFieldDefinition:
      description: |
        **Encrypted into**: `encryptedData` on field definition create/update endpoints.

        A user-defined custom field definition (name, description, options for
        select/multi-select types). Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
          nullable: true
          description: Valid options for select/multi-select field types. Null for other types.
    PlaintextFieldValue:
      description: |
        **Encrypted into**: `encryptedData` on field value set/update endpoints.

        A typed value for a custom field on a member. The `fieldType` discriminant
        determines the shape of `value`. Encryption tier: **T1**.
      oneOf:
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: text
            value:
              type: string
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: number
            value:
              type: number
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: boolean
            value:
              type: boolean
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: date
            value:
              type: string
              description: ISO 8601 date string
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: color
            value:
              type: string
              description: "Hex color (e.g., #FF00AA)"
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: select
            value:
              type: string
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: multi-select
            value:
              type: array
              items:
                type: string
        - type: object
          required:
            - fieldType
            - value
          properties:
            fieldType:
              type: string
              const: url
            value:
              type: string
              format: uri
    PlaintextRelationship:
      description: |
        **Encrypted into**: `encryptedData` on relationship create/update endpoints.

        Encrypted metadata for a relationship between two members.
        Note: `sourceMemberId`, `targetMemberId`, `type`, and `bidirectional`
        are sent as **separate plaintext fields** in the request body (not inside
        `encryptedData`) because the server needs them for querying.
        The `encryptedData` contains only the user-visible label and any
        additional notes. Encryption tier: **T1**.
      type: object
      properties:
        label:
          type: string
          nullable: true
          description: User-defined label (meaningful when type is "custom")
    PlaintextStructureEntityType:
      description: |
        **Encrypted into**: `encryptedData` on structure entity type create/update endpoints.

        A user-defined structure entity type within the system (e.g., "Subsystem",
        "Side System", "Layer"). Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        imageSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
        emoji:
          type: string
          nullable: true
    PlaintextStructureEntity:
      description: |
        **Encrypted into**: `encryptedData` on structure entity create/update endpoints.

        An instance of a user-defined structure entity type. Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        imageSource:
          oneOf:
            - $ref: "#/components/schemas/PlaintextImageSource"
            - type: "null"
        emoji:
          type: string
          nullable: true
    PlaintextFrontingSession:
      description: |
        **Encrypted into**: `encryptedData` on fronting session create/update endpoints.

        Encrypted metadata for a fronting session. Note: `memberId`, `customFrontId`,
        `structureEntityId`, `startTime`, and `endTime` are sent as separate plaintext
        fields. Encryption tier: **T1**.
      type: object
      properties:
        notes:
          type: string
          nullable: true
    PlaintextLifecycleEvent:
      description: |
        **Encrypted into**: `encryptedData` on lifecycle event create endpoint.

        Encrypted details of a lifecycle event. Note: `eventType`, `occurredAt`,
        and `plaintextMetadata` (member/structure/entity/region IDs) are sent
        as separate plaintext fields because the server needs them for querying
        and relationship tracking. Encryption tier: **T1**.
      type: object
      properties:
        title:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
    PlaintextInnerworldRegion:
      description: |
        **Encrypted into**: `encryptedData` on innerworld region create/update endpoints.

        A region within the system's innerworld. Encryption tier: **T1**.
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        visual:
          $ref: "#/components/schemas/PlaintextVisualProperties"
        boundaryData:
          type: array
          items:
            type: object
            required:
              - x
              - "y"
            properties:
              x:
                type: number
              "y":
                type: number
          description: Polygon boundary points for the region on the canvas
        accessType:
          type: string
          enum:
            - open
            - gatekept
        gatekeeperMemberIds:
          type: array
          items:
            type: string
    PlaintextInnerworldEntity:
      description: |
        **Encrypted into**: `encryptedData` on innerworld entity create/update endpoints.

        An entity placed on the innerworld canvas. Discriminated on `entityType`.
        Encryption tier: **T1**.
      type: object
      required:
        - entityType
        - positionX
        - positionY
      properties:
        entityType:
          type: string
          enum:
            - member
            - landmark
            - structure-entity
        positionX:
          type: number
          description: X coordinate on the canvas
        positionY:
          type: number
          description: Y coordinate on the canvas
        visual:
          $ref: "#/components/schemas/PlaintextVisualProperties"
        name:
          type: string
          description: Display name (required for landmark entities)
        description:
          type: string
          nullable: true
          description: Description (landmark entities only)
        linkedMemberId:
          type: string
          description: Member ID (member entities only)
        linkedStructureEntityId:
          type: string
          description: Structure entity ID (structure-entity entities only)
    PlaintextInnerworldCanvas:
      description: |
        **Encrypted into**: `encryptedData` on `PUT /systems/:systemId/innerworld/canvas`.

        The viewport state for the innerworld canvas. Encryption tier: **T1**.
      type: object
      required:
        - viewportX
        - viewportY
        - zoom
        - dimensions
      properties:
        viewportX:
          type: number
        viewportY:
          type: number
        zoom:
          type: number
        dimensions:
          type: object
          required:
            - width
            - height
          properties:
            width:
              type: number
            height:
              type: number
    PlaintextSystemSettings:
      description: |
        **Encrypted into**: `encryptedData` on `PUT /systems/:systemId/settings`.

        System-wide settings. Note: `locale` and `biometricEnabled` are sent as
        **separate plaintext fields** in the request body because the server needs
        them for locale-aware operations and biometric state tracking.
        Encryption tier: **T1**.
      type: object
      properties:
        theme:
          type: string
          enum:
            - light
            - dark
            - high-contrast
            - system
        fontScale:
          type: number
        appLock:
          type: object
          properties:
            pinEnabled:
              type: boolean
            biometricEnabled:
              type: boolean
            lockTimeout:
              type: integer
              description: Lock timeout in minutes (1-30)
            backgroundGraceSeconds:
              type: integer
              description: Seconds to keep keys in memory after app backgrounds (0-300)
        notifications:
          type: object
          properties:
            pushEnabled:
              type: boolean
            emailEnabled:
              type: boolean
            switchReminders:
              type: boolean
            checkInReminders:
              type: boolean
        syncPreferences:
          type: object
          properties:
            syncEnabled:
              type: boolean
            syncOnCellular:
              type: boolean
        privacyDefaults:
          type: object
          properties:
            defaultBucketForNewContent:
              type: string
              nullable: true
              description: BucketId
            friendRequestPolicy:
              type: string
              enum:
                - open
                - code-only
        littlesSafeMode:
          type: object
          description: Simplified UI configuration for littles
          properties:
            enabled:
              type: boolean
            allowedContentIds:
              type: array
              items:
                type: string
            simplifiedUIFlags:
              type: object
              properties:
                largeButtons:
                  type: boolean
                iconDriven:
                  type: boolean
                noDeletion:
                  type: boolean
                noSettings:
                  type: boolean
                noAnalytics:
                  type: boolean
        saturationLevelsEnabled:
          type: boolean
        autoCaptureFrontingOnJournal:
          type: boolean
          description: Auto-capture fronting snapshot when creating a journal entry
        snapshotSchedule:
          type: string
          enum:
            - daily
            - weekly
            - disabled
          description: |
            Automatic snapshot schedule. Client-triggered — the client reads
            this value and fires snapshots locally, preserving zero-knowledge.
        onboardingComplete:
          type: boolean
    PlaintextNomenclature:
      description: |
        **Encrypted into**: `encryptedData` on nomenclature update and setup endpoints.

        Per-system terminology preferences — map of TermCategory to selected display term.
        Encryption tier: **T1**.
      type: object
      properties:
        collective:
          type: string
          description: "Term for the collective (default: 'System'). Presets: System, Collective, Household, Crew, Group"
        individual:
          type: string
          description: "Term for individuals (default: 'Member'). Presets: Member, Alter, Headmate, Part, Insider, Facet, Aspect"
        fronting:
          type: string
          description: "Term for fronting (default: 'Fronting'). Presets: Fronting, In front, Driving, Piloting"
        switching:
          type: string
          description: "Term for switching (default: 'Switch'). Presets: Switch, Shift"
        coPresence:
          type: string
          description: "Term for co-fronting (default: 'Co-fronting'). Presets: Co-fronting, Co-conscious, Co-driving"
        internalSpace:
          type: string
          description: "Term for the internal space (default: 'Headspace'). Presets: Headspace, Innerworld"
        primaryFronter:
          type: string
          description: "Term for the host (default: 'Host'). Presets: Host, Primary fronter, Main fronter"
        structure:
          type: string
          description: "Term for system structure (default: 'System Structure'). Presets: System Structure, Topology, Map"
        dormancy:
          type: string
          description: "Term for dormancy (default: 'Dormancy'). Presets: Dormancy, Resting, Inactive"
        body:
          type: string
          description: "Term for the body (default: 'Body'). Presets: Body, Physical form, Vessel"
        amnesia:
          type: string
          description: "Term for amnesia (default: 'Amnesia'). Presets: Amnesia, Memory gap, Blackout"
        saturation:
          type: string
          description: "Term for saturation level (default: 'Saturation'). Presets: Saturation, Elaboration, Completeness"
    PlaintextStructureEntityMemberLink:
      description: |
        **Encrypted into**: `encryptedData` on structure entity member link endpoints.

        Encrypted metadata for a member's assignment to a structure entity.
        The `memberId` and `parentEntityId` are sent as separate plaintext fields.
        Encryption tier: **T1**.
      type: object
      properties:
        notes:
          type: string
          nullable: true
          description: Optional notes about this membership
    PlaintextStructureEntityAssociation:
      description: |
        **Encrypted into**: `encryptedData` (optional) on structure entity association
        create endpoints.

        Encrypted metadata for a directed cross-reference between structure entities.
        The `sourceEntityId` and `targetEntityId` are sent as separate plaintext
        fields. Encryption tier: **T1**.
      type: object
      properties:
        notes:
          type: string
          nullable: true
    account_PinRequest:
      type: object
      required:
        - pin
      properties:
        pin:
          type: string
          pattern: ^\d{4,6}$
          description: 4-6 digit PIN
    PendingRotation:
      type: object
      required:
        - systemId
        - bucketId
      properties:
        systemId:
          type: string
          pattern: ^sys_
          description: System that owns the bucket
          example: sys_abc123def456
        bucketId:
          type: string
          pattern: ^bkt_
          description: Bucket whose key should be rotated
          example: bkt_abc123def456
    SnapshotTrigger:
      type: string
      enum:
        - manual
        - scheduled-daily
        - scheduled-weekly
      example: manual
    UpdateStructureEntityLinkRequest:
      type: object
      properties:
        parentEntityId:
          type: string
          nullable: true
          description: ID of the parent entity, or null for a top-level link
        sortOrder:
          type: integer
          minimum: 0
          description: Display order among sibling links
    BucketExportManifestEntry:
      type: object
      required:
        - entityType
        - count
        - lastUpdatedAt
      properties:
        entityType:
          type: string
          description: The entity type (e.g. "member", "group", "custom-front")
        count:
          type: integer
          minimum: 0
          description: Number of entities of this type tagged with the bucket
        lastUpdatedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp (ms) of the most recently updated entity, or null if count is 0
    BucketExportManifestResponse:
      type: object
      required:
        - systemId
        - bucketId
        - entries
        - etag
      properties:
        systemId:
          type: string
          pattern: ^sys_
        bucketId:
          type: string
          pattern: ^bkt_
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BucketExportManifestEntry"
          description: Per-entity-type counts and freshness timestamps
        etag:
          type: string
          description: Weak ETag for conditional requests
    BucketExportEntity:
      type: object
      required:
        - id
        - entityType
        - encryptedData
        - updatedAt
      properties:
        id:
          type: string
          description: The entity ID (prefixed by type, e.g. "mem_", "grp_")
        entityType:
          type: string
          description: The entity type
        encryptedData:
          type: string
          description: Base64-encoded encrypted blob (T2 per-bucket encryption)
        updatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
    BucketExportPageResponse:
      type: object
      required:
        - items
        - nextCursor
        - hasMore
        - totalCount
        - etag
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BucketExportEntity"
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page, or null if no more pages
        hasMore:
          type: boolean
          description: Whether more pages are available
        totalCount:
          type: integer
          nullable: true
          description: Total count (always null for export endpoints)
        etag:
          type: string
          description: Weak ETag for conditional requests
    WebhookEventType:
      type: string
      enum:
        - member.created
        - member.updated
        - member.archived
        - fronting.started
        - fronting.ended
        - group.created
        - group.updated
        - lifecycle.event-recorded
        - custom-front.changed
        - channel.created
        - channel.updated
        - channel.archived
        - channel.restored
        - channel.deleted
        - message.created
        - message.updated
        - message.archived
        - message.restored
        - message.deleted
        - board-message.created
        - board-message.updated
        - board-message.pinned
        - board-message.unpinned
        - board-message.reordered
        - board-message.archived
        - board-message.restored
        - board-message.deleted
        - note.created
        - note.updated
        - note.archived
        - note.restored
        - note.deleted
        - poll.created
        - poll.updated
        - poll.closed
        - poll.archived
        - poll.restored
        - poll.deleted
        - poll-vote.cast
        - poll-vote.vetoed
        - acknowledgement.created
        - acknowledgement.confirmed
        - acknowledgement.archived
        - acknowledgement.restored
        - acknowledgement.deleted
        - bucket.created
        - bucket.updated
        - bucket.archived
        - bucket.restored
        - bucket.deleted
        - bucket-content-tag.tagged
        - bucket-content-tag.untagged
        - field-bucket-visibility.set
        - field-bucket-visibility.removed
        - friend.connected
        - friend.removed
        - friend.bucket-assigned
        - friend.bucket-unassigned
    WebhookConfigResponse:
      description: |
        A webhook configuration. The `secret` field is only included in the
        create response and is never exposed again via GET endpoints.
      type: object
      properties:
        id:
          type: string
          description: Webhook config ID (wh_ prefix)
        systemId:
          type: string
          description: System ID (sys_ prefix)
        url:
          type: string
          format: uri
          description: Webhook target URL
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
          description: Event types this webhook subscribes to
        enabled:
          type: boolean
          description: Whether the webhook is currently active
        cryptoKeyId:
          type: string
          nullable: true
          description: Optional API key ID for encrypted payloads
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency version
        archived:
          type: boolean
        archivedAt:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: integer
          format: int64
        updatedAt:
          type: integer
          format: int64
    CreateWebhookConfigRequest:
      type: object
      required:
        - url
        - eventTypes
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: Webhook target URL. Must use HTTPS in production.
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
          minItems: 1
          maxItems: 50
          description: Event types to subscribe to
        enabled:
          type: boolean
          default: true
          description: Whether the webhook is active on creation
        cryptoKeyId:
          type: string
          description: Optional API key ID for encrypted payloads (ak_ prefix)
    WebhookConfigCreateResponse:
      description: |
        Response from creating a webhook config. Includes the `secret` field
        (base64-encoded HMAC signing key) which is only exposed once.
      allOf:
        - $ref: "#/components/schemas/WebhookConfigResponse"
        - type: object
          properties:
            secret:
              type: string
              contentEncoding: base64
              description: Base64-encoded HMAC signing secret. Only returned on create.
    UpdateWebhookConfigRequest:
      type: object
      required:
        - version
      properties:
        url:
          type: string
          format: uri
          maxLength: 2048
          description: Updated webhook target URL
        eventTypes:
          type: array
          items:
            $ref: "#/components/schemas/WebhookEventType"
          minItems: 1
          maxItems: 50
          description: Updated event type subscriptions
        enabled:
          type: boolean
          description: Updated enabled status
        version:
          type: integer
          minimum: 1
          description: Current version for OCC check
    RotateWebhookSecretRequest:
      type: object
      required:
        - version
      properties:
        version:
          type: integer
          minimum: 1
          description: Current version for OCC check
    WebhookTestResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the test delivery succeeded
        httpStatus:
          type: integer
          nullable: true
          description: HTTP status code from the target URL
        error:
          type: string
          nullable: true
          description: Error message if the delivery failed
        durationMs:
          type: number
          description: Round-trip time in milliseconds
    WebhookDeliveryResponse:
      description: A webhook delivery record.
      type: object
      properties:
        id:
          type: string
          description: Delivery ID (wd_ prefix)
        webhookId:
          type: string
          description: Webhook config ID
        systemId:
          type: string
          description: System ID
        eventType:
          $ref: "#/components/schemas/WebhookEventType"
        status:
          type: string
          enum:
            - pending
            - success
            - failed
        httpStatus:
          type: integer
          nullable: true
          description: HTTP status code from the last delivery attempt
        attemptCount:
          type: integer
          minimum: 0
        lastAttemptAt:
          type: integer
          format: int64
          nullable: true
        nextRetryAt:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: integer
          format: int64
    ApiKeyType:
      type: string
      enum:
        - metadata
        - crypto
      description: |
        Key type. `metadata` keys carry no encrypted key material.
        `crypto` keys include `encryptedKeyMaterial` for payload encryption.
    ApiKeyScope:
      type: string
      enum:
        - read:members
        - write:members
        - read:fronting
        - write:fronting
        - read:groups
        - write:groups
        - read:system
        - write:system
        - read:webhooks
        - write:webhooks
        - read:audit-log
        - read:blobs
        - write:blobs
        - read:notifications
        - write:notifications
        - full
      description: Permission scope granted to this API key
    ApiKeyResponse:
      description: |
        An API key. The plaintext `token` is only returned on creation and
        cannot be retrieved again.
      type: object
      required:
        - id
        - systemId
        - keyType
        - scopes
        - createdAt
        - lastUsedAt
        - revokedAt
        - expiresAt
        - scopedBucketIds
      properties:
        id:
          type: string
          pattern: ^ak_
          description: API key ID (ak_ prefix)
          example: ak_abc123def456
        systemId:
          type: string
          pattern: ^sys_
          description: System ID that owns this key
          example: sys_abc123def456
        keyType:
          $ref: "#/components/schemas/ApiKeyType"
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
          description: Permission scopes granted to this key
        createdAt:
          type: integer
          format: int64
          description: Unix milliseconds when the key was created
          example: 1710000000000
        lastUsedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix milliseconds when the key was last used
        revokedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix milliseconds when the key was revoked, null if active
        expiresAt:
          type: integer
          format: int64
          nullable: true
          description: Unix milliseconds when the key expires, null if no expiry
        scopedBucketIds:
          type: array
          items:
            type: string
          nullable: true
          description: Privacy bucket IDs this key is scoped to, null if unrestricted
    CreateApiKeyRequest:
      type: object
      required:
        - keyType
        - scopes
        - encryptedData
      properties:
        keyType:
          $ref: "#/components/schemas/ApiKeyType"
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/ApiKeyScope"
          minItems: 1
          description: Permission scopes to grant. At least one required.
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: |
            Base64-encoded ciphertext blob containing the key's metadata,
            encrypted client-side with the master key.
        encryptedKeyMaterial:
          type: string
          minLength: 1
          description: |
            Base64-encoded encrypted key material. Required for `crypto` keys,
            forbidden for `metadata` keys.
        expiresAt:
          type: integer
          format: int64
          description: Optional Unix timestamp (seconds) when the key should expire
        scopedBucketIds:
          type: array
          items:
            type: string
            minLength: 1
          description: Optional list of privacy bucket IDs to restrict this key to
    ApiKeyCreateResponse:
      description: |
        Response from creating an API key. Includes the plaintext `token`
        which is only exposed once. The client must store it securely.
      allOf:
        - $ref: "#/components/schemas/ApiKeyResponse"
        - type: object
          required:
            - token
          properties:
            token:
              type: string
              description: Plaintext API key token (hex-encoded, 64 characters). Only returned on creation.
              example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
    ChannelResponse:
      description: |
        A chat channel or category. Discriminated on `type`: categories group
        channels hierarchically; channels hold messages. Extends EncryptedEntity
        with channel-specific server-visible fields.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - type
            - sortOrder
          properties:
            type:
              type: string
              enum:
                - category
                - channel
              description: "Discriminator: `category` groups channels; `channel` holds messages"
            parentId:
              type: string
              nullable: true
              pattern: ^ch_
              description: Parent category ID (null for top-level channels/categories)
            sortOrder:
              type: integer
              minimum: 0
              description: Display order within parent scope
    CreateChannelRequest:
      type: object
      required:
        - encryptedData
        - type
        - sortOrder
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted channel data (name, description, etc.)
        type:
          type: string
          enum:
            - category
            - channel
        parentId:
          type: string
          pattern: ^ch_
          description: Parent category ID (omit for top-level)
        sortOrder:
          type: integer
          minimum: 0
    UpdateChannelRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted channel data
        version:
          type: integer
          minimum: 1
        sortOrder:
          type: integer
          minimum: 0
    MessageResponse:
      description: |
        A chat message within a channel. Extends EncryptedEntity with message-specific
        server-visible fields. Messages are partitioned by timestamp for efficient
        range queries.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - channelId
            - timestamp
          properties:
            channelId:
              type: string
              pattern: ^ch_
              description: Channel this message belongs to
            replyToId:
              type: string
              nullable: true
              pattern: ^msg_
              description: ID of the message being replied to (null if not a reply)
            timestamp:
              type: integer
              format: int64
              description: Message send time in Unix milliseconds (used for partition pruning)
            editedAt:
              type: integer
              format: int64
              nullable: true
              description: Unix milliseconds when last edited (null until first edit)
    CreateMessageRequest:
      type: object
      required:
        - encryptedData
        - timestamp
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted message content (text, sender proxy identity, etc.)
        timestamp:
          type: integer
          format: int64
          minimum: 0
          description: Message send time in Unix milliseconds
        replyToId:
          type: string
          pattern: ^msg_
          description: ID of the message being replied to
    UpdateMessageRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted message content
        version:
          type: integer
          minimum: 1
    BoardMessageResponse:
      description: |
        A persistent board message (noticeboard entry). Extends EncryptedEntity
        with board-specific server-visible fields for pinning and ordering.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - pinned
            - sortOrder
          properties:
            pinned:
              type: boolean
              description: Whether this board message is pinned to the top
            sortOrder:
              type: integer
              minimum: 0
              description: Display order (ascending)
    CreateBoardMessageRequest:
      type: object
      required:
        - encryptedData
        - sortOrder
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted board message content (text, author proxy identity, etc.)
        sortOrder:
          type: integer
          minimum: 0
        pinned:
          type: boolean
          default: false
    ReorderBoardMessagesRequest:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - boardMessageId
              - sortOrder
            properties:
              boardMessageId:
                type: string
                pattern: ^bm_
                description: Board message ID to reorder
              sortOrder:
                type: integer
                minimum: 0
    UpdateBoardMessageRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted board message content
        version:
          type: integer
          minimum: 1
        sortOrder:
          type: integer
          minimum: 0
        pinned:
          type: boolean
    NoteResponse:
      description: |
        A private note, either bound to a specific author entity (member or
        structure entity) or system-wide. Extends EncryptedEntity with
        polymorphic authorship fields.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          properties:
            authorEntityType:
              type: string
              nullable: true
              enum:
                - member
                - structure-entity
              description: Author entity type (null for system-wide notes)
            authorEntityId:
              type: string
              nullable: true
              description: Author entity ID (null for system-wide notes)
    CreateNoteRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted note content (rich text, background color, etc.)
        author:
          type: object
          description: Author entity reference (omit for system-wide note)
          required:
            - entityType
            - entityId
          properties:
            entityType:
              type: string
              enum:
                - member
                - structure-entity
            entityId:
              type: string
              minLength: 1
    UpdateNoteRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted note content
        version:
          type: integer
          minimum: 1
    PollResponse:
      description: |
        A poll with cooperative voting. Extends EncryptedEntity with poll-specific
        configuration and status fields. Poll options, question text, and
        descriptions are encrypted client-side within `encryptedData`.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - kind
            - status
            - allowMultipleVotes
            - maxVotesPerMember
            - allowAbstain
            - allowVeto
          properties:
            createdByMemberId:
              type: string
              nullable: true
              pattern: ^mem_
              description: Member who created the poll (null if not attributed)
            kind:
              type: string
              enum:
                - standard
                - custom
              description: Poll kind
            status:
              type: string
              enum:
                - open
                - closed
              description: Whether the poll is accepting votes
            closedAt:
              type: integer
              format: int64
              nullable: true
              description: Unix milliseconds when the poll was closed (null while open)
            endsAt:
              type: integer
              format: int64
              nullable: true
              description: Optional scheduled end time in Unix milliseconds
            allowMultipleVotes:
              type: boolean
              description: Whether voters can cast more than one vote
            maxVotesPerMember:
              type: integer
              minimum: 1
              description: Maximum votes per voter (must be 1 when allowMultipleVotes is false)
            allowAbstain:
              type: boolean
              description: Whether voters can abstain (null optionId)
            allowVeto:
              type: boolean
              description: Whether voters can veto
    CreatePollRequest:
      type: object
      required:
        - encryptedData
        - kind
        - allowMultipleVotes
        - maxVotesPerMember
        - allowAbstain
        - allowVeto
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted poll data (question, options, description, etc.)
        kind:
          type: string
          enum:
            - standard
            - custom
        createdByMemberId:
          type: string
          pattern: ^mem_
          description: Member creating the poll
        allowMultipleVotes:
          type: boolean
        maxVotesPerMember:
          type: integer
          minimum: 1
          description: Must be 1 when allowMultipleVotes is false
        allowAbstain:
          type: boolean
        allowVeto:
          type: boolean
        endsAt:
          type: integer
          format: int64
          description: Optional scheduled end time in Unix milliseconds
    UpdatePollRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted poll data
        version:
          type: integer
          minimum: 1
    PollVoteResponse:
      description: |
        A vote cast on a poll. Voters are polymorphic entity references
        (member or structure entity).
      type: object
      required:
        - id
        - pollId
        - isVeto
        - votedAt
        - encryptedData
        - archived
        - createdAt
      properties:
        id:
          type: string
          description: Vote ID
        pollId:
          type: string
          pattern: ^poll_
          description: Poll this vote belongs to
        optionId:
          type: string
          nullable: true
          description: Selected option ID (null for abstain)
        voter:
          type: object
          nullable: true
          description: Voter entity reference
          required:
            - entityType
            - entityId
          properties:
            entityType:
              type: string
              enum:
                - member
                - structure-entity
            entityId:
              type: string
        isVeto:
          type: boolean
          description: Whether this vote is a veto
        votedAt:
          type: integer
          format: int64
          description: Unix milliseconds when the vote was cast
        encryptedData:
          type: string
          contentEncoding: base64
          description: T1-encrypted vote data (optional comment, etc.)
        archived:
          type: boolean
        archivedAt:
          type: integer
          format: int64
          nullable: true
        createdAt:
          type: integer
          format: int64
          description: Unix milliseconds
    CastVoteRequest:
      type: object
      required:
        - optionId
        - voter
        - encryptedData
      properties:
        optionId:
          type: string
          nullable: true
          description: Selected option ID (null for abstain)
        voter:
          type: object
          required:
            - entityType
            - entityId
          properties:
            entityType:
              type: string
              enum:
                - member
                - structure-entity
            entityId:
              type: string
              minLength: 1
        isVeto:
          type: boolean
          default: false
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted vote data (optional comment, etc.)
    UpdatePollVoteRequest:
      type: object
      required:
        - optionId
        - encryptedData
      properties:
        optionId:
          type: string
          nullable: true
          description: Selected option ID (null for abstain)
        isVeto:
          type: boolean
          description: Whether this vote is a veto (optional, keeps existing value if omitted)
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted vote data
    PollResultsOptionCount:
      type: object
      required:
        - optionId
        - count
      properties:
        optionId:
          type: string
          nullable: true
          description: Option ID (null for abstain votes)
        count:
          type: integer
          minimum: 0
    PollResultsResponse:
      type: object
      required:
        - pollId
        - totalVotes
        - vetoCount
        - optionCounts
      properties:
        pollId:
          type: string
          pattern: ^poll_
        totalVotes:
          type: integer
          minimum: 0
          description: Total non-archived votes
        vetoCount:
          type: integer
          minimum: 0
          description: Number of veto votes
        optionCounts:
          type: array
          items:
            $ref: "#/components/schemas/PollResultsOptionCount"
          description: Vote counts grouped by option
    AcknowledgementResponse:
      description: |
        A mandatory acknowledgement — a targeted alert that persists until a
        specific member confirms it. Extends EncryptedEntity with confirmation
        tracking fields.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - confirmed
          properties:
            createdByMemberId:
              type: string
              nullable: true
              pattern: ^mem_
              description: Member who created the acknowledgement (null if not attributed)
            confirmed:
              type: boolean
              description: Whether the target member has confirmed this acknowledgement
    CreateAcknowledgementRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted acknowledgement data (message, target member, etc.)
        createdByMemberId:
          type: string
          pattern: ^mem_
          description: Member creating the acknowledgement
    ConfirmAcknowledgementRequest:
      type: object
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: Optional T1-encrypted confirmation data (replaces existing encryptedData)
    ImportJobStatus:
      type: string
      enum:
        - pending
        - validating
        - importing
        - completed
        - failed
    ImportSource:
      type: string
      enum:
        - simply-plural
        - pluralkit
        - pluralscape
      description: Source format for an import job.
    ImportEntityType:
      type: string
      enum:
        - member
        - group
        - fronting-session
        - switch
        - custom-field
        - note
        - chat-message
        - board-message
        - poll
        - timer
        - privacy-bucket
        - friend
        - unknown
    ImportErrorNonFatal:
      type: object
      required:
        - entityType
        - entityId
        - message
        - fatal
      properties:
        entityType:
          $ref: "#/components/schemas/ImportEntityType"
        entityId:
          type: string
          nullable: true
        message:
          type: string
        fatal:
          type: boolean
          enum:
            - false
    ImportErrorFatal:
      type: object
      required:
        - entityType
        - entityId
        - message
        - fatal
        - recoverable
      properties:
        entityType:
          $ref: "#/components/schemas/ImportEntityType"
        entityId:
          type: string
          nullable: true
        message:
          type: string
        fatal:
          type: boolean
          enum:
            - true
        recoverable:
          type: boolean
    ImportError:
      oneOf:
        - $ref: "#/components/schemas/ImportErrorNonFatal"
        - $ref: "#/components/schemas/ImportErrorFatal"
    ImportAvatarMode:
      type: string
      enum:
        - api
        - zip
        - skip
    ImportCollectionTotals:
      type: object
      required:
        - total
        - imported
        - updated
        - skipped
        - failed
      properties:
        total:
          type: integer
          minimum: 0
        imported:
          type: integer
          minimum: 0
        updated:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
    ImportCheckpointState:
      type: object
      required:
        - schemaVersion
        - checkpoint
        - options
        - totals
      properties:
        schemaVersion:
          type: integer
          enum:
            - 1
        checkpoint:
          type: object
          required:
            - completedCollections
            - currentCollection
            - currentCollectionLastSourceId
          properties:
            completedCollections:
              type: array
              items:
                $ref: "#/components/schemas/ImportEntityType"
            currentCollection:
              $ref: "#/components/schemas/ImportEntityType"
            currentCollectionLastSourceId:
              type: string
              nullable: true
        options:
          type: object
          required:
            - selectedCategories
            - avatarMode
          properties:
            selectedCategories:
              type: object
              additionalProperties:
                type: boolean
            avatarMode:
              $ref: "#/components/schemas/ImportAvatarMode"
        totals:
          type: object
          required:
            - perCollection
          properties:
            perCollection:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/ImportCollectionTotals"
    ImportJobResponse:
      type: object
      required:
        - id
        - accountId
        - systemId
        - source
        - status
        - progressPercent
        - errorLog
        - warningCount
        - chunksTotal
        - chunksCompleted
        - checkpointState
        - createdAt
        - updatedAt
        - completedAt
      properties:
        id:
          type: string
        accountId:
          type: string
        systemId:
          type: string
        source:
          $ref: "#/components/schemas/ImportSource"
        status:
          $ref: "#/components/schemas/ImportJobStatus"
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        errorLog:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ImportError"
        warningCount:
          type: integer
          minimum: 0
        chunksTotal:
          type: integer
          nullable: true
          minimum: 0
        chunksCompleted:
          type: integer
          minimum: 0
        checkpointState:
          allOf:
            - $ref: "#/components/schemas/ImportCheckpointState"
          nullable: true
        createdAt:
          type: integer
        updatedAt:
          type: integer
        completedAt:
          type: integer
          nullable: true
    CreateImportJobBody:
      type: object
      required:
        - source
        - selectedCategories
        - avatarMode
      properties:
        source:
          $ref: "#/components/schemas/ImportSource"
        selectedCategories:
          type: object
          additionalProperties:
            type: boolean
          description: Map of ImportEntityType → whether to import. At least one must be true.
        avatarMode:
          $ref: "#/components/schemas/ImportAvatarMode"
    UpdateImportJobBody:
      type: object
      description: At least one field must be provided.
      properties:
        status:
          $ref: "#/components/schemas/ImportJobStatus"
        progressPercent:
          type: integer
          minimum: 0
          maximum: 100
        warningCount:
          type: integer
          minimum: 0
        chunksTotal:
          type: integer
          nullable: true
          minimum: 0
        chunksCompleted:
          type: integer
          minimum: 0
        errorLog:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ImportError"
        checkpointState:
          allOf:
            - $ref: "#/components/schemas/ImportCheckpointState"
          nullable: true
    ImportEntityRefResponse:
      type: object
      required:
        - id
        - accountId
        - systemId
        - source
        - sourceEntityType
        - sourceEntityId
        - pluralscapeEntityId
        - importedAt
      properties:
        id:
          type: string
        accountId:
          type: string
        systemId:
          type: string
        source:
          $ref: "#/components/schemas/ImportSource"
        sourceEntityType:
          $ref: "#/components/schemas/ImportEntityType"
        sourceEntityId:
          type: string
          maxLength: 128
        pluralscapeEntityId:
          type: string
          description: Brand varies by sourceEntityType (MemberId, GroupId, etc.).
        importedAt:
          type: integer
  responses:
    NoContent:
      description: Success with no response body
    Unauthenticated:
      description: Missing or invalid session token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict (duplicate, version mismatch, or has dependents)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit resets
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
