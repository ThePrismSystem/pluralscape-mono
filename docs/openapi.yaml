            schema:
              $ref: "#/components/schemas/ClaimChunkRequest"
      responses:
        "200":
          description: Chunk claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimChunkResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/complete:
    post:
      operationId: completeRotation
