          required: true
          schema:
            type: string
            pattern: ^bkt_
          description: The privacy bucket ID
        - name: entityType
          in: query
          required: true
          schema:
            type: string
          description: The entity type to export (e.g. "member", "group")
        - name: limit
          in: query
