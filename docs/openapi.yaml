  /systems/{systemId}/buckets/{bucketId}/rotations:
    post:
      operationId: initiateKeyRotation
      tags:
        - Key Rotation
      summary: Initiate a bucket key rotation
      description: |
        Starts a key rotation for a privacy bucket.

        **Crypto flow**: Key rotation replaces the symmetric key for a Privacy Bucket.
        The client generates a new XChaCha20-Poly1305 key, wraps it with the master
        key (`wrappedNewKey`), and re-encrypts the bucket key for each friend using
        their X25519 public key (`friendKeyGrants`). The server then tracks which
        items need re-encryption. The client claims chunks of items, re-encrypts
        each with the new key, and reports completion.

        Rotation states: `initiated` -> `migrating` -> `sealing` -> `completed`.
        If items fail after max attempts, the rotation transitions to `failed`.
        Hard limit: 7 days before a rotation is force-expired.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - name: bucketId
          in: path
          required: true
          description: Privacy Bucket ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateRotationRequest"
      responses:
        "201":
          description: Rotation initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/progress:
    get:
      operationId: getRotationProgress
      tags:
        - Key Rotation
      summary: Get rotation progress
      description: Returns the current status and progress of an in-flight key rotation. Rate limit 60 req/min (readDefault).
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
