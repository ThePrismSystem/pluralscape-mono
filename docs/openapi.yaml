        - subsystemId
        - layerId
      properties:
        subsystemId:
          type: string
        layerId:
          type: string
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: Optional T1-encrypted PlaintextStructureLink (see ./plaintext.yaml#/PlaintextStructureLink)
    CreateSubsystemSideSystemLinkRequest:
      type: object
      required:
        - subsystemId
        - sideSystemId
      properties:
        subsystemId:
          type: string
        sideSystemId:
          type: string
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: Optional T1-encrypted PlaintextStructureLink (see ./plaintext.yaml#/PlaintextStructureLink)
    CreateSideSystemLayerLinkRequest:
      type: object
      required:
        - sideSystemId
        - layerId
      properties:
        sideSystemId:
          type: string
        layerId:
          type: string
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: Optional T1-encrypted PlaintextStructureLink (see ./plaintext.yaml#/PlaintextStructureLink)
    StructureLinkResponse:
      type: object
      required:
        - id
        - systemId
        - createdAt
      properties:
        id:
          type: string
        systemId:
          type: string
        subsystemId:
          type: string
        sideSystemId:
          type: string
        layerId:
          type: string
        encryptedData:
          type: string
          nullable: true
