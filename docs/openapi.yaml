    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  contact:
    name: Pluralscape
servers:
  - url: http://localhost:3000/v1
    description: Local development
security:
  - bearerAuth: []
tags:
  - name: Health
    description: Service health checks
  - name: Auth
    description: Authentication, sessions, and account recovery
  - name: Account
    description: Account management and audit log
  - name: Friends
    description: Friend network and friend-facing dashboard
  - name: Systems
    description: Plural system profiles
  - name: System Settings
    description: System settings, nomenclature, PIN, and setup
  - name: Members
    description: System members (headmates)
  - name: Member Photos
    description: Photos attached to members
  - name: Member Fields
    description: Custom field values on members
  - name: Groups
    description: Member groups and group memberships
  - name: Custom Fronts
    description: Abstract cognitive states logged like members
  - name: Device Tokens
    description: Push notification device token registration and management
  - name: Notification Configs
    description: Per-event notification preferences (enabled, push enabled)
  - name: Notifications
    description: Real-time notification delivery via Server-Sent Events
  - name: Fields
    description: Custom field definitions for a system
  - name: Relationships
    description: Relationships between members
  - name: Structure Entity Types
    description: User-defined structure entity types within a system
  - name: Structure Entities
    description: Structure entities (instances of user-defined entity types)
  - name: Structure Entity Links
    description: Hierarchical parent-child links between structure entities
  - name: Structure Entity Member Links
    description: Member assignments to structure entities
  - name: Structure Entity Associations
    description: Directed cross-references between structure entities
  - name: Lifecycle Events
    description: System lifecycle events (splits, fusions, etc.)
  - name: Innerworld
    description: Innerworld regions, entities, and canvas
  - name: Privacy Buckets
    description: Privacy buckets for scoping T2-encrypted content and friend sharing
  - name: Bucket Content Tags
    description: Tag entities to privacy buckets for friend visibility
  - name: Bucket Friend Assignments
    description: Grant and revoke friend access to privacy buckets
  - name: Bucket Export
    description: Export bucket contents for friend-facing data sync
  - name: Blobs
    description: Encrypted file upload and download
  - name: Key Rotation
    description: Privacy bucket key rotation
  - name: Fronting Sessions
    description: Fronting session tracking (who is fronting and when)
  - name: Fronting Comments
    description: Comments attached to fronting sessions
  - name: Analytics
    description: Fronting analytics (duration breakdowns, co-fronting statistics)
  - name: Fronting Reports
    description: Immutable encrypted report snapshots
  - name: Timer Configs
    description: Recurring check-in timer configurations
  - name: Check-In Records
    description: Scheduled check-in instances with respond/dismiss lifecycle
  - name: Import
    description: Data import jobs and source entity mappings.
paths:
  /auth/register:
    post:
      operationId: register
      tags:
        - Auth
      summary: Register a new account
      description: |
        Creates a new account with email/password authentication.

        **Crypto flow**: The server hashes the password with Argon2id to create
        the account credential. The client derives the master encryption key from
        the same password using Argon2id (with a different salt/context) and wraps
        it for server-side storage. A recovery key is generated that can decrypt
        the master key independently of the password.

        The recovery key must be stored securely by the client — it is the **only**
        way to recover the master encryption key if the password is forgotten.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with email and password
      description: |
        Authenticates with email/password and returns a session token.

        **Security**: Timing is equalized across success and failure paths to
        prevent user-enumeration attacks. The password is verified against an
        Argon2id hash. Password length is capped at 1024 bytes to prevent
        Argon2 DoS on this unauthenticated endpoint.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/password-reset/recovery-key:
    post:
      operationId: passwordResetViaRecoveryKey
      tags:
        - Auth
      summary: Reset password using recovery key
      description: |
        Resets the account password using the recovery key.

        **Crypto flow**: The recovery key decrypts the master encryption key,
        which is then re-wrapped with the new password-derived key. A new
        recovery key is generated (the old one is invalidated). All existing
        encrypted data remains accessible because the underlying master key is
        unchanged — only its wrapping changes.

        Rate limit: 5 req/min (authHeavy)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetViaRecoveryKeyRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasswordResetResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/biometric/enroll:
    post:
      operationId: biometricEnroll
      tags:
        - Auth
      summary: Enroll biometric authentication
      description: |
        Enrolls a biometric token for the authenticated account.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BiometricTokenRequest"
      responses:
        "201":
          description: Biometric enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricEnrollResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/biometric/verify:
    post:
      operationId: biometricVerify
      tags:
        - Auth
      summary: Verify biometric authentication
      description: |
        Verifies a biometric token against the enrolled credential.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BiometricTokenRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BiometricVerifyResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions:
    get:
      operationId: listSessions
      tags:
        - Auth
      summary: List active sessions
      description: |
        Returns all active sessions for the authenticated account.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags:
        - Auth
      summary: Revoke a specific session
      description: |
        Revokes a session by ID. Cannot revoke the current session (use logout instead).

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^sess_
          description: Session ID to revoke
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out (revoke current session)
      description: |
        Revokes the current session token.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/sessions/revoke-all:
    post:
      operationId: revokeAllSessions
      tags:
        - Auth
      summary: Revoke all other sessions
      description: |
        Revokes all sessions except the current one.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All other sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/recovery-key/status:
    get:
      operationId: getRecoveryKeyStatus
      tags:
        - Auth
      summary: Get recovery key status
      description: |
        Returns whether a recovery key exists and when it was created.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recovery key status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryKeyStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /auth/recovery-key/regenerate:
    post:
      operationId: regenerateRecoveryKey
      tags:
        - Auth
      summary: Regenerate recovery key
      description: |
        Regenerates the recovery key. Requires current password and explicit confirmation.

        **Crypto flow**: The current password verifies identity and decrypts the
        master key. A new recovery key is generated and used to create a fresh
        encrypted copy of the master key. The old recovery key and its encrypted
        master key copy are permanently invalidated.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRecoveryKeyRequest"
      responses:
        "201":
          description: New recovery key generated
          content:
            application/json:
              schema:
                type: object
                required:
                  - recoveryKey
                properties:
                  recoveryKey:
                    type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account:
    get:
      operationId: getAccount
      tags:
        - Account
      summary: Get account info
      description: |
        Returns the authenticated account's details.

        Rate limit: 20 req/min (authLight)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: deleteAccount
      tags:
        - Account
      summary: Delete account
      description: |
        Permanently deletes the authenticated account and all associated data.
        Requires the current password for confirmation. This action is
        irreversible — all systems, members, sessions, keys, and dependent data
        are cascade-deleted.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/email:
    put:
      operationId: changeEmail
      tags:
        - Account
      summary: Change account email
      description: |
        Changes the account email. Requires current password for verification.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEmailRequest"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - email
                properties:
                  email:
                    type: string
                    format: email
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/password:
    put:
      operationId: changePassword
      tags:
        - Account
      summary: Change account password
      description: |
        Changes the account password. Requires current password for verification.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/audit-log:
    get:
      operationId: getAuditLog
      tags:
        - Account
      summary: Query account audit log
      description: |
        Returns audit log entries for the authenticated account.
        Supports filtering by event type, resource type, and time range.

        Rate limit: 30 req/min (auditQuery)
      security:
        - bearerAuth: []
      parameters:
        - name: eventType
          in: query
          schema:
            type: string
          description: Filter by event type (e.g., "member.created", "session.revoked")
        - name: resourceType
          in: query
          schema:
            type: string
            pattern: ^[a-z][a-z0-9-]*$
          description: Filter by resource type (e.g., "member", "group", "session")
        - name: from
          in: query
          schema:
            type: integer
            minimum: 0
          description: Start of time range as Unix timestamp in milliseconds (inclusive)
        - name: to
          in: query
          schema:
            type: integer
            minimum: 0
          description: End of time range as Unix timestamp in milliseconds (inclusive)
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/settings:
    put:
      operationId: updateAccountSettings
      tags:
        - Account
      summary: Update account settings
      description: |
        Update account-level settings. Currently supports enabling/disabling
        IP address and user-agent logging in the audit log (ADR 028).
        Uses optimistic concurrency control via the version field.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateAccountSettingsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/pin:
    post:
      operationId: setAccountPin
      tags:
        - Account
      summary: Set account PIN
      description: |
        Sets a 4-6 digit PIN on the account's primary system settings.
        Overwrites any existing PIN. The PIN is hashed server-side with Argon2id.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/account_PinRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: removeAccountPin
      tags:
        - Account
      summary: Remove account PIN
      description: |
        Removes the PIN from the account's primary system settings.
        Requires the current PIN for verification. Returns 404 if no PIN is set.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/account_PinRequest"
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/pin/verify:
    post:
      operationId: verifyAccountPin
      tags:
        - Account
      summary: Verify account PIN
      description: |
        Verifies the account PIN. Returns `{ verified: true }` on success.
        Uses anti-timing measures — verification runs even when no PIN is set.
        Returns 404 if no PIN is configured, 401 if the PIN is incorrect.

        Rate limit: 5 req/min (authHeavy)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/account_PinRequest"
      responses:
        "200":
          description: PIN verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyPinResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/device-transfer:
    post:
      operationId: initiateDeviceTransfer
      tags:
        - Account
      summary: Initiate a device transfer
      description: |
        Creates a pending device transfer request. The source device supplies
        the code salt (for Argon2id key derivation) and the encrypted key
        material (master key encrypted under the transfer key). Both are
        hex-encoded. The transfer expires after 5 minutes.

        Rate limit: 5 req/hour (account-keyed)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateTransferRequest"
      responses:
        "201":
          description: Transfer initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateTransferResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/device-transfer/{transferId}/approve:
    post:
      operationId: approveDeviceTransfer
      tags:
        - Account
      summary: Approve a device transfer
      description: |
        Approves a pending device transfer. Only the session that initiated
        the transfer may approve it. Returns 403 if called from a different
        session, 404 if the transfer is not found or expired.

        Rate limit: 5 req/hour (account-keyed)
      security:
        - bearerAuth: []
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
            pattern: ^dtr_
          description: Device transfer request ID
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          description: Session mismatch — only the initiating session may approve
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/device-transfer/{transferId}/complete:
    post:
      operationId: completeDeviceTransfer
      tags:
        - Account
      summary: Complete a device transfer
      description: |
        Completes a device transfer by verifying the transfer code and returning
        the encrypted key material. The code is a 10-digit numeric string entered
        on the new device. Rate-limited per transfer to prevent brute-forcing.

        Rate limit: 5 attempts per transfer TTL
      security:
        - bearerAuth: []
      parameters:
        - name: transferId
          in: path
          required: true
          schema:
            type: string
            pattern: ^dtr_
          description: Device transfer request ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTransferRequest"
      responses:
        "200":
          description: Transfer completed — encrypted key material returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteTransferResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          description: Key derivation worker pool unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /account/friends:
    get:
      operationId: listFriendConnections
      tags:
        - Friends
      summary: List friend connections
      description: |
        Returns a paginated list of the authenticated account's friend connections,
        ordered by creation date (newest first).

        By default, archived connections are excluded. Pass `includeArchived=true`
        to include them.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: includeArchived
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Whether to include archived connections in the results
      responses:
        "200":
          description: Paginated list of friend connections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/key-grants:
    get:
      operationId: listReceivedKeyGrants
      tags:
        - Friends
      summary: List all received key grants
      description: |
        Returns all active (non-revoked) key grants where the authenticated
        account is the recipient. Enables eager fetching of bucket encryption
        keys for the friend dashboard without querying per-connection.

        Grant count is bounded so no pagination is needed.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active key grants for the authenticated account
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - grants
                    properties:
                      grants:
                        type: array
                        items:
                          $ref: "#/components/schemas/ReceivedKeyGrant"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}:
    get:
      operationId: getFriendConnection
      tags:
        - Friends
      summary: Get a single friend connection
      description: |
        Returns the details of a specific friend connection owned by the
        authenticated account. Returns 404 if the connection does not exist
        or is archived.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "200":
          description: Friend connection details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/block:
    post:
      operationId: blockFriendConnection
      tags:
        - Friends
      summary: Block a friend connection
      description: |
        Blocks a friend connection. Only connections with status `accepted` or
        `pending` can be blocked. Blocking a connection:

        1. Transitions both sides of the connection to `blocked` status
        2. Cleans up all bucket assignments in both directions
        3. Revokes active key grants for the cleaned-up buckets
        4. Returns pending rotations the client should initiate

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "200":
          description: Connection blocked with pending key rotations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionWithRotations"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/remove:
    post:
      operationId: removeFriendConnection
      tags:
        - Friends
      summary: Remove a friend connection
      description: |
        Removes a friend connection. Connections with status `accepted`, `pending`,
        or `blocked` can be removed. Removing a connection:

        1. Transitions both sides of the connection to `removed` status
        2. Cleans up all bucket assignments in both directions
        3. Revokes active key grants for the cleaned-up buckets
        4. Returns pending rotations the client should initiate

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "200":
          description: Connection removed with pending key rotations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionWithRotations"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/archive:
    post:
      operationId: archiveFriendConnection
      tags:
        - Friends
      summary: Archive a friend connection
      description: |
        Soft-archives a friend connection. Archived connections are hidden from
        the default list view but can be restored later. Returns 204 on success.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/restore:
    post:
      operationId: restoreFriendConnection
      tags:
        - Friends
      summary: Restore an archived friend connection
      description: |
        Restores a previously archived friend connection. Returns the restored
        connection details. Returns 404 if the connection is not archived.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "200":
          description: Restored friend connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/visibility:
    put:
      operationId: updateFriendVisibility
      tags:
        - Friends
      summary: Update friend visibility settings
      description: |
        Updates the encrypted visibility settings for a friend connection. The
        `encryptedData` blob contains the client-encrypted FriendVisibilitySettings
        (showMembers, showGroups, showStructure). Uses optimistic concurrency
        control via the `version` field.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFriendVisibilityRequest"
      responses:
        "200":
          description: Updated friend connection with new visibility settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendConnectionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/notifications:
    get:
      operationId: getFriendNotificationPreference
      tags:
        - Friends
      summary: Get friend notification preferences
      description: |
        Returns the notification preferences for a friend connection. If no
        preferences exist yet, creates them with default values (all friend
        event types enabled) and returns the newly created record.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      responses:
        "200":
          description: Friend notification preferences (created with defaults if not yet set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendNotificationPreferenceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    patch:
      operationId: updateFriendNotificationPreference
      tags:
        - Friends
      summary: Update friend notification preferences
      description: |
        Updates the enabled event types for a friend connection's notification
        preferences. The preference record must already exist (call GET first
        to auto-create with defaults if needed).

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFriendNotificationPreferenceRequest"
      responses:
        "200":
          description: Updated notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendNotificationPreferenceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/export/manifest:
    get:
      operationId: getFriendExportManifest
      tags:
        - Friends
      summary: Get friend export manifest
      description: |
        Returns the export manifest for a friend connection, containing
        per-entity-type counts, freshness timestamps, and active key grants.

        The client uses this to decide which entity types need refreshing
        before starting paginated downloads. Supports conditional requests
        via `If-None-Match` / `ETag`.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from a previous response for conditional request
      responses:
        "200":
          description: Export manifest with entity counts and key grants
          headers:
            ETag:
              schema:
                type: string
              description: ETag for conditional requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendExportManifestResponse"
        "304":
          description: Not modified (ETag matched)
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/export:
    get:
      operationId: getFriendExportPage
      tags:
        - Friends
      summary: Paginated friend data export
      description: |
        Returns a paginated page of bucket-visible encrypted entities for a
        specific entity type. The server returns encrypted blobs for client-side
        search indexing (zero-knowledge architecture).

        Supports conditional requests via `If-None-Match` / `ETag`.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: Friend connection ID
        - name: entityType
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/FriendExportEntityType"
          description: The type of entity to export
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque pagination cursor from a previous response
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum number of items to return (default 50, max 100)
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from a previous response for conditional request
      responses:
        "200":
          description: Paginated export data with encrypted entity blobs
          headers:
            ETag:
              schema:
                type: string
              description: ETag for conditional requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendExportPageResponse"
        "304":
          description: Not modified (ETag matched)
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/dashboard:
    get:
      operationId: getFriendDashboard
      tags:
        - Friends
      summary: Get friend dashboard
      description: |
        Returns a read-only summary view of a friend's system, filtered by
        privacy bucket access. The response includes all bucket-visible data.

        **Client responsibility:** The client MUST apply FriendVisibilitySettings
        (showMembers, showGroups, showStructure) after decrypting the
        connection's encrypted_data. The server is zero-knowledge and cannot
        enforce these toggles.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: The friend connection ID (owned by the authenticated account)
      responses:
        "200":
          description: Dashboard data filtered by bucket access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendDashboardResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friends/{connectionId}/dashboard/sync:
    get:
      operationId: getFriendDashboardSync
      tags:
        - Friends
      summary: Get friend dashboard sync projection
      description: |
        Returns per-entity-type counts and latest timestamps so the client
        can determine which entity types need incremental sync. Covers
        members, custom fronts, structure entities, and active fronting
        sessions. Filtered by the caller's bucket access on the friend's system.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fc_
          description: The friend connection ID (owned by the authenticated account)
      responses:
        "200":
          description: Sync projection per entity type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendDashboardSyncResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friend-codes:
    post:
      operationId: createFriendCode
      tags:
        - Friends
      summary: Generate a new friend code
      description: |
        Generates a new XXXX-XXXX formatted friend code for the authenticated
        account. The code can be shared with another user to establish a friend
        connection. Enforces a per-account quota of active (non-archived) codes.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Friend code created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendCodeResponse"
        "400":
          description: Quota exceeded (too many active codes)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      operationId: listFriendCodes
      tags:
        - Friends
      summary: List active friend codes
      description: |
        Returns all active, non-expired, non-archived friend codes for the
        authenticated account. This endpoint does not use pagination as the
        per-account quota limits the total number of codes.

        Rate limit: 60 req/min (readDefault)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of active friend codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FriendCodeListResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friend-codes/redeem:
    post:
      operationId: redeemFriendCode
      tags:
        - Friends
      summary: Redeem a friend code
      description: |
        Redeems a friend code to establish a bidirectional friend connection.
        Creates two connection rows (one for each direction) with status `accepted`,
        then archives the redeemed code.

        **Error cases:**
        - `NOT_FOUND`: Code does not exist or is already archived
        - `FRIEND_CODE_EXPIRED`: Code has passed its expiry time
        - `CONFLICT`: Cannot redeem your own code, or already friends with the code owner

        Rate limit: 10 req/min (friendCodeRedeem)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemFriendCodeRequest"
      responses:
        "201":
          description: Friend connection established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemFriendCodeResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /account/friend-codes/{codeId}/archive:
    post:
      operationId: archiveFriendCode
      tags:
        - Friends
      summary: Archive a friend code
      description: |
        Soft-archives a friend code, preventing it from being redeemed.
        Returns 204 on success. Returns 404 if the code does not exist
        or is already archived.

        Rate limit: 60 req/min (write)
      security:
        - bearerAuth: []
      parameters:
        - name: codeId
          in: path
          required: true
          schema:
            type: string
            pattern: ^fcd_
          description: Friend code ID
      responses:
        "204":
          $ref: "#/components/responses/NoContent"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems:
