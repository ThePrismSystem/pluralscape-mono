        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
        version:
          type: integer
          minimum: 1
        enabled:
          type: boolean
        intervalMinutes:
          type: integer
          minimum: 1
          nullable: true
        wakingHoursOnly:
          type: boolean
        wakingStart:
          type: string
          nullable: true
          pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
        wakingEnd:
          type: string
          nullable: true
          pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
