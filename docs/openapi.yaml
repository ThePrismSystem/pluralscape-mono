            structureIds:
              type: array
              items:
                type: string
              description: IDs of structures involved
            entityIds:
              type: array
              items:
                type: string
              description: IDs of innerworld entities involved
            regionIds:
              type: array
              items:
                type: string
              description: IDs of innerworld regions involved
    UpdateLifecycleEventRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        eventType:
          $ref: "#/components/schemas/LifecycleEventType"
        occurredAt:
          type: integer
          format: int64
          minimum: 0
          description: Unix timestamp in milliseconds when the event occurred
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextLifecycleEvent (see ./plaintext.yaml#/PlaintextLifecycleEvent)
        plaintextMetadata:
          type: object
          description: Server-visible metadata for querying and relationship tracking
          properties:
            memberIds:
              type: array
              items:
                type: string
            structureIds:
              type: array
              items:
                type: string
            entityIds:
              type: array
              items:
                type: string
            regionIds:
              type: array
              items:
                type: string
        version:
          type: integer
          minimum: 1
    LifecycleEventResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - eventType
            - occurredAt
          properties:
            eventType:
              $ref: "#/components/schemas/LifecycleEventType"
            occurredAt:
              type: integer
              format: int64
              description: Unix timestamp in milliseconds when the event occurred
            plaintextMetadata:
              type: object
              nullable: true
              description: Server-visible metadata (member/structure/entity/region IDs)
    CreateRegionRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextInnerworldRegion (see ./plaintext.yaml#/PlaintextInnerworldRegion)
        parentRegionId:
          type: string
          nullable: true
          description: ID of the parent region for nesting
    UpdateRegionRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextInnerworldRegion (see ./plaintext.yaml#/PlaintextInnerworldRegion)
        version:
          type: integer
          minimum: 1
    RegionResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          properties:
            parentRegionId:
              type: string
              nullable: true
              description: ID of the parent region, null for top-level regions
    CreateEntityRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextInnerworldEntity (see ./plaintext.yaml#/PlaintextInnerworldEntity)
        regionId:
          type: string
          nullable: true
          description: ID of the region this entity belongs to
    UpdateEntityRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextInnerworldEntity (see ./plaintext.yaml#/PlaintextInnerworldEntity)
        version:
          type: integer
          minimum: 1
    EntityResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          properties:
            regionId:
              type: string
              nullable: true
              description: ID of the region this entity belongs to
    UpdateCanvasRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextInnerworldCanvas (see ./plaintext.yaml#/PlaintextInnerworldCanvas)
        version:
          type: integer
          minimum: 1
    CanvasResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
    BucketResponse:
      description: |
        A privacy bucket. Buckets scope T2-encrypted content for friend sharing.
        Each bucket has its own symmetric key (XChaCha20-Poly1305) and controls
        which entities are visible to which friends via content tags and key grants.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - archived
          properties:
            id:
              type: string
              pattern: ^bkt_
              example: bkt_abc123def456
            archived:
              type: boolean
              default: false
            archivedAt:
              type: integer
              format: int64
              nullable: true
              description: Unix timestamp in milliseconds when archived, null if not archived
    CreateBucketRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted bucket data (name, description, color, etc.)
    UpdateBucketRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted bucket data
        version:
          type: integer
          minimum: 1
    BucketContentTagResponse:
      type: object
      required:
        - entityType
        - entityId
        - bucketId
      properties:
        entityType:
          type: string
          enum:
            - member
            - group
            - channel
            - message
            - note
            - poll
            - relationship
            - structure-entity-type
            - structure-entity
            - journal-entry
            - wiki-page
            - custom-front
            - fronting-session
            - board-message
            - acknowledgement
            - innerworld-entity
            - innerworld-region
            - field-definition
            - field-value
            - member-photo
            - fronting-comment
          description: Type of entity tagged to this bucket
        entityId:
          type: string
          description: ID of the tagged entity
        bucketId:
          type: string
          pattern: ^bkt_
          description: Bucket ID
    TagContentRequest:
      type: object
      required:
        - entityType
        - entityId
      properties:
        entityType:
          type: string
          enum:
            - member
            - group
            - channel
            - message
            - note
            - poll
            - relationship
            - structure-entity-type
            - structure-entity
            - journal-entry
            - wiki-page
            - custom-front
            - fronting-session
            - board-message
            - acknowledgement
            - innerworld-entity
            - innerworld-region
            - field-definition
            - field-value
            - member-photo
            - fronting-comment
        entityId:
          type: string
          minLength: 1
          description: ID of the entity to tag
    AssignBucketFriendRequest:
      type: object
      required:
        - connectionId
        - encryptedBucketKey
        - keyVersion
      properties:
        connectionId:
          type: string
          pattern: ^fc_
          description: Friend connection ID
        encryptedBucketKey:
          type: string
          minLength: 1
          description: Bucket symmetric key encrypted with the friend's X25519 public key (base64)
        keyVersion:
          type: integer
          minimum: 1
          description: Version of the bucket key being granted
    BucketFriendAssignmentResponse:
      type: object
      required:
        - friendConnectionId
        - bucketId
        - friendAccountId
      properties:
        friendConnectionId:
          type: string
          pattern: ^fc_
          description: Friend connection ID
        bucketId:
          type: string
          pattern: ^bkt_
          description: Bucket ID
        friendAccountId:
          type: string
          pattern: ^acc_
          description: Account ID of the friend
    UnassignBucketFriendResponse:
      type: object
      required:
        - pendingRotation
      properties:
        pendingRotation:
          type: object
          required:
            - systemId
            - bucketId
          properties:
            systemId:
              type: string
              pattern: ^sys_
            bucketId:
              type: string
              pattern: ^bkt_
          description: Indicates a key rotation should be initiated for this bucket after unassignment
    BlobPurpose:
      type: string
      enum:
        - avatar
        - member-photo
        - journal-image
        - attachment
        - export
        - littles-safe-mode
      description: The intended purpose of the blob, which determines size limits
      example: avatar
    CreateUploadUrlRequest:
      type: object
      required:
        - purpose
        - mimeType
        - sizeBytes
        - encryptionTier
      properties:
        purpose:
          $ref: "#/components/schemas/BlobPurpose"
        mimeType:
          type: string
          minLength: 1
          maxLength: 255
          description: MIME type of the file
          example: image/png
        sizeBytes:
          type: integer
          minimum: 1
          description: |
            File size in bytes. Max depends on purpose:
            avatar/littles-safe-mode = 5 MiB, member-photo/journal-image = 10 MiB,
            attachment = 25 MiB, export = 500 MiB.
        encryptionTier:
          type: integer
          enum:
            - 1
            - 2
          description: 1 = master-key encrypted (private), 2 = per-bucket encrypted (shared)
    UploadUrlResponse:
      type: object
      required:
        - blobId
        - uploadUrl
        - expiresAt
      properties:
        blobId:
          type: string
          description: ID of the created blob record
          example: blob_abc123
        uploadUrl:
          type: string
          format: uri
          description: Presigned URL for uploading the encrypted file
        expiresAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the upload URL expires
    ConfirmUploadRequest:
      type: object
      required:
        - checksum
      properties:
        checksum:
          type: string
          minLength: 64
          maxLength: 64
          description: SHA-256 hex digest of the uploaded file
          example: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
        thumbnailOfBlobId:
          type: string
          description: If this blob is a thumbnail, the ID of the parent blob
    BlobResponse:
      type: object
      required:
        - id
        - systemId
        - purpose
        - sizeBytes
        - checksum
        - encryptionTier
        - uploadedAt
      properties:
        id:
          type: string
          description: Blob identifier
          example: blob_abc123
        systemId:
          type: string
          description: System that owns this blob
          example: sys_abc123
        purpose:
          $ref: "#/components/schemas/BlobPurpose"
        mimeType:
          type: string
          nullable: true
          description: MIME type of the uploaded file
        sizeBytes:
          type: integer
          description: File size in bytes
        checksum:
          type: string
          description: SHA-256 hex digest of the uploaded file
        encryptionTier:
          type: integer
          enum:
            - 1
            - 2
          description: 1 = master-key encrypted, 2 = per-bucket encrypted. Needed to select the correct decryption key.
        uploadedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
        thumbnailOfBlobId:
          type: string
          nullable: true
          description: If this blob is a thumbnail, the ID of the parent blob
    DownloadUrlResponse:
      type: object
      required:
        - blobId
        - downloadUrl
        - expiresAt
      properties:
        blobId:
          type: string
          description: ID of the blob
        downloadUrl:
          type: string
          format: uri
          description: Presigned URL for downloading the encrypted file
        expiresAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when the download URL expires
    RotationState:
      type: string
      enum:
        - initiated
        - migrating
        - sealing
        - completed
        - failed
      example: migrating
    InitiateRotationRequest:
      type: object
      required:
        - wrappedNewKey
        - newKeyVersion
        - friendKeyGrants
      properties:
        wrappedNewKey:
          type: string
          minLength: 1
          description: New bucket key encrypted with the master key
        newKeyVersion:
          type: integer
          minimum: 2
          description: Version number for the new key (must be greater than current)
        friendKeyGrants:
          type: array
          items:
            type: object
            required:
              - friendAccountId
              - encryptedKey
            properties:
              friendAccountId:
                type: string
                minLength: 1
                description: Account ID of the friend receiving the key grant
              encryptedKey:
                type: string
                minLength: 1
                description: New bucket key encrypted with the friend's X25519 public key
    RotationResponse:
      type: object
      required:
        - id
        - bucketId
        - fromKeyVersion
        - toKeyVersion
        - state
        - initiatedAt
        - totalItems
        - completedItems
        - failedItems
      properties:
        id:
          type: string
          description: Rotation identifier
        bucketId:
          type: string
          description: Privacy bucket being rotated
        fromKeyVersion:
          type: integer
          description: Previous key version
        toKeyVersion:
          type: integer
          description: New key version
        state:
          $ref: "#/components/schemas/RotationState"
        initiatedAt:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when rotation started
        completedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp in milliseconds when rotation completed
        totalItems:
          type: integer
          description: Total number of items to re-encrypt
        completedItems:
          type: integer
          description: Number of items successfully re-encrypted
        failedItems:
          type: integer
          description: Number of items that failed re-encryption
    ClaimChunkRequest:
      type: object
      properties:
        chunkSize:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
          description: Number of items to claim for re-encryption
    ClaimChunkResponse:
      type: object
      required:
        - items
        - rotationState
      properties:
        items:
          type: array
          items:
            type: object
            required:
              - id
              - rotationId
              - entityType
              - entityId
              - status
            properties:
              id:
                type: string
                description: Rotation item identifier
              rotationId:
                type: string
              entityType:
                type: string
                description: Type of entity to re-encrypt
              entityId:
                type: string
                description: ID of the entity to re-encrypt
              status:
                type: string
              claimedBy:
                type: string
                nullable: true
              claimedAt:
                type: integer
                format: int64
                nullable: true
              completedAt:
                type: integer
                format: int64
                nullable: true
              attempts:
                type: integer
        rotationState:
          $ref: "#/components/schemas/RotationState"
    CompleteChunkRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - itemId
              - status
            properties:
              itemId:
                type: string
                minLength: 1
                description: ID of the rotation item
              status:
                type: string
                enum:
                  - completed
                  - failed
                description: Whether re-encryption succeeded or failed
    CompleteChunkResponse:
      type: object
      required:
        - rotation
        - transitioned
      properties:
        rotation:
          $ref: "#/components/schemas/RotationResponse"
        transitioned:
          type: boolean
          description: Whether the rotation state transitioned (e.g., to sealing or completed)
    FrontingSessionResponse:
      description: |
        A fronting session. Extends EncryptedEntity with server-visible fields:
        subject IDs (memberId/customFrontId/structureEntityId), startTime, endTime,
        and archived status.
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          properties:
            memberId:
              type: string
              nullable: true
            customFrontId:
              type: string
              nullable: true
            structureEntityId:
              type: string
              nullable: true
            startTime:
              type: integer
              format: int64
              description: Unix milliseconds when the session started
            endTime:
              type: integer
              format: int64
              nullable: true
              description: Unix milliseconds when the session ended (null if active)
    CreateFrontingSessionRequest:
      type: object
      required:
        - encryptedData
        - startTime
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextFrontingSession
        startTime:
          type: integer
          format: int64
          minimum: 0
          description: Unix milliseconds. Retroactive values are allowed.
        memberId:
          type: string
          description: Member ID (mem_ prefix). At least one subject required.
        customFrontId:
          type: string
          description: Custom front ID (cf_ prefix)
        structureEntityId:
          type: string
          description: Structure entity ID (ste_ prefix)
    UpdateFrontingSessionRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextFrontingSession
        version:
          type: integer
          minimum: 1
    EndFrontingSessionRequest:
      type: object
      required:
        - endTime
        - version
      properties:
        endTime:
          type: integer
          format: int64
          minimum: 0
          description: Unix milliseconds. Must be after startTime.
        version:
          type: integer
          minimum: 1
    ActiveFrontingResponse:
      description: |
        The current active fronting state for a system. Contains all sessions with
        no end time, a co-fronting flag, and a map of subject entity IDs to their
        encrypted entity blobs for client-side decryption.
      type: object
      required:
        - sessions
        - isCofronting
        - entityMemberMap
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/FrontingSessionResponse"
          description: All currently active fronting sessions (no end time)
        isCofronting:
          type: boolean
          description: True if more than one session is currently active
        entityMemberMap:
          type: object
          additionalProperties:
            type: object
          description: |
            Map of subject entity IDs (memberId, customFrontId, or structureEntityId)
            to their corresponding encrypted entity response objects. Populated for
            all subjects referenced by the active sessions.
    FrontingCommentResponse:
      description: |
        A comment attached to a fronting session. Extends EncryptedEntity with the
        parent session ID and the authoring subject (member, custom front, or
        structure entity).
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - frontingSessionId
          properties:
            frontingSessionId:
              type: string
              description: ID of the parent fronting session (fs_ prefix)
            memberId:
              type: string
              nullable: true
              description: Authoring member ID (mem_ prefix), if set
            customFrontId:
              type: string
              nullable: true
              description: Authoring custom front ID (cf_ prefix), if set
            structureEntityId:
              type: string
              nullable: true
              description: Authoring structure entity ID (ste_ prefix), if set
    CreateFrontingCommentRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted comment content
        memberId:
          type: string
          description: Authoring member ID (mem_ prefix). At least one subject required.
        customFrontId:
          type: string
          description: Authoring custom front ID (cf_ prefix)
        structureEntityId:
          type: string
          description: Authoring structure entity ID (ste_ prefix)
    UpdateFrontingCommentRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          contentEncoding: base64
          minLength: 1
          maxLength: 87382
          description: T1-encrypted comment content
        version:
          type: integer
          minimum: 1
    SubjectFrontingBreakdown:
      type: object
      required:
        - subjectType
        - subjectId
        - totalDuration
        - sessionCount
        - averageSessionLength
        - percentageOfTotal
      properties:
        subjectType:
          type: string
          enum:
            - member
            - customFront
            - structureEntity
          description: The type of fronting subject
        subjectId:
          type: string
          description: ID of the subject (member, custom front, or structure entity)
        totalDuration:
          type: integer
          description: Total fronting duration in milliseconds
        sessionCount:
          type: integer
          description: Number of fronting sessions
        averageSessionLength:
          type: integer
          description: Average session length in milliseconds
        percentageOfTotal:
          type: number
          description: Percentage of total fronting time (0-100)
    FrontingBreakdownResponse:
      type: object
      required:
        - systemId
        - dateRange
        - subjectBreakdowns
      properties:
        systemId:
          type: string
          pattern: ^sys_
        dateRange:
          type: object
          required:
            - preset
            - start
            - end
          properties:
            preset:
              type: string
              nullable: true
              enum:
                - last-7-days
                - last-30-days
                - last-90-days
                - last-year
                - all-time
                - custom
                - null
            start:
              type: integer
              description: Start timestamp (Unix milliseconds)
            end:
              type: integer
              description: End timestamp (Unix milliseconds)
        subjectBreakdowns:
          type: array
          items:
            $ref: "#/components/schemas/SubjectFrontingBreakdown"
    CoFrontingPair:
