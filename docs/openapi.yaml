          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextTimerConfig
        enabled:
          type: boolean
          default: true
        intervalMinutes:
          type: integer
          minimum: 1
        wakingHoursOnly:
          type: boolean
        wakingStart:
          type: string
          pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
        wakingEnd:
          type: string
          pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
    UpdateTimerConfigRequest:
      type: object
      required:
        - encryptedData
        - version
