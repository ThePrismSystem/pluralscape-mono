  /systems/{systemId}/blobs/upload-url:
    post:
      operationId: createUploadUrl
      tags:
        - Blobs
      summary: Request a presigned upload URL
      description: |
        Returns a presigned URL to upload an encrypted blob.

        **Crypto flow**: The client encrypts the file locally before upload:
        - **Tier 1** (`encryptionTier: 1`): encrypted with the master key.
          Used for private content (avatars, journal images).
        - **Tier 2** (`encryptionTier: 2`): encrypted with a Privacy Bucket key.
          Used for content shared with friends.

        The encrypted file is uploaded directly to S3-compatible storage via
        the presigned URL. The server never sees the plaintext.
        After upload, call the confirm endpoint with the file's SHA-256 checksum.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
      requestBody:
        required: true
        content:
