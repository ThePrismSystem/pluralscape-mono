        - Members
      summary: Update a member
      description: |
        Updates the encrypted payload for an existing member. The server stores
        an opaque ciphertext blob; all field-level validation is client-side.
        Returns 409 if the provided version conflicts with the server's current version.

        Rate limit: 30 req/min (writeDefault)
