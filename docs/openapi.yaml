  /systems/{systemId}/buckets/{bucketId}/rotations:
    post:
      operationId: initiateKeyRotation
      tags:
        - Key Rotation
      summary: Initiate a bucket key rotation
      description: |
        Starts a key rotation for a privacy bucket.

        **Crypto flow**: Key rotation replaces the symmetric key for a Privacy Bucket.
        The client generates a new XChaCha20-Poly1305 key, wraps it with the master
        key (`wrappedNewKey`), and re-encrypts the bucket key for each friend using
        their X25519 public key (`friendKeyGrants`). The server then tracks which
        items need re-encryption. The client claims chunks of items, re-encrypts
        each with the new key, and reports completion.

        Rotation states: `initiated` -> `migrating` -> `sealing` -> `completed`.
        If items fail after max attempts, the rotation transitions to `failed`.
        Hard limit: 7 days before a rotation is force-expired.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - name: bucketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateRotationRequest"
      responses:
        "201":
          description: Rotation initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/progress:
    get:
      operationId: getRotationProgress
      tags:
        - Key Rotation
      summary: Get rotation progress
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - name: bucketId
          in: path
          required: true
          schema:
            type: string
        - name: rotationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rotation progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotationResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/claim:
    post:
      operationId: claimRotationChunk
      tags:
        - Key Rotation
      summary: Claim a chunk of items to re-encrypt
      description: |
        Claims a batch of items that need re-encryption as part of the key rotation.
        The client re-encrypts these items with the new key and reports completion.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - name: bucketId
          in: path
          required: true
          schema:
            type: string
        - name: rotationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimChunkRequest"
      responses:
        "200":
          description: Chunk claimed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimChunkResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/rotations/{rotationId}/complete-chunk:
    post:
      operationId: completeRotationChunk
      tags:
        - Key Rotation
      summary: Report chunk completion
      description: |
        Reports the completion status of previously claimed rotation items.
        Each item is marked as completed or failed.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/SystemId"
        - name: bucketId
          in: path
          required: true
          schema:
            type: string
        - name: rotationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteChunkRequest"
      responses:
        "200":
          description: Chunk completion reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteChunkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token from login or registration
  parameters:
    SystemId:
      name: systemId
      in: path
      required: true
      schema:
        type: string
        pattern: ^sys_
      description: System ID (prefixed with `sys_`)
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        pattern: ^mem_
      description: Member ID (prefixed with `mem_`)
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        pattern: ^grp_
      description: Group ID (prefixed with `grp_`)
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque pagination cursor from a previous response
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum number of items to return (default 25, max 100)
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - INVALID_CURSOR
                - INVALID_FRIEND_CODE
                - UNAUTHENTICATED
                - SESSION_EXPIRED
                - KEY_VERSION_STALE
                - FORBIDDEN
                - SCOPE_INSUFFICIENT
                - BUCKET_ACCESS_DENIED
                - NOT_FOUND
                - CONFLICT
                - HAS_DEPENDENTS
                - ROTATION_IN_PROGRESS
                - FRIEND_CODE_EXPIRED
                - BIOMETRIC_DISABLED
                - INVALID_TOKEN
                - INVALID_PIN
                - PRECONDITION_FAILED
                - BLOB_TOO_LARGE
                - QUOTA_EXCEEDED
                - RATE_LIMITED
                - INTERNAL_ERROR
                - SERVICE_UNAVAILABLE
            message:
              type: string
            details:
              description: Optional structured error details
        requestId:
          type: string
          format: uuid
    PaginationMeta:
      type: object
      properties:
        nextCursor:
          type: string
          nullable: true
          description: Cursor for the next page, null if no more results
        hasMore:
          type: boolean
        totalCount:
          type: integer
          nullable: true
          description: Total count (may be null for performance)
    EncryptedEntity:
      type: object
      description: |
        Base shape for most resources. The `encryptedData` field contains a
        base64-encoded XChaCha20-Poly1305 ciphertext blob. The server stores it
        opaquely and never inspects the contents. The client is responsible for
        encrypting before write and decrypting after read using the appropriate
        key (master key for T1, bucket key for T2). The `version` field is used
        for optimistic concurrency control — updates must include the current version.
      required:
        - id
        - systemId
        - encryptedData
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        systemId:
          type: string
        encryptedData:
          type: string
          description: |
            Base64-encoded ciphertext. Contains `{ciphertext, nonce, algorithm, keyVersion}`
            serialized by the client. T1 (master-key) encrypted data has `keyVersion: null`.
            T2 (bucket-encrypted) data includes the `keyVersion` and `bucketId`.
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency version. Must match current version on update.
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds
        updatedAt:
          type: integer
          description: Unix timestamp in milliseconds
        archived:
          type: boolean
          default: false
        archivedAt:
          type: integer
          nullable: true
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 1024
    LoginResponse:
      type: object
      required:
        - sessionToken
        - accountId
        - accountType
      properties:
        sessionToken:
          type: string
        accountId:
          type: string
        systemId:
          type: string
          nullable: true
        accountType:
          type: string
          enum:
            - system
            - viewer
    RegistrationRequest:
      type: object
      required:
        - email
        - password
        - recoveryKeyBackupConfirmed
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
          maxLength: 1024
        recoveryKeyBackupConfirmed:
          type: boolean
          const: true
        accountType:
          type: string
          enum:
            - system
            - viewer
          default: system
    RegistrationResponse:
      type: object
      required:
        - sessionToken
        - recoveryKey
        - accountId
        - accountType
      properties:
        sessionToken:
          type: string
        recoveryKey:
          type: string
        accountId:
          type: string
        accountType:
          type: string
          enum:
            - system
            - viewer
    PasswordResetViaRecoveryKeyRequest:
      type: object
      required:
        - email
        - recoveryKey
        - newPassword
      properties:
        email:
          type: string
          format: email
        recoveryKey:
          type: string
          minLength: 1
          maxLength: 200
        newPassword:
          type: string
          minLength: 8
          maxLength: 1024
    PasswordResetResponse:
      type: object
      required:
        - sessionToken
        - recoveryKey
        - accountId
      properties:
        sessionToken:
          type: string
        recoveryKey:
          type: string
        accountId:
          type: string
    BiometricTokenRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 4096
    SessionInfo:
      type: object
      required:
        - id
        - createdAt
      properties:
        id:
          type: string
        createdAt:
          type: integer
          description: Unix timestamp in milliseconds
        lastActive:
          type: integer
          nullable: true
        expiresAt:
          type: integer
          nullable: true
    SessionListResponse:
      type: object
      required:
        - sessions
        - hasMore
      properties:
        sessions:
          type: array
          items:
            $ref: "#/components/schemas/SessionInfo"
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    RegenerateRecoveryKeyRequest:
      type: object
      required:
        - currentPassword
        - confirmed
      properties:
        currentPassword:
          type: string
          minLength: 1
        confirmed:
          type: boolean
          const: true
    RecoveryKeyStatusResponse:
      type: object
      properties:
        hasRecoveryKey:
          type: boolean
        createdAt:
          type: integer
          nullable: true
    RevokeAllResponse:
      type: object
      required:
        - ok
        - revokedCount
      properties:
        ok:
          type: boolean
        revokedCount:
          type: integer
    AccountInfo:
      type: object
      required:
        - accountId
        - accountType
        - createdAt
        - updatedAt
      properties:
        accountId:
          type: string
        accountType:
          type: string
          enum:
            - system
            - viewer
        systemId:
          type: string
          nullable: true
        createdAt:
          type: integer
        updatedAt:
          type: integer
    ChangeEmailRequest:
      type: object
      required:
        - email
        - currentPassword
      properties:
        email:
          type: string
          format: email
        currentPassword:
          type: string
          minLength: 1
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          maxLength: 1024
    AuditLogQuery:
      type: object
      properties:
        event_type:
          type: string
        resource_type:
          type: string
          pattern: ^[a-z][a-z0-9-]*$
        from:
          type: integer
          minimum: 0
          description: Start timestamp in milliseconds
        to:
          type: integer
          minimum: 0
          description: End timestamp in milliseconds
        cursor:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 25
    AuditLogResponse:
      type: object
      required:
        - events
        - hasMore
      properties:
        events:
          type: array
          items:
            type: object
            description: Audit log entry
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean
    SystemProfile:
      type: object
      required:
        - id
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        encryptedData:
          type: string
          nullable: true
        version:
          type: integer
        createdAt:
          type: integer
        updatedAt:
          type: integer
    UpdateSystemRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextSystem (see ./plaintext.yaml#/PlaintextSystem)
        version:
          type: integer
          minimum: 1
    CreateMemberRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextMember (see ./plaintext.yaml#/PlaintextMember)
    UpdateMemberRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextMember (see ./plaintext.yaml#/PlaintextMember)
        version:
          type: integer
          minimum: 1
    DuplicateMemberRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextMember for the new duplicate (see ./plaintext.yaml#/PlaintextMember)
        copyPhotos:
          type: boolean
          default: false
        copyFields:
          type: boolean
          default: false
        copyMemberships:
          type: boolean
          default: false
    CreateMemberPhotoRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 131072
          description: T1-encrypted PlaintextMemberPhoto (see ./plaintext.yaml#/PlaintextMemberPhoto)
        sortOrder:
          type: integer
          minimum: 0
    ReorderPhotosRequest:
      type: object
      required:
        - order
      properties:
        order:
          type: array
          minItems: 1
          maxItems: 50
          items:
            type: object
            required:
              - id
              - sortOrder
            properties:
              id:
                type: string
              sortOrder:
                type: integer
                minimum: 0
    FieldType:
      type: string
      enum:
        - text
        - number
        - boolean
        - date
        - color
        - select
        - multi-select
        - url
    CreateFieldDefinitionRequest:
      type: object
      required:
        - fieldType
        - encryptedData
      properties:
        fieldType:
          $ref: "#/components/schemas/FieldType"
        required:
          type: boolean
          default: false
        sortOrder:
          type: integer
          minimum: 0
          default: 0
        encryptedData:
          type: string
          minLength: 1
          maxLength: 32768
          description: T1-encrypted PlaintextFieldDefinition (see ./plaintext.yaml#/PlaintextFieldDefinition)
    UpdateFieldDefinitionRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        required:
          type: boolean
        sortOrder:
          type: integer
          minimum: 0
        encryptedData:
          type: string
          minLength: 1
          maxLength: 32768
          description: T1-encrypted PlaintextFieldDefinition (see ./plaintext.yaml#/PlaintextFieldDefinition)
        version:
          type: integer
          minimum: 1
    FieldDefinitionResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - fieldType
            - required
            - sortOrder
          properties:
            fieldType:
              $ref: "#/components/schemas/FieldType"
            required:
              type: boolean
            sortOrder:
              type: integer
    SetFieldValueRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 16384
          description: T1-encrypted PlaintextFieldValue (see ./plaintext.yaml#/PlaintextFieldValue)
    UpdateFieldValueRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 16384
          description: T1-encrypted PlaintextFieldValue (see ./plaintext.yaml#/PlaintextFieldValue)
        version:
          type: integer
          minimum: 1
    FieldValueResponse:
      type: object
      required:
        - id
        - fieldDefinitionId
        - memberId
        - systemId
        - encryptedData
        - version
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        fieldDefinitionId:
          type: string
        memberId:
          type: string
        systemId:
          type: string
        encryptedData:
          type: string
        version:
          type: integer
        createdAt:
          type: integer
        updatedAt:
          type: integer
    GroupResponse:
      allOf:
        - $ref: "#/components/schemas/EncryptedEntity"
        - type: object
          required:
            - parentGroupId
            - sortOrder
          properties:
            parentGroupId:
              type: string
              nullable: true
            sortOrder:
              type: integer
    CreateGroupRequest:
      type: object
      required:
        - encryptedData
        - parentGroupId
        - sortOrder
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)
        parentGroupId:
          type: string
          nullable: true
        sortOrder:
          type: integer
          minimum: 0
    UpdateGroupRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextGroup (see ./plaintext.yaml#/PlaintextGroup)
        version:
          type: integer
          minimum: 1
    MoveGroupRequest:
      type: object
      required:
        - targetParentGroupId
        - version
      properties:
        targetParentGroupId:
          type: string
          nullable: true
        version:
          type: integer
          minimum: 1
    CopyGroupRequest:
      type: object
      properties:
        targetParentGroupId:
          type: string
          nullable: true
        copyMemberships:
          type: boolean
          default: false
    ReorderGroupsRequest:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            required:
              - groupId
              - sortOrder
            properties:
              groupId:
                type: string
              sortOrder:
                type: integer
                minimum: 0
    AddGroupMemberRequest:
      type: object
      required:
        - memberId
      properties:
        memberId:
          type: string
    GroupMembership:
      type: object
      required:
        - groupId
        - memberId
      properties:
        groupId:
          type: string
        memberId:
          type: string
    CreateCustomFrontRequest:
      type: object
      required:
        - encryptedData
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextCustomFront (see ./plaintext.yaml#/PlaintextCustomFront)
    UpdateCustomFrontRequest:
      type: object
      required:
        - encryptedData
        - version
      properties:
        encryptedData:
          type: string
          minLength: 1
          maxLength: 87382
          description: T1-encrypted PlaintextCustomFront (see ./plaintext.yaml#/PlaintextCustomFront)
        version:
          type: integer
          minimum: 1
    RelationshipType:
      type: string
      enum:
        - split-from
        - fused-from
        - sibling
        - partner
        - parent-child
        - protector-of
        - caretaker-of
        - gatekeeper-of
