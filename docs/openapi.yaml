      responses:
        "200":
          description: Chunk completion reported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteChunkResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/fronting-sessions:
