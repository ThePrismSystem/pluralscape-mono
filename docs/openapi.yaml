              description: Start of waking hours (HH:MM, required when wakingHoursOnly=true)
            wakingEnd:
              type: string
              nullable: true
              pattern: ^(?:[01]\d|2[0-3]):[0-5]\d$
              description: End of waking hours (HH:MM, required when wakingHoursOnly=true)
