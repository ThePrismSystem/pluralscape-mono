            type: string
            pattern: ^fc_
      responses:
        "200":
          description: Friend unassigned from bucket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnassignBucketFriendResponse"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /systems/{systemId}/buckets/{bucketId}/export/manifest:
