# Pluralscape Crowdin project config.
# Sources are the English JSON in apps/mobile/locales/en/.
# Translations land in apps/mobile/locales/%locale%/ via the daily CI sync.

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

preserve_hierarchy: true

files:
  - source: /apps/mobile/locales/en/**/*.json
    # `.context.json` sidecars are metadata for the crowdin-upload-context
    # step — they must NOT be uploaded as additional source files. Without
    # this exclude, Crowdin ingests them as standalone source strings and
    # the context-upload step fails to match identifiers.
    ignore:
      - /apps/mobile/locales/en/**/*.context.json
    translation: /apps/mobile/locales/%locale%/%original_file_name%
    type: json
    update_option: update_as_unapproved
    translate_attributes: false

languages_mapping:
  # Crowdin emits full IETF codes (ar-SA, de-DE, fr-FR, ...) but our app's
  # locale directories in apps/mobile/locales/ use short codes. Map every
  # Crowdin target ID whose repo directory differs. es-419 and pt-BR match
  # Crowdin's code as-is and need no entry.
  locale:
    ar-SA: ar
    de-DE: de
    es-ES: es
    fr-FR: fr
    it-IT: it
    ja-JP: ja
    ko-KR: ko
    nl-NL: nl
    ru-RU: ru
    zh-CN: zh-Hans
